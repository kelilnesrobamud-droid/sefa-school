
<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safe School - Parent Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 font-sans pb-10 text-gray-800">

    <div class="bg-[#0d7a70] p-10 rounded-b-[50px] text-white text-center shadow-2xl">
        <div class="flex justify-between items-center max-w-sm mx-auto mb-2">
            <a href="index.html" class="text-xs bg-black/20 px-3 py-2 rounded-xl font-bold text-white shadow-sm"><i class="fas fa-home"></i> ዋና ገጽ</a>
            <h1 class="text-xl font-black italic text-yellow-400">የወላጅ ገጽ</h1>
            <div class="w-10"></div>
        </div>
        <div class="max-w-sm mx-auto mt-6">
            <input type="tel" id="pIn" placeholder="ስልክዎን ያስገቡ..." class="w-full p-4 rounded-3xl text-gray-800 text-center font-bold outline-none shadow-xl border-none">
            <button id="searchBtn" class="w-full mt-3 bg-indigo-600 p-4 rounded-3xl font-black shadow-lg italic text-white">መረጃ ፈልግ</button>
        </div>
    </div>

    <div id="results" class="p-4 max-w-4xl mx-auto space-y-6"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        
        const firebaseConfig = { 
            apiKey: "AIzaSyBKw3ektgxdfvqcO-JHzJwjvfSkc-K_41A", 
            authDomain: "safe-school-b3f87.firebaseapp.com", 
            projectId: "safe-school-b3f87", 
            storageBucket: "safe-school-b3f87.firebasestorage.app", 
            messagingSenderId: "43051328645", 
            appId: "1:43051328645:web:2664448d0b43a293daf5ec" 
        };
        const app = initializeApp(firebaseConfig); 
        const db = getFirestore(app);
        const amharicMonths = ["መስከረም", "ጥቅምት", "ኅዳር", "ታኅሣሥ", "ጥር", "የካቲት", "መጋቢት", "ሚያዝያ", "ግንቦት", "ሰኔ", "ሐምሌ", "ነሐሴ"];

        document.getElementById('searchBtn').onclick = () => {
            const phone = document.getElementById('pIn').value.trim();
            if(!phone) return alert("እባክዎ ስልክ ቁጥር ያስገቡ");
            
            const q = query(collection(db, "students"), where("parentPhone", "==", phone));
            onSnapshot(q, (snap) => {
                const res = document.getElementById('results'); 
                res.innerHTML = "";
                
                if(snap.empty) { 
                    res.innerHTML = `<p class="text-center text-sm font-bold text-gray-400 italic">ተማሪ አልተገኘም!</p>`; 
                    return; 
                }

                snap.forEach(d => {
                    const data = d.data(); 
                    const id = d.id; 
                    const paid = data.paidMonths || []; 
                    const history = data.attendanceHistory || [];
                    
                    const teacherName = data.teacherName || "ያልተመደበ";
                    const teacherPhone = data.teacherPhone || "---";
                    const generalPayment = data.paymentStatus === 'paid' ? '<span class="text-emerald-600 font-black">🟢 የተከፈለ</span>' : '<span class="text-rose-500 font-black">❌ ያልተከፈለ</span>';

                    // የቅርብ ጊዜ ባህሪ እና የትምህርት ክትትል ሁኔታዎችን መለየት
                    const behavior = data.behaviorStatus || "---";
                    const academic = data.academicStatus || "---";

                    res.innerHTML += `
                        <div class="bg-white rounded-[35px] shadow-lg p-6 mb-6 border">
                            <h2 class="text-lg font-black text-[#0d7a70] border-b pb-2 mb-3 italic"><i class="fas fa-child mr-1"></i> ${data.studentName}</h2>
                            
                            <div class="mb-4 bg-indigo-50/40 p-3 rounded-2xl border border-indigo-100 text-left">
                                <p class="text-xs text-gray-700 font-bold"><i class="fas fa-user-tie text-indigo-700 mr-1"></i> <b>ክፍል መምህር፦</b> ${teacherName}</p>
                                <p class="text-[11px] text-gray-500 font-medium mt-1"><i class="fas fa-phone-alt text-gray-400 mr-1"></i> <b>የመምህር ስልክ፦</b> ${teacherPhone}</p>
                            </div>

                            <h3 class="text-[11px] font-black text-gray-400 mb-2 pl-1 italic">📌 የዛሬ የመጨረሻ መረጃ ዕይታ</h3>
                            <div class="grid grid-cols-2 sm:grid-cols-4 gap-2 mb-4 text-center">
                                <div class="bg-slate-50 p-2.5 rounded-2xl border">
                                    <p class="text-[9px] text-gray-400 font-bold">የክትትል ሁኔታ</p>
                                    <span class="text-[11px] font-black text-indigo-700 block mt-0.5">${data.lastAttendance || '---'}</span>
                                    <p class="text-[8px] text-gray-400 mt-0.5">(${data.attendanceDate || '---'})</p>
                                </div>
                                <div class="bg-slate-50 p-2.5 rounded-2xl border">
                                    <p class="text-[9px] text-gray-400 font-bold">የባህሪ/ፀባይ ሁኔታ</p>
                                    <span class="text-[11px] font-black text-emerald-600 block mt-0.5">${behavior}</span>
                                </div>
                                <div class="bg-slate-50 p-2.5 rounded-2xl border">
                                    <p class="text-[9px] text-gray-400 font-bold">የትምህርት ክትትል</p>
                                    <span class="text-[11px] font-black text-amber-600 block mt-0.5">${academic}</span>
                                </div>
                                <div class="bg-slate-50 p-2.5 rounded-2xl border">
                                    <p class="text-[9px] text-gray-400 font-bold">የፈተና ውጤት</p>
                                    <span class="text-[12px] font-black text-blue-600 block mt-0.5">${data.examScore || '---'}</span>
                                </div>
                            </div>

                            <button onclick="document.getElementById('h_${id}').classList.toggle('hidden')" class="w-full bg-slate-100 p-2.5 rounded-xl text-xs font-black mb-3 border flex justify-between items-center px-4">
                                <span><i class="fas fa-history text-gray-500 mr-1"></i> የቀደሙ ቀናት የክትትል ታሪክ (Detailed History)</span>
                                <i class="fas fa-chevron-down text-gray-400"></i>
                            </button>
                            <div id="h_${id}" class="hidden p-3 border rounded-xl space-y-2 text-xs max-h-52 overflow-y-auto bg-gray-50 mb-3 text-left">
                                ${history.slice().reverse().map(h => `
                                    <div class="border-b pb-2 mb-1 last:border-0">
                                        <div class="flex justify-between font-bold text-gray-700 mb-1">
                                            <span>📅 ቀን፦ ${h.date}</span>
                                            <span class="text-indigo-700 font-black">${h.status}</span>
                                        </div>
                                        <div class="grid grid-cols-3 gap-1 text-[10px] text-gray-500 bg-white p-1.5 rounded-lg border border-gray-100">
                                            <div><b>ፀባይ፦</b> <span class="text-emerald-600 font-bold">${h.behavior || '---'}</span></div>
                                            <div><b>ትምህርት፦</b> <span class="text-amber-600 font-bold">${h.academic || '---'}</span></div>
                                            <div><b>ውጤት፦</b> <span class="text-blue-600 font-black">${h.score || '---'}</span></div>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                            
                            <button onclick="document.getElementById('pm_${id}').classList.toggle('hidden')" class="w-full bg-indigo-50 text-indigo-700 p-3 rounded-2xl font-black text-xs border italic flex justify-between items-center">
                                <span><i class="fas fa-wallet mr-1"></i> የወርሃዊ ክፍያ ሁኔታ</span>
                                <span class="text-[10px] font-bold">${generalPayment}</span>
                            </button>
                            <div id="pm_${id}" class="hidden grid grid-cols-3 gap-2 p-2 bg-gray-50 rounded-2xl mt-2">
                                ${amharicMonths.map(m => `<div class="p-2 rounded-xl border text-center text-[10px] ${data.paymentStatus === 'paid' || paid.includes(m) ? 'bg-emerald-500 text-white font-bold' : 'bg-white text-gray-300'}">${m}</div>`).join('')}
                            </div>
                        </div>`;
                });
            });
        };
    </script> 
</body>
</html>
