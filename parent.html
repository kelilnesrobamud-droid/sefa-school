
<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safe School - Parent Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-slate-50 font-sans pb-10 text-gray-800">

    <div class="bg-[#0d7a70] p-10 rounded-b-[50px] text-white text-center shadow-2xl">
        <div class="flex justify-between items-center max-w-sm mx-auto mb-2">
            <a href="index.html" class="text-xs bg-black/20 px-3 py-2 rounded-xl font-bold text-white shadow-sm"><i class="fas fa-home"></i> ዋና ገጽ</a>
            <h1 class="text-xl font-black italic text-yellow-400">የወላጅ ገጽ</h1>
            <div class="w-10"></div>
        </div>
        <div class="max-w-sm mx-auto mt-6">
            <input type="tel" id="pIn" placeholder="ስልክዎን ያስገቡ..." class="w-full p-4 rounded-3xl text-gray-800 text-center font-bold outline-none shadow-xl border-none">
            <button onclick="fetchData()" class="w-full mt-3 bg-indigo-600 p-4 rounded-3xl font-black shadow-lg text-white">መረጃ ፈልግ</button>
        </div>
    </div>

    <div id="results" class="p-4 max-w-4xl mx-auto space-y-6"></div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyBKw3ektgxdfvqcO-JHzJwjvfSkc-K_41A", authDomain: "safe-school-b3f87.firebaseapp.com", projectId: "safe-school-b3f87", storageBucket: "safe-school-b3f87.firebasestorage.app", messagingSenderId: "43051328645", appId: "1:43051328645:web:2664448d0b43a293daf5ec" };
        firebase.initializeApp(firebaseConfig); const db = firebase.firestore();
        const amharicMonths = ["መስከረም", "ጥቅምት", "ኅዳር", "ታኅሣሥ", "ጥር", "የካቲት", "መጋቢት", "ሚያዝያ", "ግንቦት", "ሰኔ", "ሐምሌ", "ነሐሴ"];
        let currentStudentHistory = [];

        function fetchData() {
            const phone = document.getElementById('pIn').value.trim();
            if(!phone) return alert("ስልክ ያስገቡ");
            const res = document.getElementById('results');
            res.innerHTML = `<p class="text-center font-bold text-gray-500 py-10"><i class="fas fa-spinner fa-spin"></i> በመፈለግ ላይ...</p>`;

            db.collection("students").where("parentPhone", "==", phone).onSnapshot((snap) => {
                res.innerHTML = ""; if(snap.empty) { res.innerHTML = `<p class="text-center text-xs font-bold text-gray-400 py-10">ተማሪ አልተገኘም!</p>`; return; }

                snap.forEach(doc => {
                    const data = doc.data(); const docId = doc.id; currentStudentHistory = data.attendanceHistory || [];
                    const paidMonthsList = data.paidMonths || [];
                    const generalPayment = data.paymentStatus === 'paid' ? '<span class="text-emerald-600 font-black">🟢 የተከፈለ</span>' : '<span class="text-rose-500 font-black">❌ ያልተከፈለ</span>';

                    res.innerHTML += `
                        <div class="bg-white rounded-[35px] shadow-lg p-6 border mb-6">
                            <h2 class="text-base font-black text-[#0d7a70] border-b pb-2 mb-4 italic"><i class="fas fa-child mr-1"></i> ተማሪ፦ ${data.studentName}</h2>
                            
                            <div class="mb-6 space-y-2">
                                <h3 class="text-[11px] font-black text-sky-800 uppercase italic"><i class="fas fa-university mr-1"></i> 🏛️ የአድሚን/የአስተዳደር መረጃ ሰንጠረዥ</h3>
                                <div class="overflow-x-auto rounded-xl border border-sky-100">
                                    <table class="w-full text-[11px] text-left border-collapse">
                                        <thead>
                                            <tr class="bg-sky-50 text-sky-900 border-b font-bold">
                                                <th class="p-2 border-r">ክፍል መምህር</th>
                                                <th class="p-2 border-r">የመምህር ስልክ</th>
                                                <th class="p-2">የክፍያ ሁኔታ</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <tr class="border-b bg-white text-gray-700 font-bold">
                                                <td class="p-2 border-r">${data.teacherName || 'ያልተመደበ'}</td>
                                                <td class="p-2 border-r">${data.teacherPhone || '---'}</td>
                                                <td class="p-2">${generalPayment}</td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                                <button onclick="document.getElementById('pm_${docId}').classList.toggle('hidden')" class="bg-sky-600 text-white px-3 py-1 rounded-xl font-bold text-[9px] shadow-sm mt-1">የወርሃዊ ክፍያ ዝርዝር ማሳያ</button>
                                <div id="pm_${docId}" class="hidden grid grid-cols-4 gap-1 p-2 bg-slate-50 rounded-xl border mt-2">
                                    ${amharicMonths.map(m => `<div class="p-1 rounded border text-center text-[8px] ${data.paymentStatus === 'paid' || paidMonthsList.includes(m) ? 'bg-emerald-500 text-white font-bold' : 'bg-white text-gray-300'}">${m}</div>`).join('')}
                                </div>
                            </div>

                            <div class="space-y-3">
                                <div class="flex justify-between items-center border-b pb-1">
                                    <h3 class="text-[11px] font-black text-indigo-800 uppercase italic"><i class="fas fa-chart-line mr-1"></i> 👨‍🏫 የመምህሩ የክትትልና የውጤት ሪፖርት ሰንጠረዥ</h3>
                                    <select id="parent-filter" onchange="renderReports()" class="text-[10px] p-1.5 border rounded-xl font-bold bg-gray-50 outline-none">
                                        <option value="today">📅 የዛሬ ዕለታዊ ሪፖርት</option>
                                        <option value="month">🗓️ የዚህ ወር ወርሃዊ ሪፖርት</option>
                                        <option value="year">⏳ የዚህ ዓመት ዓመታዊ ሪፖርት</option>
                                    </select>
                                </div>
                                
                                <div class="overflow-x-auto rounded-2xl border border-gray-200 shadow-sm">
                                    <table class="w-full text-[11px] text-center border-collapse">
                                        <thead>
                                            <tr class="bg-indigo-50 text-indigo-900 border-b font-bold">
                                                <th class="p-2.5 border-r">ቀን</th>
                                                <th class="p-2.5 border-r">የክትትል ሁኔታ</th>
                                                <th class="p-2.5 border-r">ባህሪ/ፀባይ</th>
                                                <th class="p-2.5 border-r">ትምህርት ክትትል</th>
                                                <th class="p-2.5">የፈተና ውጤት</th>
                                            </tr>
                                        </thead>
                                        <tbody id="report-table-body"></tbody>
                                    </table>
                                </div>
                            </div>
                        </div>`;
                });
                renderReports();
            });
        }

        function renderReports() {
            const filter = document.getElementById('parent-filter')?.value || 'today';
            const tbody = document.getElementById('report-table-body'); if(!tbody) return;
            tbody.innerHTML = ""; const todayStr = new Date().toLocaleDateString('en-CA');
            const now = new Date(); const currentYear = now.getFullYear(); const currentMonth = now.getMonth();

            const filtered = currentStudentHistory.filter(h => {
                const recDate = new Date(h.date); if (isNaN(recDate.getTime())) return false;
                if (filter === 'today') return h.date === todayStr;
                if (filter === 'month') return recDate.getFullYear() === currentYear && recDate.getMonth() === currentMonth;
                if (filter === 'year') return recDate.getFullYear() === currentYear;
                return false;
            });

            if(filtered.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="p-4 text-center text-gray-400 italic">በዚህ ጊዜ የተመዘገበ መረጃ የለም።</td></tr>`; return;
            }

            filtered.slice().reverse().forEach(h => {
                let statusColor = "text-emerald-600";
                if(h.status.includes("አርፍዷል")) statusColor = "text-amber-50";
                if(h.status.includes("ቀርቷል")) statusColor = "text-rose-600";

                tbody.innerHTML += `
                    <tr class="border-b last:border-0 hover:bg-slate-50/80 font-bold text-gray-700">
                        <td class="p-2 border-r bg-gray-50/50 text-gray-500 font-medium">${h.date}</td>
                        <td class="p-2 border-r ${statusColor}">${h.status}</td>
                        <td class="p-2 border-r text-emerald-600">${h.behavior || '---'}</td>
                        <td class="p-2 border-r text-amber-600">${h.academic || '---'}</td>
                        <td class="p-2 text-blue-600 font-black">${h.score || '---'}</td>
                    </tr>`;
            });
        }
    </script> 
</body>
</html>
