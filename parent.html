<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safe School - Parent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 font-sans pb-10 text-gray-800">

    <div class="bg-indigo-900 p-10 rounded-b-[50px] text-white text-center shadow-2xl">
        <div class="flex justify-between items-center max-w-sm mx-auto mb-2">
            <a href="index.html" class="text-xs bg-indigo-950/40 px-3 py-2 rounded-xl font-bold text-white shadow-sm">
                <i class="fas fa-home"></i> ወደ ዋናው ገጽ
            </a>
            <h1 class="text-xl font-black italic text-yellow-400">የወላጅ ገጽ</h1>
            <div class="w-10"></div>
        </div>
        <div class="max-w-sm mx-auto mt-6">
            <input type="tel" id="pIn" placeholder="ስልክዎን ያስገቡ..." class="w-full p-4 rounded-3xl text-gray-800 text-center font-bold outline-none shadow-xl border-none">
            <button id="searchBtn" class="w-full mt-3 bg-indigo-600 p-4 rounded-3xl font-black shadow-lg transition active:scale-95 italic">መረጃ ፈልግ</button>
        </div>
    </div>

    <div id="results" class="p-4 max-w-4xl mx-auto space-y-6"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        
        const firebaseConfig = { 
            apiKey: "AIzaSyBKw3ektgxdfvqcO-JHzJwjvfSkc-K_41A", 
            authDomain: "safe-school-b3f87.firebaseapp.com", 
            projectId: "safe-school-b3f87", 
            storageBucket: "safe-school-b3f87.firebasestorage.app", 
            messagingSenderId: "43051328645", 
            appId: "1:43051328645:web:2664448d0b43a293daf5ec" 
        };
        
        const app = initializeApp(firebaseConfig); 
        const db = getFirestore(app);
        const amharicMonths = ["መስከረም", "ጥቅምት", "ኅዳር", "ታኅሣሥ", "ጥር", "የካቲት", "መጋቢት", "ሚያዝያ", "ግንቦት", "ሰኔ", "ሐምሌ", "ነሐሴ"];

        document.getElementById('searchBtn').onclick = () => {
            const phone = document.getElementById('pIn').value.trim();
            if(!phone) return alert("እባክዎ ስልክ ቁጥር ያስገቡ");
            
            const q = query(collection(db, "students"), where("parentPhone", "==", phone));
            
            onSnapshot(q, (snap) => {
                const res = document.getElementById('results'); 
                res.innerHTML = "";
                
                if(snap.empty) {
                    res.innerHTML = `<p class="text-center text-sm font-bold text-gray-400 italic">በዚህ ስልክ ቁጥር የተመዘገበ ተማሪ አልተገኘም!</p>`;
                    return;
                }

                snap.forEach(d => {
                    const data = d.data(); 
                    const id = d.id; 
                    const paid = data.paidMonths || [];
                    
                    res.innerHTML += `
                        <div class="bg-white rounded-[35px] shadow-lg p-6 mb-6 border">
                            <h2 class="text-lg font-black text-indigo-900 border-b pb-2 mb-4 italic"><i class="fas fa-child text-indigo-500 mr-1"></i> ${data.studentName}</h2>
                            
                            <div class="overflow-x-auto mb-4">
                                <table class="w-full text-[11px] text-center border-collapse border border-gray-100">
                                    <thead>
                                        <tr class="bg-indigo-600 text-white uppercase">
                                            <th class="p-3 border border-indigo-700">ቀን</th>
                                            <th class="p-3 border border-indigo-700">ሁኔታ</th>
                                            <th class="p-3 border border-indigo-700">ደቂቃ</th>
                                            <th class="p-3 border border-indigo-700">ውጤት</th>
                                            <th class="p-3 border border-indigo-700">የፈተና ቀን</th>
                                        </tr>
                                    </thead>
                                    <tbody class="font-bold">
                                        <tr class="bg-white">
                                            <td class="p-4 border bg-gray-50">${data.attendanceDate || '---'}</td>
                                            <td class="p-4 border italic text-indigo-700">${data.lastAttendance || '---'}</td>
                                            <td class="p-4 border text-amber-600">${data.lateMinutes || '0'}</td>
                                            <td class="p-4 border text-blue-600">${data.examScore || '---'}</td>
                                            <td class="p-4 border text-gray-400 font-medium italic">${data.examDate || '---'}</td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                            
                            <button onclick="document.getElementById('pm_${id}').classList.toggle('hidden')" class="w-full bg-indigo-50 text-indigo-700 p-3 rounded-2xl font-black text-xs border mb-2 italic">
                                <i class="fas fa-wallet mr-1"></i> የክፍያ ሁኔታ (ለመመልከት ይጫኑ)
                            </button>
                            
                            <div id="pm_${id}" class="hidden grid grid-cols-3 gap-2 p-2 bg-gray-50 rounded-2xl">
                                ${amharicMonths.map(m => `
                                    <div class="p-2 rounded-xl border text-center text-[10px] ${paid.includes(m) ? 'bg-emerald-500 text-white' : 'bg-white text-gray-300'}">
                                        <span class="font-black">${m}</span>
                                    </div>
                                `).join('')}
                            </div>
                        </div>`;
                });
            });
        };
    </script>
</body>
</html>
