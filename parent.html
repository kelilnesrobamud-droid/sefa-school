<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>የወላጆች ገጽ - Safe School</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-gray-50 min-h-screen font-sans">

    <header class="bg-purple-600 text-white p-4 shadow-md flex justify-between items-center">
        <h1 class="text-xl font-bold">የወላጆች መረጃ መከታተያ ገጽ</h1>
        <a href="index.html" class="bg-purple-700 px-4 py-2 rounded text-sm hover:bg-purple-800">ውጣ</a>
    </header>

    <main class="max-w-4xl mx-auto p-4 space-y-6">
        <div id="login-section" class="bg-white p-6 rounded-lg shadow-md max-w-md mx-auto mt-10">
            <h2 class="text-lg font-bold mb-4 text-gray-700">በወላጅ ስምዎ ይግቡ</h2>
            <input type="text" id="parent-name" placeholder="ሙሉ ስምዎን ያስገቡ" class="w-full p-2 border rounded mb-4 focus:outline-purple-500">
            <button onclick="loadParentDashboard()" class="w-full bg-purple-600 text-white py-2 rounded hover:bg-purple-700 font-bold">የልጄን መረጃ አሳይ</button>
        </div>

        <div id="dashboard-section" class="hidden space-y-6">
            <div id="children-cards" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                </div>

            <div class="bg-white p-6 rounded-lg shadow-md">
                <h2 class="text-lg font-bold text-gray-800 mb-4">የልጅዎ የ1 ወር (የ30 ቀናት) ሙሉ የክትትል ታሪክ</h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-100 text-gray-700 text-sm">
                                <th class="p-3 border-b">ቀን</th>
                                <th class="p-3 border-b">የልጅ ስም</th>
                                <th class="p-3 border-b">የመገኘት ሁኔታ</th>
                            </tr>
                        </thead>
                        <tbody id="parent-history-list">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        // የFirebase ኮንፊገሬሽንህን እዚህ ጋር አስገባ
        const firebaseConfig = {
            apiKey: "AIzaSy...",
            authDomain: "safe-school-...",
            projectId: "safe-school-...",
            storageBucket: "safe-school-...",
            messagingSenderId: "...",
            appId: "..."
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let currentParent = "";

        function loadParentDashboard() {
            const nameInput = document.getElementById('parent-name').value.trim();
            if(!nameInput) return alert("እባክዎ ስምዎን ያስገቡ");

            currentParent = nameInput;
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('dashboard-section').classList.remove('hidden');

            loadChildrenData();
        }

        function loadChildrenData() {
            db.collection("students").where("parent", "==", currentParent)
            .onSnapshot(snapshot => {
                const cardsContainer = document.getElementById('children-cards');
                cardsContainer.innerHTML = "";
                
                if(snapshot.empty) {
                    cardsContainer.innerHTML = `<p class="text-gray-500 p-4 bg-white rounded shadow w-full">በዚህ ስም የተመዘገበ ልጅ አልተገኘም።</p>`;
                    return;
                }

                snapshot.forEach(doc => {
                    const student = doc.data();
                    const studentId = doc.id;
                    
                    const payBadge = student.paymentStatus === "Paid" ? "bg-green-100 text-green-800" : "bg-red-100 text-red-800";
                    const payText = student.paymentStatus === "Paid" ? "የተከፈለ" : "ያልተከፈለ";

                    cardsContainer.innerHTML += `
                        <div class="bg-white p-6 rounded-lg shadow border-l-4 border-purple-500">
                            <h3 class="text-xl font-bold text-gray-800 mb-2">${student.name}</h3>
                            <p class="text-sm text-gray-600 mb-1">👨‍🏫 መምህር፦ <span class="font-medium text-gray-800">${student.teacher}</span></p>
                            <p class="text-sm text-gray-600 mb-3">💳 የትምህርት ቤት ክፍያ፦ <span class="px-2 py-0.5 rounded text-xs font-bold ${payBadge}">${payText}</span></p>
                        </div>
                    `;
                    
                    // ለእያንዳንዱ ልጅ የ30 ቀን ታሪክ መጫን
                    loadChildHistory(studentId);
                });
            });
        }

        function loadChildHistory(studentId) {
            db.collection("attendance").where("studentId", "==", studentId)
            .orderBy("date", "desc")
            .limit(30) // የ1 ወር ታሪክ ብቻ ለመገደብ
            .onSnapshot(snapshot => {
                const tbody = document.getElementById('parent-history-list');
                // ከአንድ በላይ ልጅ ካለ ታሪኮቹ እንዲደራረቡ ለማድረግ መጀመሪያ አናጠፋውም
                snapshot.forEach(doc => {
                    const att = doc.data();
                    let badgeColor = "bg-green-100 text-green-800";
                    if(att.status.includes("min")) badgeColor = "bg-amber-100 text-amber-800";
                    if(att.status === "Absent") badgeColor = "bg-red-100 text-red-800";

                    tbody.innerHTML += `
                        <tr class="border-b text-sm">
                            <td class="p-3 text-gray-600">${att.date}</td>
                            <td class="p-3 text-gray-800 font-medium">${att.studentName}</td>
                            <td class="p-3"><span class="px-2 py-1 rounded text-xs font-bold ${badgeColor}">${att.status}</span></td>
                        </tr>
                    `;
                });
            });
        }
    </script>
</body>
</html>
