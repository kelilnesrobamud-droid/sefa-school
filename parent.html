<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safe School - Parent Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-slate-50 font-sans pb-20 text-gray-800">

    <div class="bg-[#0d7a70] p-10 rounded-b-[50px] text-white text-center shadow-2xl">
        <div class="flex justify-between items-center max-w-sm mx-auto mb-2">
            <a href="index.html" class="text-xs bg-black/20 px-3 py-2 rounded-xl font-bold text-white shadow-sm hover:bg-black/40"><i class="fas fa-home"></i> ዋና ገጽ</a>
            <h1 class="text-xl font-black italic text-yellow-400">የወላጅ መከታተያ ገጽ</h1>
            <div class="w-10"></div>
        </div>
        <div class="max-w-sm mx-auto mt-4">
            <input type="tel" id="pIn" placeholder="የወላጅ ስልክ ቁጥር ያስገቡ..." class="w-full p-4 rounded-3xl text-gray-800 text-center font-bold outline-none shadow-xl">
            <button onclick="fetchData()" class="w-full mt-3 bg-indigo-600 p-4 rounded-3xl font-black text-white shadow-lg">መረጃ አሳይ</button>
        </div>
    </div>

    <div id="results" class="p-4 max-w-4xl mx-auto space-y-6"></div>

    <div id="parent-signature-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-[30px] p-6 w-full max-w-md text-center space-y-4">
            <h3 class="font-black text-indigo-900 text-sm italic">✍️ የወላጅ ፊርማ ሰሌዳ</h3>
            <canvas id="parent-canvas" width="350" height="200" class="border-2 dashed bg-gray-50 w-full rounded-2xl shadow-inner" style="cursor:crosshair;"></canvas>
            <div class="flex gap-2">
                <button onclick="clearParentSig()" class="w-1/2 bg-gray-200 py-2.5 rounded-xl font-bold text-xs">አጥፋ</button>
                <button onclick="saveParentSig()" class="w-1/2 bg-emerald-600 text-white py-2.5 rounded-xl font-black text-xs">ፊርማ አጽድቅ</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyBKw3ektgxdfvqcO-JHzJwjvfSkc-K_41A", authDomain: "safe-school-b3f87.firebaseapp.com", projectId: "safe-school-b3f87", storageBucket: "safe-school-b3f87.firebasestorage.app", messagingSenderId: "43051328645", appId: "1:43051328645:web:2664448d0b43a293daf5ec" };
        firebase.initializeApp(firebaseConfig); const db = firebase.firestore();
        let currentStudentHistory = []; let currentDocId = ""; let pCanvas, pCtx, pDrawing = false; let savedParentSigData = ""; let activeRecordIndex = null;

        function fetchData() {
            const phone = document.getElementById('pIn').value.trim();
            if(!phone) return alert("እባክዎ ስልክ ቁጥር ያስገቡ!");

            db.collection("students").where("parentPhone", "==", phone).onSnapshot((snap) => {
                const res = document.getElementById('results'); res.innerHTML = "";
                if(snap.empty) { res.innerHTML = `<p class="text-center font-bold text-gray-400 py-10">ተማሪ አልተገኘም!</p>`; return; }

                snap.forEach(doc => {
                    const data = doc.data(); currentDocId = doc.id; currentStudentHistory = data.attendanceHistory || [];
                    const generalPayment = data.paymentStatus === 'paid' ? '<span class="px-3 py-1 rounded-full bg-emerald-100 text-emerald-700 border border-emerald-300 font-black">🟢 የተከፈለ</span>' : '<span class="px-3 py-1 rounded-full bg-rose-100 text-rose-700 border border-rose-300 font-black">❌ ያልተከፈለ</span>';

                    res.innerHTML += `
                        <div class="bg-white rounded-[35px] shadow-lg p-6 border mb-6 space-y-6">
                            <h2 class="text-base font-black text-[#0d7a70] border-b pb-2 italic"><i class="fas fa-child mr-1"></i> ተማሪ፦ ${data.studentName}</h2>
                            
                            <div class="space-y-2">
                                <h3 class="text-[11px] font-black text-sky-800 uppercase italic">🏛️ የአድሚን/የአስተዳደር እና ክፍያ ሁኔታ</h3>
                                <div class="overflow-x-auto rounded-xl border border-sky-200 shadow-sm">
                                    <table class="w-full text-[11px] text-left border-collapse">
                                        <tr class="bg-sky-100/80 text-sky-900 font-black border-b"><th class="p-3 border-r border-sky-200">ክፍል ምድብ</th><th class="p-3 border-r border-sky-200">ክፍል መምህር</th><th class="p-3">የክፍያ ሁኔታ መስመር</th></tr>
                                        <tr class="font-bold bg-white text-gray-700 border-b"><td class="p-3 border-r border-sky-200 font-black text-indigo-900">${data.section || '5A'}</td><td class="p-3 border-r border-sky-200">${data.teacherName} (${data.teacherPhone})</td><td class="p-3">${generalPayment}</td></tr>
                                    </table>
                                </div>
                            </div>

                            <div class="space-y-3">
                                <h3 class="text-[11px] font-black text-indigo-800 uppercase italic">👨‍🏫 የመምህር ዕለታዊ ሪፖርትና የወላጅ ማረጋገጫ</h3>
                                <div class="overflow-x-auto rounded-2xl border border-gray-300 shadow">
                                    <table class="w-full text-[11px] text-center border-collapse border border-gray-300">
                                        <thead>
                                            <tr class="bg-indigo-900 text-white font-bold border-b border-gray-300">
                                                <th class="p-3 border-r border-gray-300">📅 ቀን / ክትትል</th>
                                                <th class="p-3 border-r border-gray-300">📊 ውጤትና ፀባይ መስመር</th>
                                                <th class="p-3 border-r border-gray-300">💬 የአስተማሪ አስተያየትና ፊርማ</th>
                                                <th class="p-3">✍️ የወላጅ ፊርማና አስተያየት</th>
                                            </tr>
                                        </thead>
                                        <tbody id="report-table-body"></tbody>
                                    </table>
                                </div>
                            </div>
                        </div>`;
                });
                renderReports();
            });
        }

        function renderReports() {
            const tbody = document.getElementById('report-table-body'); if(!tbody) return; tbody.innerHTML = "";
            if(currentStudentHistory.length === 0) { tbody.innerHTML = `<tr><td colspan="4" class="p-4 text-gray-400 italic">ሪፖርት የለም</td></tr>`; return; }

            currentStudentHistory.slice().reverse().forEach((h, index) => {
                const realIndex = currentStudentHistory.length - 1 - index;
                let parentSectionHtml = "";
                if(h.parentSig) {
                    parentSectionHtml = `<div class="space-y-1"><p class="text-gray-750 italic font-bold">"${h.parentComment}"</p><img src="${h.parentSig}" class="h-8 mx-auto object-contain bg-gray-50 border p-0.5 rounded shadow-sm"></div>`;
                } else {
                    parentSectionHtml = `
                        <div class="space-y-2 p-1">
                            <input type="text" id="p_comm_${realIndex}" placeholder="የወላጅ አስተያየት..." class="w-full p-1.5 border border-gray-300 rounded-lg text-[10px] bg-gray-50 outline-none">
                            <button onclick="openParentSigModal(${realIndex})" class="w-full bg-emerald-600 text-white px-2 py-1.5 rounded-lg text-[10px] font-black shadow-sm">ጻፍና ፈርም</button>
                        </div>`;
                }

                tbody.innerHTML += `
                    <tr class="border-b border-gray-300 hover:bg-slate-50 font-bold text-gray-700">
                        <!-- ቀን መስመር -->
                        <td class="p-3 border-r border-gray-300 bg-slate-50/50 text-left">📅 <b>${h.date}</b><br><span class="text-indigo-700 text-[10px]">${h.status}</span></td>
                        
                        <!-- ውጤትና ፀባይ መስመር (በየመስመሩ ቁጭ ብሏል) -->
                        <td class="p-3 border-r border-gray-300 text-left space-y-1 bg-white">
                            <div class="border-b border-dashed border-gray-200 pb-1">💯 ውጤት፦ <span class="text-blue-600 font-black">${h.score || '---'}</span></div>
                            <div class="border-b border-dashed border-gray-200 py-1">🌟 ፀባይ፦ <span class="text-emerald-600 font-black">${h.behavior}</span></div>
                            <div class="pt-1 text-[10px] text-gray-500">📈 ክትትል፦ ${h.academic || '---'}</div>
                        </td>
                        
                        <!-- መምህር አስተያየትና ፊርማ መስመር -->
                        <td class="p-3 border-r border-gray-300 text-left space-y-2">
                            <div class="border-b border-dashed border-gray-200 pb-1"><p class="text-gray-600 font-medium italic">"${h.teacherComment || 'አስተያየት የለም'}"</p></div>
                            <div class="pt-1 text-center">${h.teacherSig ? `<img src="${h.teacherSig}" class="h-8 mx-auto object-contain bg-gray-100 border p-0.5 rounded">` : '<span class="text-gray-300 text-[9px]">ፊርማ የለም</span>'}</div>
                        </td>
                        
                        <!-- ወላጅ መስመር -->
                        <td class="p-3 bg-yellow-50/20">${parentSectionHtml}</td>
                    </tr>`;
            });
        }

        window.addEventListener("DOMContentLoaded", () => {
            pCanvas = document.getElementById('parent-canvas'); pCtx = pCanvas.getContext('2d');
            pCtx.strokeStyle = "#047857"; pCtx.lineWidth = 3;
            pCanvas.addEventListener("mousedown", (e) => { pDrawing=true; pCtx.beginPath(); const r=pCanvas.getBoundingClientRect(); pCtx.moveTo(e.clientX-r.left, e.clientY-r.top); });
            pCanvas.addEventListener("mousemove", (e) => { if(!pDrawing) return; const r=pCanvas.getBoundingClientRect(); pCtx.lineTo(e.clientX-r.left, e.clientY-r.top); pCtx.stroke(); });
            pCanvas.addEventListener("mouseup", () => pDrawing=false);
            pCanvas.addEventListener("touchstart", (e) => { pDrawing=true; pCtx.beginPath(); const r=pCanvas.getBoundingClientRect(); pCtx.moveTo(e.touches[0].clientX-r.left, e.touches[0].clientY-r.top); e.preventDefault(); });
            pCanvas.addEventListener("touchmove", (e) => { if(!pDrawing) return; const r=pCanvas.getBoundingClientRect(); pCtx.lineTo(e.touches[0].clientX-r.left, e.touches[0].clientY-r.top); pCtx.stroke(); e.preventDefault(); });
            pCanvas.addEventListener("touchend", () => pDrawing=false);
        });
        function openParentSigModal(index) { activeRecordIndex = index; savedParentSigData = ""; document.getElementById('parent-signature-modal').classList.remove('hidden'); pCtx.clearRect(0,0,pCanvas.width,pCanvas.height); }
        function clearParentSig() { pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height); }
        function saveParentSig() {
            savedParentSigData = pCanvas.toDataURL();
            const comment = document.getElementById(`p_comm_${activeRecordIndex}`).value.trim();
            currentStudentHistory[activeRecordIndex].parentComment = comment || "ታይቷል/ተረጋግጧል";
            currentStudentHistory[activeRecordIndex].parentSig = savedParentSigData;
            db.collection("students").doc(currentDocId).update({ attendanceHistory: currentStudentHistory }).then(() => {
                document.getElementById('parent-signature-modal').classList.add('hidden');
                alert("ተቀምጧል!");
            });
        }
    </script>
</body>
</html>
