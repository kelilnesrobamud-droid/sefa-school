
<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safe School - Parent Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-slate-50 min-h-screen font-sans pb-20 text-gray-800">

    <header class="bg-[#0d7a70] text-white p-6 rounded-b-[40px] shadow-2xl text-center">
        <div class="flex justify-between items-center max-w-7xl mx-auto">
            <a href="index.html" class="bg-black/20 px-4 py-2 rounded-xl text-xs font-bold hover:bg-black/40"><i class="fas fa-home"></i> ዋና ገጽ</a>
            <h1 class="text-xl font-black italic text-yellow-300">የወላጆች መቆጣጠሪያ ማዕከል</h1>
            <div class="w-10"></div>
        </div>
    </header>

    <div id="parent-auth-box" class="max-w-md mx-auto m-6 bg-white p-6 rounded-[30px] shadow-lg border space-y-4">
        <h3 class="font-black text-xs text-center text-gray-700 italic border-b pb-2">🔐 በወላጅ ስልክ ቁጥርዎ ይግቡ</h3>
        <div class="space-y-2">
            <input type="tel" id="parentLoginPhone" placeholder="የወላጅ ስልክ ቁጥርዎን ያስገቡ..." class="w-full p-3 border rounded-xl font-bold bg-gray-50 outline-none text-center text-sm">
            <button onclick="loginParent()" class="w-full bg-[#0d7a70] text-white py-3 rounded-xl font-black text-xs shadow hover:bg-[#0a6159]">ግባ</button>
        </div>
    </div>

    <div id="parent-dashboard-main" class="hidden max-w-7xl mx-auto p-4 space-y-6">
        
        <div class="bg-slate-900 text-white p-5 rounded-2xl shadow flex justify-between items-center">
            <div>
                <h2 id="display-student-name" class="font-black text-sm">ተማሪ: ---</h2>
                <p id="display-student-info" class="text-[10px] text-gray-400 mt-1">ክፍል: ---</p>
            </div>
            <button onclick="logoutParent()" class="bg-gray-800 text-gray-300 px-3 py-1.5 rounded-xl text-xs font-bold hover:bg-gray-700">ውጣ</button>
        </div>

        <div class="flex flex-col sm:flex-row gap-3 border-b pb-4">
            <button id="tab-summary-btn" onclick="switchParentSection('summary')" class="flex-1 py-4 px-4 rounded-2xl font-black text-xs shadow-sm bg-gray-200 text-gray-700 hover:bg-gray-300 border border-gray-300 transition-all flex items-center justify-center gap-2">
                📊 የልጅዎ የቀሪና አርፋጅ ክትትል ማጠቃለያ
            </button>
            <button id="tab-report-btn" onclick="switchParentSection('report')" class="flex-1 py-4 px-4 rounded-2xl font-black text-xs shadow-sm bg-gray-200 text-gray-700 hover:bg-gray-300 border border-gray-300 transition-all flex items-center justify-center gap-2">
                📋 የልጅዎ የሪፖርቶች መጋዘን
            </button>
        </div>

        <div id="parent-section-summary" class="hidden bg-white p-5 rounded-[30px] shadow border space-y-4">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 border-b pb-3">
                <h3 class="font-black text-xs text-gray-800 italic">📊 የክትትል ሁኔታ ማጠቃለያ</h3>
                <div class="flex gap-1 bg-slate-100 p-1 rounded-xl w-full sm:w-auto">
                    <button id="p-att-btn-monthly" onclick="calculateParentAttendance('monthly')" class="bg-[#0d7a70] text-white px-4 py-2 rounded-lg text-xs font-black shadow-sm flex-1 sm:flex-none">📆 ወርሃዊ ክትትል</button>
                    <button id="p-att-btn-yearly" onclick="calculateParentAttendance('yearly')" class="text-gray-600 px-4 py-2 rounded-lg text-xs font-black flex-1 sm:flex-none">🗓️ ዓመታዊ ክትትል</button>
                </div>
            </div>
            <div class="grid grid-cols-3 gap-3 text-center">
                <div class="bg-rose-50 p-3 rounded-2xl border border-rose-100">
                    <p class="text-[11px] font-black text-rose-900">❌ የቀረበት ቀን</p>
                    <p id="p-count-absent" class="text-xl font-black text-rose-600 mt-1">0 ቀን</p>
                </div>
                <div class="bg-amber-50 p-3 rounded-2xl border border-amber-100">
                    <p class="text-[11px] font-black text-amber-900">⏰ ያረፈደበት ቀን</p>
                    <p id="p-count-late" class="text-xl font-black text-amber-500 mt-1">0 ቀን</p>
                </div>
                <div class="bg-emerald-50 p-3 rounded-2xl border border-emerald-100">
                    <p class="text-[11px] font-black text-emerald-900">✅ የመጣበት ቀን</p>
                    <p id="p-count-present" class="text-xl font-black text-emerald-600 mt-1">0 ቀን</p>
                </div>
            </div>
        </div>

        <div id="parent-section-report" class="hidden bg-white p-5 rounded-[30px] shadow border space-y-3">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 border-b pb-2">
                <h3 class="font-black text-xs text-gray-800 italic">📋 የልጅዎ የሪፖርቶች መጋዘን ታሪክ</h3>
                <div class="flex gap-1 bg-gray-100 p-1 rounded-xl w-full sm:w-auto">
                    <button id="p-wh-daily" onclick="switchWarehouseTab('daily')" class="bg-[#0d7a70] text-white px-3 py-1.5 rounded-lg text-[11px] font-black shadow-sm transition-all flex-1 sm:flex-none">📅 ዕለታዊ</button>
                    <button id="p-wh-monthly" onclick="switchWarehouseTab('monthly')" class="text-gray-600 px-3 py-1.5 rounded-lg text-[11px] font-black transition-all flex-1 sm:flex-none">📆 ወርሃዊ</button>
                    <button id="p-wh-yearly" onclick="switchWarehouseTab('yearly')" class="text-gray-600 px-3 py-1.5 rounded-lg text-[11px] font-black transition-all flex-1 sm:flex-none">🗓️ ዓመታዊ</button>
                </div>
            </div>

            <div class="overflow-x-auto rounded-2xl border">
                <table class="w-full text-[11px] text-center border-collapse min-w-[950px]">
                    <thead class="bg-slate-100 font-bold text-slate-700 border-b">
                        <tr>
                            <th class="p-3">ቀን</th>
                            <th class="p-3 text-left">የተማሪ ስም</th>
                            <th class="p-3">ሁኔታ</th>
                            <th class="p-3 bg-emerald-50 text-emerald-900">📖 ምዕራፍ</th>
                            <th class="p-3 bg-emerald-50 text-emerald-900">🔢 ከ - እስከ</th>
                            <th class="p-3 text-rose-600">🛑 ስህተት</th>
                            <th class="p-3 text-amber-700">🗣️ መንተባተብ</th>
                            <th class="p-3 text-emerald-700">✨ ተጅዊድ</th>
                            <th class="p-3 text-indigo-900">💬 መምህር አስተያየት</th>
                            <th class="p-3">✍️ መምህር ፊርማ</th>
                            <th class="p-3 bg-amber-900 text-amber-100">💬 የወላጅ አስተያየት</th>
                            <th class="p-3 bg-amber-900 text-amber-100">✍️ የወላጅ ፊርማ</th>
                        </tr>
                    </thead>
                    <tbody id="parent-history-table-body"></tbody>
                </table>
            </div>
            
            <button id="submit-feedback-btn" onclick="submitParentFeedback()" class="hidden w-full bg-amber-700 hover:bg-amber-800 text-white py-3 rounded-xl font-black text-xs shadow transition-all active:scale-95 mt-2">አስተያየትና ፊርማ አጽድቅ</button>
        </div>

    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyBKw3ektgxdfvqcO-JHzJwjvfSkc-K_41A", authDomain: "safe-school-b3f87.firebaseapp.com", projectId: "safe-school-b3f87", storageBucket: "safe-school-b3f87.firebasestorage.app", messagingSenderId: "43051328645", appId: "1:43051328645:web:2664448d0b43a293daf5ec" };
        firebase.initializeApp(firebaseConfig); const db = firebase.firestore();

        let loggedInStudentId = ""; let currentStudentData = null; let currentParentTab = "monthly";
        let warehouseActiveTab = "daily"; // ለመጋዘኑ የትኛው ታብ እንደበራ መቆጣጠሪያ
        let canvas, ctx, drawing = false;
        let unsubscribeRealTime = null;
        let isUserTypingOrDrawing = false;

        function loginParent() {
            const phone = document.getElementById('parentLoginPhone').value.trim();
            if(!phone) return alert("እባክዎ የወላጅ ስልክ ቁጥር ያስገቡ!");

            db.collection("students").where("parentPhone", "==", phone).get().then((snap) => {
                if(snap.empty) { return alert("ተማሪ አልተገኘም!"); }
                loggedInStudentId = snap.docs[0].id;
                document.getElementById('parent-auth-box').classList.add('hidden');
                document.getElementById('parent-dashboard-main').classList.remove('hidden');

                document.getElementById('parent-section-summary').classList.add('hidden');
                document.getElementById('parent-section-report').classList.add('hidden');

                startRealTimeParentListener();
            });
        }

        function startRealTimeParentListener() {
            if(unsubscribeRealTime) unsubscribeRealTime();

            unsubscribeRealTime = db.collection("students").doc(loggedInStudentId).onSnapshot((doc) => {
                if (isUserTypingOrDrawing) return;

                if(!doc.exists) return;
                currentStudentData = doc.data();
                document.getElementById('display-student-name').innerText = `ተማሪ: ${currentStudentData.studentName}`;
                document.getElementById('display-student-info').innerText = `ክፍል: ${currentStudentData.section || '5A'} | መምህር: ${currentStudentData.teacherName}`;

                calculateParentAttendance(currentParentTab);
                renderParentTable();
            });
        }

        function switchParentSection(section) {
            const sumSection = document.getElementById('parent-section-summary');
            const repSection = document.getElementById('parent-section-report');
            const sumBtn = document.getElementById('tab-summary-btn');
            const repBtn = document.getElementById('tab-report-btn');

            const defaultBtnClass = "flex-1 py-4 px-4 rounded-2xl font-black text-xs shadow-sm bg-gray-200 text-gray-700 hover:bg-gray-300 border border-gray-300 transition-all flex items-center justify-center gap-2";
            const activeBtnClass = "flex-1 py-4 px-4 rounded-2xl font-black text-xs shadow-md bg-[#0d7a70] text-white border border-[#0d7a70] transition-all flex items-center justify-center gap-2";

            if (section === 'summary') {
                if (!sumSection.classList.contains('hidden')) {
                    sumSection.classList.add('hidden');
                    sumBtn.className = defaultBtnClass;
                } else {
                    sumSection.classList.remove('hidden');
                    repSection.classList.add('hidden');
                    sumBtn.className = activeBtnClass;
                    repBtn.className = defaultBtnClass;
                }
            } else if (section === 'report') {
                if (!repSection.classList.contains('hidden')) {
                    repSection.classList.add('hidden');
                    repBtn.className = defaultBtnClass;
                } else {
                    repSection.classList.remove('hidden');
                    sumSection.classList.add('hidden');
                    repBtn.className = activeBtnClass;
                    sumBtn.className = defaultBtnClass;
                    
                    renderParentTable();
                }
            }
        }

        function calculateParentAttendance(tab) {
            currentParentTab = tab; if(!currentStudentData) return;

            if(tab === 'monthly') {
                document.getElementById('p-att-btn-monthly').className = "bg-[#0d7a70] text-white px-4 py-2 rounded-lg text-xs font-black shadow-sm flex-1 sm:flex-none";
                document.getElementById('p-att-btn-yearly').className = "text-gray-600 px-4 py-2 rounded-lg text-xs font-black flex-1 sm:flex-none";
            } else {
                document.getElementById('p-att-btn-yearly').className = "bg-[#0d7a70] text-white px-4 py-2 rounded-lg text-xs font-black shadow-sm flex-1 sm:flex-none";
                document.getElementById('p-att-btn-monthly').className = "text-gray-600 px-4 py-2 rounded-lg text-xs font-black flex-1 sm:flex-none";
            }

            let history = currentStudentData.yearlyHistory || [];
            
            if(tab === 'monthly') {
                const currentMonth = new Date().getMonth();
                const currentYear = new Date().getFullYear();
                history = history.filter(r => {
                    const parts = r.date.split('/');
                    if(parts.length === 3) {
                        const rMonth = parseInt(parts[1]) - 1;
                        const rYear = parseInt(parts[2]);
                        return rMonth === currentMonth && rYear === currentYear;
                    }
                    return true;
                });
            }

            let absentCount = 0; let lateCount = 0; let presentCount = 0;
            history.forEach(r => {
                if(r.status === 'ቀርቷል' || r.status === 'በፍቃድ ቀርቷል') absentCount++;
                else if(r.status && r.status.includes('አርፍዷል')) lateCount++;
                else if(r.status === 'መጥቷል') presentCount++;
            });

            document.getElementById('p-count-absent').innerText = `${absentCount} ቀን`;
            document.getElementById('p-count-late').innerText = `${lateCount} ቀን`;
            document.getElementById('p-count-present').innerText = `${presentCount} ቀን`;
        }

        // 🎛️ የመጋዘን ታቦችን መቀያየሪያ
        function switchWarehouseTab(tab) {
            warehouseActiveTab = tab;
            ['daily', 'monthly', 'yearly'].forEach(t => {
                const btn = document.getElementById(`p-wh-${t}`);
                if(t === tab) {
                    btn.className = "bg-[#0d7a70] text-white px-3 py-1.5 rounded-lg text-[11px] font-black shadow-sm transition-all flex-1 sm:flex-none";
                } else {
                    btn.className = "text-gray-600 px-3 py-1.5 rounded-lg text-[11px] font-black transition-all flex-1 sm:flex-none";
                }
            });
            renderParentTable();
        }

        // 🔄 የወላጅ መጋዘን ሰንጠረዥን ማጣሪያዎችን አካትቶ መሳያ
        function renderParentTable() {
            const tbody = document.getElementById('parent-history-table-body'); if(!tbody) return;
            const btn = document.getElementById('submit-feedback-btn');
            tbody.innerHTML = "";
            btn.classList.add('hidden');

            if(!currentStudentData || !currentStudentData.yearlyHistory) {
                tbody.innerHTML = `<tr><td colspan="12" class="p-4 text-gray-400 italic">ምንም መረጃ አልተገኘም።</td></tr>`;
                return;
            }

            const todayStr = new Date().toLocaleDateString('am-ET');
            const currentMonth = new Date().getMonth();
            const currentYear = new Date().getFullYear();

            // ሁሉንም የሪፖርት ታሪኮች እንወስዳለን
            let recordsToRender = currentStudentData.yearlyHistory;

            // 🔍 በተመረጠው ታብ መሰረት ማጣሪያ
            if (warehouseActiveTab === 'daily') {
                recordsToRender = recordsToRender.filter(r => r.date === todayStr);
            } else if (warehouseActiveTab === 'monthly') {
                recordsToRender = recordsToRender.filter(r => {
                    const parts = r.date.split('/');
                    if(parts.length === 3) {
                        const rMonth = parseInt(parts[1]) - 1;
                        const rYear = parseInt(parts[2]);
                        return rMonth === currentMonth && rYear === currentYear;
                    }
                    return false;
                });
            } else if (warehouseActiveTab === 'yearly') {
                recordsToRender = recordsToRender.filter(r => {
                    const parts = r.date.split('/');
                    if(parts.length === 3) {
                        const rYear = parseInt(parts[2]);
                        return rYear === currentYear;
                    }
                    return false;
                });
            }

            if(recordsToRender.length === 0) {
                tbody.innerHTML = `<tr><td colspan="12" class="p-4 text-gray-400 italic">በዚህ የጊዜ ገደብ ውስጥ ምንም ሪፖርት አልተገኘም።</td></tr>`;
                return;
            }

            // አዳዲሶቹ ከላይ እንዲመጡ Reverse እናደርጋቸዋለን
            recordsToRender.slice().reverse().forEach((h) => {
                const isSigned = h.parentSignature ? true : false;
                const isToday = h.date === todayStr;

                let commentTd = "";
                let signatureTd = "";

                // ወላጅ ከፈረመ መረጃውን ዝም ብሎ ያሳያል
                if (isSigned) {
                    commentTd = `<td class="p-3 bg-amber-50/20 italic text-amber-950">${h.parentComment || 'አስተያየት የለም'}</td>`;
                    signatureTd = `<td class="p-3 bg-amber-50/20"><img src="${h.parentSignature}" class="h-8 mx-auto object-contain bg-white rounded border"></td>`;
                } else {
                    // ካልፈረመና ሪፖርቱ የዛሬ ከሆነ ብቻ በሰንጠረዡ ውስጥ መጻፊያና መፈረሚያ ያሳያል
                    if (isToday) {
                        commentTd = `
                            <td class="p-2 bg-amber-50/40 w-44">
                                <textarea id="parentCommentInput" rows="2" onfocus="isUserTypingOrDrawing=true" placeholder="አስተያየት እዚህ ይጻፉ..." class="w-full p-1.5 border border-amber-200 rounded-lg text-[10px] bg-white outline-none font-bold text-gray-800 resize-none shadow-inner"></textarea>
                            </td>`;
                        signatureTd = `
                            <td class="p-2 bg-amber-50/40 w-52">
                                <div class="flex justify-end mb-0.5">
                                    <button onclick="clearParentCanvas()" class="text-[8px] bg-amber-200 hover:bg-amber-300 text-amber-900 px-1 py-0.5 rounded font-bold">አጥፋ</button>
                                </div>
                                <canvas id="parentSignCanvas" class="w-full h-12 bg-white border border-amber-300 rounded-lg touch-none shadow-inner"></canvas>
                            </td>`;
                        btn.classList.remove('hidden'); // የማጽደቂያ በተኑን አሳይ
                    } else {
                        // የድሮ ቀን ሆኖ ወላጅ ካልፈረመበት ባዶ ሆኖ ያልፋል
                        commentTd = `<td class="p-3 bg-gray-100 text-gray-400 italic">ያልተሞላ</td>`;
                        signatureTd = `<td class="p-3 bg-gray-100 text-gray-400 italic">🔄 አልተፈረመም</td>`;
                    }
                }

                tbody.innerHTML += `
                    <tr class="border-b hover:bg-slate-50 font-bold text-gray-700">
                        <td class="p-3 bg-gray-50/50">${h.date || '---'}</td>
                        <td class="p-3 text-left text-[#0d7a70]">${currentStudentData.studentName}</td>
                        <td class="p-3">${h.status || '---'}</td>
                        <td class="p-3 bg-emerald-50/30 text-emerald-950">${h.chapter || '---'}</td>
                        <td class="p-3 bg-emerald-50/30 font-mono">${h.fromVerse || '0'} - ${h.toVerse || '0'}</td>
                        <td class="p-3 text-rose-600">${h.mistakes ?? '0'}</td>
                        <td class="p-3 text-xs">${h.stutter || '---'}</td>
                        <td class="p-3 text-xs">${h.tajweed || '---'}</td>
                        <td class="p-3 italic">"${h.teacherComment || 'አስተያየት የለም'}"</td>
                        <td class="p-3">${h.teacherSignature ? `<img src="${h.teacherSignature}" class="h-8 mx-auto object-contain bg-white rounded border">` : '---'}</td>
                        ${commentTd}
                        ${signatureTd}
                    </tr>`;
            });

            // የዛሬው ሪፖርት ካለና ያልተፈረመ ከሆነ የካንቫስ መሳያውን አንቃው
            const hasTodayUnsigned = recordsToRender.some(r => r.date === todayStr && !r.parentSignature);
            if (hasTodayUnsigned) {
                setTimeout(initParentCanvas, 300);
            }
        }

        function initParentCanvas() {
            canvas = document.getElementById('parentSignCanvas'); if(!canvas) return;
            ctx = canvas.getContext('2d');
            
            canvas.width = canvas.clientWidth || 200; 
            canvas.height = 48;
            
            ctx.strokeStyle = "#9a3412"; 
            ctx.lineWidth = 2.5; ctx.lineCap = "round"; ctx.lineJoin = "round";

            function getPos(e) { 
                const rect = canvas.getBoundingClientRect(); 
                if (e.touches && e.touches.length > 0) { 
                    return { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top }; 
                } 
                return { x: e.clientX - rect.left, y: e.clientY - rect.top }; 
            }
            
            function startDraw(e) { 
                e.preventDefault(); 
                isUserTypingOrDrawing = true; 
                drawing = true; 
                const p = getPos(e); 
                ctx.beginPath(); 
                ctx.moveTo(p.x, p.y); 
            }
            
            function moveDraw(e) { 
                if(!drawing) return; 
                e.preventDefault(); 
                const p = getPos(e); 
                ctx.lineTo(p.x, p.y); 
                ctx.stroke(); 
            }
            
            canvas.onmousedown = startDraw; 
            canvas.onmousemove = moveDraw; 
            canvas.onmouseup = () => drawing = false; 
            canvas.onmouseleave = () => drawing = false;
            
            canvas.addEventListener('touchstart', startDraw, { passive: false }); 
            canvas.addEventListener('touchmove', moveDraw, { passive: false }); 
            canvas.addEventListener('touchend', () => drawing = false);
        }

        function clearParentCanvas() { if(ctx) ctx.clearRect(0, 0, canvas.width, canvas.height); }
        function isCanvasBlank() { return canvas.getContext('2d').getImageData(0,0,canvas.width,canvas.height).data.every(p => p === 0); }

        function submitParentFeedback() {
            if(!loggedInStudentId || !currentStudentData) return;
            const pComment = document.getElementById('parentCommentInput').value.trim();
            if(isCanvasBlank()) return alert("እባክዎ በሰንጠረዡ ውስጥ ባለው ክፍት ቦታ ላይ በጣትዎ ይፈርሙ!");

            const pSignatureData = canvas.toDataURL();
            const todayStr = new Date().toLocaleDateString('am-ET');

            // በታሪክ (yearlyHistory) ዝርዝር ውስጥ የዛሬውን ሪፖርት አግኝቶ ማሻሻል
            let updatedHistory = currentStudentData.yearlyHistory || [];
            let foundIndex = updatedHistory.findIndex(r => r.date === todayStr);

            if (foundIndex !== -1) {
                updatedHistory[foundIndex].parentComment = pComment || "ታይቷል";
                updatedHistory[foundIndex].parentSignature = pSignatureData;
                updatedHistory[foundIndex].parentApproved = true;

                // የዕለቱን ዋና ሪፖርት (dailyReport) ማሻሻል
                let updatedDaily = currentStudentData.dailyReport;
                if (updatedDaily && updatedDaily.date === todayStr) {
                    updatedDaily.parentComment = pComment || "ታይቷል";
                    updatedDaily.parentSignature = pSignatureData;
                    updatedDaily.parentApproved = true;
                }

                isUserTypingOrDrawing = false;

                db.collection("students").doc(loggedInStudentId).update({
                    dailyReport: updatedDaily,
                    yearlyHistory: updatedHistory
                }).then(() => {
                    alert("አስተያየትና ፊርማዎ በተሳካ ሁኔታ በሰንጠረዡ ውስጥ ጸድቋል!");
                    startRealTimeParentListener(); 
                }).catch(err => {
                    isUserTypingOrDrawing = true;
                    alert("ስህተት አጋጥሟል: " + err.message);
                });
            } else {
                alert("ለዛሬ ገና መምህሩ ሪፖርት አላስገባም!");
            }
        }

        function logoutParent() { 
            if(unsubscribeRealTime) unsubscribeRealTime();
            loggedInStudentId = ""; 
            currentStudentData = null; 
            isUserTypingOrDrawing = false;
            document.getElementById('parent-dashboard-main').classList.add('hidden'); 
            document.getElementById('parent-auth-box').classList.remove('hidden'); 
        }
    </script>
</body>
</html>
