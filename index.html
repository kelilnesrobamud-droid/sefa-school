<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safe School - Welcome</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-100 font-sans flex flex-col justify-between min-h-screen">

    <div class="bg-indigo-900 p-10 rounded-b-[50px] text-white text-center shadow-xl">
        <div class="w-20 h-20 bg-yellow-400 rounded-3xl mx-auto flex items-center justify-center shadow-lg mb-4">
            <i class="fas fa-school text-indigo-900 text-4xl"></i>
        </div>
        <h1 class="text-3xl font-black tracking-wide italic text-yellow-400">SAFE SCHOOL</h1>
        <p class="text-xs text-indigo-200 font-bold mt-2">የተማሪዎች ክትትልና የክፍያ መቆጣጠሪያ ሲስተም</p>
    </div>

    <div class="px-6 max-w-md mx-auto w-full space-y-4 my-8">
        <p class="text-[10px] font-black text-gray-400 uppercase text-center italic tracking-wider">ለመግባት አንዱን ይምረጡ</p>
        
        <a href="parent.html" class="flex items-center justify-between bg-white p-5 rounded-[24px] shadow-sm border border-gray-100 hover:shadow-md transition active:scale-98">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-emerald-100 rounded-2xl flex items-center justify-center text-emerald-600 text-xl">
                    <i class="fas fa-user-friends"></i>
                </div>
                <div>
                    <h3 class="font-black text-gray-800 text-sm">የወላጅ ገጽ</h3>
                    <p class="text-[10px] text-gray-400 font-bold">የክትትልና ውጤት መረጃ መመልከቻ</p>
                </div>
            </div>
            <i class="fas fa-chevron-right text-gray-300 text-xs"></i>
        </a>

        <a href="teacher.html" class="flex items-center justify-between bg-white p-5 rounded-[24px] shadow-sm border border-gray-100 hover:shadow-md transition active:scale-98">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-indigo-100 rounded-2xl flex items-center justify-center text-indigo-600 text-xl">
                    <i class="fas fa-user-graduate"></i>
                </div>
                <div>
                    <h3 class="font-black text-gray-800 text-sm">የአስተማሪ ገጽ</h3>
                    <p class="text-[10px] text-gray-400 font-bold">የዕለት ተዕለት መገኘትና ውጤት መመዝገቢያ</p>
                </div>
            </div>
            <i class="fas fa-chevron-right text-gray-300 text-xs"></i>
        </a>

        <a href="admin.html" class="flex items-center justify-between bg-white p-5 rounded-[24px] shadow-sm border border-gray-100 hover:shadow-md transition active:scale-98">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-amber-100 rounded-2xl flex items-center justify-center text-amber-600 text-xl">
                    <i class="fas fa-user-shield"></i>
                </div>
                <div>
                    <h3 class="font-black text-gray-800 text-sm">የአድሚን ገጽ (Secure)</h3>
                    <p class="text-[10px] text-gray-400 font-bold">ተማሪ ለመመዝገብና ክፍያ ለመቆጣጠር</p>
                </div>
            </div>
            <i class="fas fa-chevron-right text-gray-300 text-xs"></i>
        </a>
    </div>

    <div class="text-center pb-6 text-gray-300 font-bold text-[10px] tracking-widest italic">
        POWERED BY SAFE SCHOOL &copy; 2026
    </div>

</body>
</html>
