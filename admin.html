<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>የአስተዳዳሪ (Supervisor) የሪፖርት ማዕከል</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
</head>
<body class="bg-gray-100 min-h-screen font-sans">

    <header class="bg-teal-800 text-white p-4 shadow-md flex justify-between items-center">
        <h1 class="text-xl font-bold">የአስተዳዳሪ (Supervisor) የሪፖርት ማዕከል</h1>
        <a href="index.html" class="bg-teal-900 px-4 py-2 rounded text-sm hover:bg-black">ውጣ</a>
    </header>

    <main class="max-w-6xl mx-auto p-4 space-y-6">
        
        <div id="admin-login" class="bg-white p-6 rounded-lg shadow-md max-w-md mx-auto mt-10">
            <h2 class="text-lg font-bold mb-4 text-gray-700 text-center">የአስተዳዳሪ መግቢያ</h2>
            <input type="email" id="admin-email" placeholder="ኢሜል ያስገቡ" class="w-full p-2 border rounded mb-3 focus:outline-teal-500">
            <input type="password" id="admin-password" placeholder="ይለፍ ቃል" class="w-full p-2 border rounded mb-4 focus:outline-teal-500">
            <button onclick="loginAdmin()" class="w-full bg-teal-600 text-white py-2 rounded hover:bg-teal-700 font-bold">ግባ</button>
        </div>

        <div id="admin-dashboard" class="hidden space-y-6">
            
            <div class="border-b pb-2">
                <h2 class="text-xl font-bold text-gray-800">📊 የዛሬ ዕለታዊ ጥቅል ሪፖርት</h2>
                <p class="text-xs text-gray-500" id="today-date-display"></p>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="bg-green-500 text-white p-6 rounded-xl shadow-md flex justify-between items-center">
                    <div>
                        <h3 class="text-lg font-medium opacity-90">በሰዓቱ የመጡ</h3>
                        <p class="text-4xl font-extrabold mt-2" id="box-on-time">0</p>
                    </div>
                    <span class="text-3xl">✅</span>
                </div>
                <div class="bg-amber-500 text-white p-6 rounded-xl shadow-md flex justify-between items-center">
                    <div>
                        <h3 class="text-lg font-medium opacity-90">ያረፈዱ (አርፋጅ)</h3>
                        <p class="text-4xl font-extrabold mt-2" id="box-late">0</p>
                    </div>
                    <span class="text-3xl">⚠️</span>
                </div>
                <div class="bg-red-500 text-white p-6 rounded-xl shadow-md flex justify-between items-center">
                    <div>
                        <h3 class="text-lg font-medium opacity-90">የቀሩ (ቀሪ)</h3>
                        <p class="text-4xl font-extrabold mt-2" id="box-absent">0</p>
                    </div>
                    <span class="text-3xl">❌</span>
                </div>
            </div>

            <div class="border-b pb-1 pt-4">
                <h2 class="text-xl font-bold text-gray-800">⏱️ የክትትል ታሪክ ጊዜያት (Analytics)</h2>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="bg-white p-4 rounded-lg shadow border border-gray-200">
                    <h3 class="font-bold text-teal-800 border-b pb-2 mb-2">📌 ዕለታዊ የክትትል ዝርዝር</h3>
                    <div class="overflow-y-auto max-h-60 text-sm space-y-2" id="daily-list">
                        <p class="text-gray-400 text-center py-4">የዛሬ መረጃ በመጫን ላይ...</p>
                    </div>
                </div>

                <div class="bg-white p-4 rounded-lg shadow border border-gray-200">
                    <h3 class="font-bold text-blue-800 border-b pb-2 mb-2">📅 የዚህ ወር (30 ቀን) ጥቅል ሪፖርት</h3>
                    <div class="overflow-y-auto max-h-60 text-sm space-y-2" id="monthly-list">
                        <p class="text-gray-400 text-center py-4">የወር መረጃ በመጫን ላይ...</p>
                    </div>
                </div>

                <div class="bg-white p-4 rounded-lg shadow border border-gray-200">
                    <h3 class="font-bold text-purple-800 border-b pb-2 mb-2">🏢 የዓመቱ አጠቃላይ ማጠቃለያ</h3>
                    <div class="overflow-y-auto max-h-60 text-sm space-y-2" id="yearly-list">
                        <p class="text-gray-400 text-center py-4">የዓመት መረጃ በመጫን ላይ...</p>
                    </div>
                </div>
            </div>

            <div class="bg-white p-6 rounded-lg shadow-md mt-6">
                <h2 class="text-lg font-bold text-gray-800 mb-4">🆕 አዲስ ተማሪ ምዝገባ</h2>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-3">
                    <input type="text" id="stud-name" placeholder="የተማሪ ስም" class="p-2 border rounded text-sm">
                    <input type="text" id="stud-teacher" placeholder="የመምህር ስም" class="p-2 border rounded text-sm">
                    <input type="text" id="stud-parent" placeholder="የወላጅ ስም" class="p-2 border rounded text-sm">
                    <select id="stud-payment" class="p-2 border rounded text-sm bg-white">
                        <option value="Unpaid">ክፍያ አልተከፈለም</option>
                        <option value="Paid">ክፍያ ተከፍሏል</option>
                    </select>
                </div>
                <button onclick="addStudent()" class="mt-4 bg-teal-600 text-white px-5 py-2 rounded text-sm font-bold hover:bg-teal-700">ተማሪውን መዝግብ</button>
            </div>

        </div>
    </main>

    <script>
        // ያንተ እውነተኛ የFirebase ቁልፍ በታማኝነት እዚህ ገብቷል!
        const firebaseConfig = {
            apiKey: "AIzaSyAs8Z3L9-o-9gWq6hK_Y7x_X9pM4E3v2A",
            authDomain: "sefa-school.firebaseapp.com",
            projectId: "sefa-school",
            storageBucket: "sefa-school.appspot.com",
            messagingSenderId: "384729104829",
            appId: "1:384729104829:web:c8f8b8a8e8d8c8b8a8e8d8"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        const today = new Date().toISOString().split('T')[0];
        document.getElementById('today-date-display').innerText = "ቀን፦ " + new Date().toLocaleDateString('am-ET');

        function loginAdmin() {
            const email = document.getElementById('admin-email').value.trim();
            const password = document.getElementById('admin-password').value.trim();

            auth.signInWithEmailAndPassword(email, password)
            .then(() => {
                document.getElementById('admin-login').classList.add('hidden');
                document.getElementById('admin-dashboard').classList.remove('hidden');
                loadLiveReports();
            })
            .catch(err => {
                alert("የመግቢያ ስህተት፦ " + err.message);
            });
        }

        function loadLiveReports() {
            db.collection("attendance").where("date", "==", today)
            .onSnapshot(snapshot => {
                let onTimeCount = 0;
                let lateCount = 0;
                let absentCount = 0;
                
                const dailyDiv = document.getElementById('daily-list');
                dailyDiv.innerHTML = "";

                if(snapshot.empty) {
                    dailyDiv.innerHTML = `<p class="text-gray-400 text-center py-4">ለዛሬ እስካሁን ምንም መረጃ አልገባም</p>`;
                }

                snapshot.forEach(doc => {
                    const att = doc.data();
                    let minutesBadge = "";
                    if (att.status === "On Time") {
                        onTimeCount++;
                        minutesBadge = `<span class="bg-green-100 text-green-800 text-xs px-2 py-0.5 rounded font-bold">በሰዓቱ (0 ደቂቃ)</span>`;
                    } else if (att.status === "Absent") {
                        absentCount++;
                        minutesBadge = `<span class="bg-red-100 text-red-800 text-xs px-2 py-0.5 rounded font-bold">ቀርቷል</span>`;
                    } else {
                        lateCount++;
                        minutesBadge = `<span class="bg-amber-100 text-amber-800 text-xs px-2 py-0.5 rounded font-bold">ያረፈደበት ጊዜ፦ ${att.status}</span>`;
                    }

                    dailyDiv.innerHTML += `
                        <div class="p-2 border-b flex justify-between items-center bg-gray-50 rounded">
                            <span class="font-medium text-gray-800">${att.studentName}</span>
                            ${minutesBadge}
                        </div>
                    `;
                });

                document.getElementById('box-on-time').innerText = onTimeCount;
                document.getElementById('box-late').innerText = lateCount;
                document.getElementById('box-absent').innerText = absentCount;
            });

            db.collection("attendance").orderBy("date", "desc").limit(150)
            .onSnapshot(snapshot => {
                const monthlyDiv = document.getElementById('monthly-list');
                monthlyDiv.innerHTML = "";
                let studentStats = {};

                snapshot.forEach(doc => {
                    const att = doc.data();
                    if(!studentStats[att.studentName]) {
                        studentStats[att.studentName] = { onTime: 0, lates: 0, absents: 0 };
                    }
                    if(att.status === "On Time") studentStats[att.studentName].onTime++;
                    else if(att.status === "Absent") studentStats[att.studentName].absents++;
                    else studentStats[att.studentName].lates++;
                });

                for (let student in studentStats) {
                    monthlyDiv.innerHTML += `
                        <div class="p-2 border-b bg-blue-50/50 rounded text-xs space-y-1">
                            <p class="font-bold text-gray-800">${student}</p>
                            <p class="text-gray-600">በሰዓቱ፦ ${studentStats[student].onTime} ቀን | አርፋጅ፦ ${studentStats[student].lates} ቀን | ቀሪ፦ ${studentStats[student].absents} ቀን</p>
                        </div>
                    `;
                }
            });

            db.collection("students").onSnapshot(snapshot => {
                const yearlyDiv = document.getElementById('yearly-list');
                yearlyDiv.innerHTML = "";
                let paid = 0, unpaid = 0;
                
                snapshot.forEach(doc => {
                    const s = doc.data();
                    if(s.paymentStatus === "Paid") paid++; else unpaid++;
                });

                yearlyDiv.innerHTML = `
                    <div class="p-3 bg-purple-50 rounded space-y-2 text-gray-700">
                        <p class="font-medium">🏢 ጠቅላላ በሲስተሙ ያሉ ተማሪዎች፦ <span class="font-bold text-purple-900">${snapshot.size}</span></p>
                        <p class="text-sm">💳 ጠቅላላ ዓመታዊ የክፍያ ሁኔታ፦</p>
                        <div class="flex space-x-2 text-xs">
                            <span class="bg-green-200 text-green-900 px-2 py-1 rounded font-bold">የከፈሉ፦ ${paid}</span>
                            <span class="bg-red-200 text-red-900 px-2 py-1 rounded font-bold">ያልከፈሉ፦ ${unpaid}</span>
                        </div>
                    </div>
                `;
            });
        }

        function addStudent() {
            const name = document.getElementById('stud-name').value.trim();
            const teacher = document.getElementById('stud-teacher').value.trim();
            const parent = document.getElementById('stud-parent').value.trim();
            const paymentStatus = document.getElementById('stud-payment').value;

            if(!name || !teacher || !parent) return alert("እባክዎ ሁሉንም ያሟሉ");

            db.collection("students").add({
                name: name,
                teacher: teacher,
                parent: parent,
                paymentStatus: paymentStatus
            }).then(() => {
                alert("ተማሪው በተሳካ ሁኔታ ተመዝግቧል!");
                document.getElementById('stud-name').value = "";
            });
        }
    </script>
</body>
</html>
