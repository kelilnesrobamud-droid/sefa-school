<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safe School - Admin Secure</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-100 pb-20 font-sans">

    <div id="loginSection" class="fixed inset-0 bg-indigo-950 flex items-center justify-center p-6 z-50">
        <div class="bg-white p-8 rounded-[40px] shadow-2xl w-full max-w-md space-y-6 text-center">
            <div>
                <a href="index.html" class="inline-block mb-4 text-xs bg-gray-100 px-3 py-2 rounded-xl font-bold text-indigo-900 shadow-sm">
                    <i class="fas fa-home mr-1"></i> ወደ ዋናው ገጽ
                </a>
                <h2 class="text-2xl font-black text-indigo-950 italic">አድሚን መግቢያ</h2>
                <p class="text-xs text-gray-400 font-bold mt-1">እባክዎ ኢሜል እና ፓስወርድዎን ያስገቡ</p>
            </div>
            <div class="space-y-3 text-left">
                <input type="email" id="adminEmail" placeholder="ኢሜል (Email)" class="w-full p-4 rounded-2xl border outline-none font-bold text-sm bg-gray-50 focus:border-indigo-500">
                <input type="password" id="adminPass" placeholder="ፓስወርድ (Password)" class="w-full p-4 rounded-2xl border outline-none font-bold text-sm bg-gray-50 focus:border-indigo-500">
            </div>
            <button id="adminLoginBtn" class="w-full bg-indigo-600 text-white p-4 rounded-2xl font-black shadow-lg hover:bg-indigo-700 transition active:scale-95">
                <i class="fas fa-sign-in-alt mr-2"></i> ግባ
            </button>
        </div>
    </div>

    <div id="adminDashboard" class="hidden">
        <div class="bg-indigo-900 p-6 rounded-b-[40px] text-white shadow-xl flex flex-col gap-4">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <a href="index.html" class="text-xs bg-indigo-950/40 px-3 py-2 rounded-xl font-bold text-white shadow-sm">
                        <i class="fas fa-home"></i>
                    </a>
                    <h1 class="text-xl font-black italic text-yellow-400 underline">አድሚን ገጽ</h1>
                </div>
                <button id="logoutBtn" class="text-xs bg-rose-600 px-3 py-2 rounded-xl font-black shadow"><i class="fas fa-sign-out-alt"></i> ውጣ</button>
            </div>
            <div class="relative">
                <input type="text" id="adminSearch" onkeyup="searchStudents()" placeholder="ተማሪ በስም ወይም በስልክ..." class="w-full p-3 pl-10 rounded-2xl border-none text-gray-800 outline-none text-sm font-bold shadow-lg">
                <i class="fas fa-search absolute left-4 top-4 text-gray-400"></i>
            </div>
        </div>

        <div class="px-5 mt-6 space-y-4">
            <div class="bg-white rounded-3xl shadow-sm border overflow-hidden p-5 space-y-3">
                <p class="font-black text-indigo-700 text-sm italic">አዲስ ተማሪ መዝግብ</p>
                <input type="text" id="sName" placeholder="የተማሪ ስም" class="w-full p-3 rounded-xl border outline-none text-sm font-bold bg-gray-50">
                <input type="tel" id="pPhone" placeholder="የወላጅ ስልክ" class="w-full p-3 rounded-xl border outline-none text-sm font-bold bg-gray-50">
                <input type="text" id="tName" placeholder="የመምህር ስም" class="w-full p-3 rounded-xl border outline-none text-sm font-bold bg-gray-50">
                <button id="addStudentBtn" class="w-full bg-indigo-600 text-white p-3 rounded-xl font-black shadow-md">መዝግብ</button>
            </div>
            
            <div id="studentContainer" class="space-y-4"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyBKw3ektgxdfvqcO-JHzJwjvfSkc-K_41A", authDomain: "safe-school-b3f87.firebaseapp.com", projectId: "safe-school-b3f87", storageBucket: "safe-school-b3f87.firebasestorage.app", messagingSenderId: "43051328645", appId: "1:43051328645:web:2664448d0b43a293daf5ec" };
        const app = initializeApp(firebaseConfig); 
        const db = getFirestore(app);
        const auth = getAuth(app);

        const amharicMonths = ["መስከረም", "ጥቅምት", "ኅዳር", "ታኅሣሥ", "ጥር", "የካቲት", "መጋቢት", "ሚያዝያ", "ግንቦት", "ሰኔ", "ሐምሌ", "ነሐሴ"];

        document.getElementById('adminLoginBtn').onclick = async () => {
            const email = document.getElementById('adminEmail').value.trim();
            const pass = document.getElementById('adminPass').value.trim();
            if(!email || !pass) return alert("እባክዎ ኢሜል እና ፓስወርድ ይሙሉ!");
            try {
                await signInWithEmailAndPassword(auth, email, pass);
            } catch (error) {
                alert("የተሳሳተ ኢሜል ወይም ፓስወርድ አስገብተዋል!");
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('adminDashboard').classList.remove('hidden');
                loadDashboardData();
            } else {
                document.getElementById('loginSection').classList.remove('hidden');
                document.getElementById('adminDashboard').classList.add('hidden');
            }
        });

        document.getElementById('logoutBtn').onclick = () => { signOut(auth); };

        document.getElementById('addStudentBtn').onclick = async () => {
            const name = document.getElementById('sName').value; const phone = document.getElementById('pPhone').value; const teacher = document.getElementById('tName').value;
            if(!name || !phone || !teacher) return alert("ሁሉንም ይሙሉ");
            await addDoc(collection(db, "students"), { studentName: name, parentPhone: phone, assignedTeacher: teacher, paidMonths: [], examScore: "---", lastAttendance: "---", lateMinutes: "0", attendanceDate: "---", examDate: "---" });
            alert("ተማሪው ተመዝግቧል!");
            document.getElementById('sName').value = ""; document.getElementById('pPhone').value = ""; document.getElementById('tName').value = "";
        };

        function loadDashboardData() {
            onSnapshot(collection(db, "students"), (snap) => {
                const container = document.getElementById('studentContainer'); container.innerHTML = "";
                snap.forEach(d => {
                    const data = d.data(); const id = d.id; const paid = data.paidMonths || [];
                    container.innerHTML += `
                        <div class="student-card bg-white p-5 rounded-[30px] border shadow-sm" data-name="${data.studentName}" data-phone="${data.parentPhone}">
                            <div class="flex justify-between font-black text-sm mb-3"><span>${data.studentName}</span><button onclick="del('${id}')" class="text-rose-400"><i class="fas fa-trash"></i></button></div>
                            <button onclick="document.getElementById('pay_${id}').classList.toggle('hidden')" class="w-full bg-gray-50 p-2 rounded-xl text-[10px] font-black mb-2 border">ክፍያ ለመቆጣጠር ይጫኑ</button>
                            <div id="pay_${id}" class="hidden grid grid-cols-3 gap-2">
                                ${amharicMonths.map(m => `<button onclick="pay('${id}','${m}',${JSON.stringify(paid).replace(/"/g, '&quot;')})" class="p-2 rounded-lg text-[9px] font-black border ${paid.includes(m) ? 'bg-emerald-500 text-white' : 'bg-white text-gray-300'}">${m}</button>`).join('')}
                            </div>
                        </div>`;
                });
            });
        }

        window.pay = async (id, m, p) => { let up = p.includes(m) ? p.filter(x => x !== m) : [...p, m]; await updateDoc(doc(db, "students", id), { paidMonths: up }); };
        window.del = async (id) => { if(confirm("ይጥፋ?")) await deleteDoc(doc(db, "students", id)); };
        window.searchStudents = () => { let t = document.getElementById('adminSearch').value.toLowerCase(); document.querySelectorAll('.student-card').forEach(c => c.style.display = (c.dataset.name.toLowerCase().includes(t) || c.dataset.phone.includes(t)) ? "block" : "none"); };
    </script>
</body>
</html>
