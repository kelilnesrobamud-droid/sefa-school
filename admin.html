<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>የአስተዳዳሪ (Supervisor) የሪፖርት ማዕከል</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
</head>
<body class="bg-gray-100 min-h-screen font-sans pb-10">

    <header class="bg-[#0d7a70] text-white p-6 rounded-b-[40px] shadow-2xl text-center">
        <div class="flex justify-between items-center max-w-4xl mx-auto">
            <a href="index.html" class="bg-black/20 px-4 py-2 rounded-xl text-xs font-bold hover:bg-black/4"><i class="fas fa-home"></i> ዋና ገጽ</a>
            <h1 class="text-xl font-black italic text-yellow-300">የአስተዳዳሪ (Supervisor) ዳሽቦርድ</h1>
            <div class="w-10"></div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4 space-y-4">
        
        <div id="admin-login" class="bg-white p-6 rounded-[35px] shadow-lg max-w-md mx-auto mt-10 border">
            <h2 class="text-lg font-black mb-4 text-[#0d7a70] text-center italic">የአስተዳዳሪ መግቢያ</h2>
            <input type="email" id="admin-email" placeholder="የአድሚን ኢሜል" class="w-full p-3 border rounded-2xl mb-3 focus:outline-none focus:ring-2 focus:ring-[#0d7a70] font-bold text-center">
            <input type="password" id="admin-password" placeholder="ይለፍ ቃል" class="w-full p-3 border rounded-2xl mb-4 focus:outline-none focus:ring-2 focus:ring-[#0d7a70] font-bold text-center">
            <button onclick="loginAdmin()" class="w-full bg-indigo-600 text-white py-3 rounded-2xl hover:bg-indigo-700 font-black italic shadow-md">ግባ</button>
        </div>

        <div id="admin-dashboard" class="hidden space-y-4">
            
            <div class="bg-white p-4 rounded-3xl shadow border-2 border-[#0d7a70] space-y-2">
                <div class="flex items-center space-x-2">
                    <i class="fas fa-search text-[#0d7a70] pl-2 text-base"></i>
                    <input type="text" id="admin-search-input" oninput="triggerLiveSearch()" placeholder="የተማሪ ስም እዚህ ይፈልጉ (የመጣበትን፣ የቀረበትን እና ያረፈደበትን ቀናት ዝርዝር ያወጣል)..." class="w-full bg-transparent p-1 text-sm font-black outline-none text-gray-800">
                </div>
                <div id="search-analysis-box" class="hidden bg-teal-50/50 p-3 rounded-2xl border border-teal-200 mt-2 text-xs space-y-2">
                    <h4 class="font-black text-[#0d7a70] border-b pb-1 flex justify-between">
                        <span>📊 የክትትል ፍለጋ ትንተና ሪፖርት</span>
                        <span id="searched-student-name" class="text-indigo-700 font-black"></span>
                    </h4>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                        <div class="bg-white p-2.5 rounded-xl border">
                            <p class="font-bold text-gray-700 mb-1">📅 የወርሃዊ ጥቅል ማጠቃለያ</p>
                            <p class="text-gray-600 font-medium">በሰዓቱ፦ <span id="search-m-on-time" class="text-emerald-600 font-bold">0 ቀን</span></p>
                            <p class="text-gray-600 font-medium">ያረፈደ፦ <span id="search-m-late" class="text-amber-600 font-bold">0 ቀን</span></p>
                            <p class="text-gray-600 font-medium">የቀረ፦ <span id="search-m-absent" class="text-rose-600 font-bold">0 ቀን</span></p>
                        </div>
                        <div class="bg-white p-2.5 rounded-xl border">
                            <p class="font-bold text-gray-700 mb-1">🏢 የዓመቱ አጠቃላይ ማጠቃለያ</p>
                            <p class="text-gray-600 font-medium">በሰዓቱ፦ <span id="search-y-on-time" class="text-emerald-600 font-bold">0 ቀን</span></p>
                            <p class="text-gray-600 font-medium">ያረፈደ፦ <span id="search-y-late" class="text-amber-600 font-bold">0 ቀን</span></p>
                            <p class="text-gray-600 font-medium">የቀረ፦ <span id="search-y-absent" class="text-rose-600 font-bold">0 ቀን</span></p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="space-y-2">
                <button onclick="toggleSection('today-summary-box')" class="w-full bg-[#0d7a70] text-white p-4 rounded-[25px] font-black text-xs flex justify-between items-center shadow-md">
                    <span><i class="fas fa-chart-pie mr-1"></i> 📊 የዛሬ ዕለታዊ ጥቅል ሪፖርት ማሳያ</span>
                    <span class="text-[10px] bg-white/20 px-3 py-1 rounded-full font-bold" id="today-date-display"></span>
                </button>
                
                <div id="today-summary-box" class="hidden grid grid-cols-1 md:grid-cols-3 gap-3 p-2 bg-gray-50 rounded-[25px] border">
                    <button onclick="toggleFilter('On Time')" class="bg-emerald-500 text-white p-4 rounded-2xl shadow flex justify-between items-center text-left">
                        <div><h3 class="text-[11px] font-bold opacity-90">በሰዓቱ የመጡ</h3><p class="text-2xl font-black mt-1" id="box-on-time">0</p></div>
                        <span class="text-xl"><i class="fas fa-check-circle"></i></span>
                    </button>
                    <button onclick="toggleFilter('Late')" class="bg-amber-500 text-white p-4 rounded-2xl shadow flex justify-between items-center text-left">
                        <div><h3 class="text-[11px] font-bold opacity-90">ያረፈዱ (አርፋጅ)</h3><p class="text-2xl font-black mt-1" id="box-late">0</p></div>
                        <span class="text-xl"><i class="fas fa-clock"></i></span>
                    </button>
                    <button onclick="toggleFilter('Absent')" class="bg-rose-500 text-white p-4 rounded-2xl shadow flex justify-between items-center text-left">
                        <div><h3 class="text-[11px] font-bold opacity-90">የቀሩ (ቀሪ)</h3><p class="text-2xl font-black mt-1" id="box-absent">0</p></div>
                        <span class="text-xl"><i class="fas fa-times-circle"></i></span>
                    </button>
                </div>
            </div>

            <div id="filter-display-section" class="bg-white p-4 rounded-[25px] shadow border-2 border-dashed border-[#0d7a70] hidden">
                <div class="flex justify-between items-center border-b pb-2 mb-3">
                    <h3 class="font-black text-gray-800 italic text-xs" id="filter-title">የተማሪዎች ዝርዝር</h3>
                    <button onclick="clearFilter()" class="text-[10px] bg-gray-200 text-gray-600 font-bold px-2.5 py-1 rounded-full">ዝጋ x</button>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-2" id="filtered-students-list"></div>
            </div>

            <div class="space-y-2">
                <button onclick="toggleSection('all-reports-container')" class="w-full bg-gradient-to-r from-indigo-700 to-purple-700 text-white p-4 rounded-[25px] font-black text-xs flex justify-between items-center shadow-md">
                    <span><i class="fas fa-folder-open mr-1"></i> 📂 ከአስተማሪዎች የሚመጡ የክትትል ሪፖርቶች ማህደር</span>
                    <i class="fas fa-chevron-down"></i>
                </button>
                
                <div id="all-reports-container" class="hidden p-3 bg-gray-50 border rounded-[25px] space-y-3">
                    
                    <div class="bg-white rounded-2xl border shadow-sm overflow-hidden">
                        <button onclick="toggleSection('daily-section')" class="w-full p-3 bg-teal-50 text-[#0d7a70] font-black text-xs flex justify-between items-center">
                            <span>📌 የዛሬ ዕለታዊ ጥቅል የክትትል ዝርዝር</span>
                            <i class="fas fa-angle-down"></i>
                        </button>
                        <div id="daily-section" class="hidden p-3 space-y-1 max-h-48 overflow-y-auto text-xs">
                            <div id="daily-list"></div>
                        </div>
                    </div>

                    <div class="bg-white rounded-2xl border shadow-sm overflow-hidden">
                        <button onclick="toggleSection('monthly-section')" class="w-full p-3 bg-indigo-50 text-indigo-700 font-black text-xs flex justify-between items-center">
                            <span>📅 የወርሃዊ ጥቅል ሪፖርት (የቀናት ስሌት ታሪክ)</span>
                            <i class="fas fa-angle-down"></i>
                        </button>
                        <div id="monthly-section" class="hidden p-3 space-y-1 max-h-48 overflow-y-auto text-xs">
                            <div id="monthly-list"></div>
                        </div>
                    </div>

                    <div class="bg-white rounded-2xl border shadow-sm overflow-hidden">
                        <button onclick="toggleSection('yearly-section')" class="w-full p-3 bg-amber-50 text-amber-800 font-black text-xs flex justify-between items-center">
                            <span>⏱️ የዓመቱ አጠቃላይ ማጠቃለያ (Analytics)</span>
                            <i class="fas fa-angle-down"></i>
                        </button>
                        <div id="yearly-section" class="hidden p-3 text-xs">
                            <div id="yearly-list"></div>
                        </div>
                    </div>

                </div>
            </div>

            <div class="space-y-2">
                <button onclick="toggleSection('all-students-section')" class="w-full bg-blue-50 border border-blue-200 text-blue-700 p-4 rounded-[25px] font-black text-xs flex justify-between items-center shadow-sm">
                    <span id="total-students-title"><i class="fas fa-users mr-1"></i> 🏢 አጠቃላይ የተማሪዎች ብዛትና ሙሉ ዝርዝር</span>
                    <i class="fas fa-chevron-down text-gray-400"></i>
                </button>
                <div id="all-students-section" class="hidden bg-white p-4 rounded-[25px] shadow border max-h-60 overflow-y-auto text-xs space-y-2">
                    <div id="all-students-list"></div>
                </div>
            </div>

            <div class="space-y-2">
                <button onclick="toggleSection('payment-section')" class="w-full bg-purple-50 border border-purple-200 text-purple-700 p-4 rounded-[25px] font-black text-xs flex justify-between items-center shadow-sm">
                    <span><i class="fas fa-credit-card mr-1"></i> 💳 የክፍያ ሁኔታ (የከፈሉ እና ያልከፈሉ ዝርዝር)</span>
                    <i class="fas fa-chevron-down text-gray-400"></i>
                </button>
                <div id="payment-section" class="hidden bg-white p-4 rounded-[25px] shadow border text-xs space-y-4">
                    <div>
                        <h4 class="font-bold text-emerald-700 mb-2">🟢 የከፈሉ ተማሪዎች</h4>
                        <div id="paid-list" class="grid grid-cols-1 sm:grid-cols-2 gap-2"></div>
                    </div>
                    <hr>
                    <div>
                        <h4 class="font-bold text-rose-700 mb-2">🔴 ምንም ያልከፈሉ ተማሪዎች</h4>
                        <div id="unpaid-list" class="grid grid-cols-1 sm:grid-cols-2 gap-2"></div>
                    </div>
                </div>
            </div>

            <div class="space-y-2">
                <button onclick="toggleSection('register-section')" class="w-full bg-slate-800 text-yellow-400 p-4 rounded-[25px] font-black text-xs flex justify-between items-center shadow-md italic">
                    <span><i class="fas fa-user-plus mr-1"></i> 🆕 አዲስ ተማሪ በሲስተሙ መዝግብ</span>
                    <i class="fas fa-chevron-down text-gray-400"></i>
                </button>
                <div id="register-section" class="hidden bg-white p-5 rounded-[25px] shadow-lg border space-y-3">
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                        <input type="text" id="stud-name" placeholder="የተማሪ ሙሉ ስም" class="p-3 border rounded-xl text-xs font-bold outline-none">
                        <input type="tel" id="stud-phone" placeholder="የወላጅ ስልክ ቁጥር" class="p-3 border rounded-xl text-xs font-bold outline-none">
                    </div>
                    <button onclick="addStudent()" class="w-full bg-[#0d7a70] text-white py-3 rounded-xl text-xs font-black italic shadow hover:bg-teal-700">ተማሪውን አረጋግጥና መዝግብ</button>
                </div>
            </div>

        </div>
    </main>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyBKw3ektgxdfvqcO-JHzJwjvfSkc-K_41A", 
            authDomain: "safe-school-b3f87.firebaseapp.com", 
            projectId: "safe-school-b3f87", 
            storageBucket: "safe-school-b3f87.firebasestorage.app", 
            messagingSenderId: "43051328645", 
            appId: "1:43051328645:web:2664448d0b43a293daf5ec" 
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        const todayStr = new Date().toLocaleDateString('en-CA'); 
        document.getElementById('today-date-display').innerText = new Date().toLocaleDateString('am-ET');

        let currentOnTimeStudents = [];
        let currentLateStudents = [];
        let currentAbsentStudents = [];
        let activeFilterType = null;
        let globalAttendanceSummary = {}; // ለሰርች አናሊቲክስ የተማሪዎችን ጥቅል ታሪክ መያዣ

        function loginAdmin() {
            const email = document.getElementById('admin-email').value.trim();
            const password = document.getElementById('admin-password').value.trim();
            if(!email || !password) return alert("እባክዎ ኢሜል እና ፓስወርድ ያስገቡ");

            auth.signInWithEmailAndPassword(email, password)
            .then(() => {
                document.getElementById('admin-login').classList.add('hidden');
                document.getElementById('admin-dashboard').classList.remove('hidden');
                loadLiveReports();
            })
            .catch(err => alert("የመግቢያ ስህተት፦ " + err.message));
        }

        function toggleSection(id) {
            document.getElementById(id).classList.toggle('hidden');
        }

        function loadLiveReports() {
            // ሀ. የዛሬ ዕለታዊ መረጃዎች (attendance)
            db.collection("attendance").onSnapshot(snapshot => {
                currentOnTimeStudents = []; currentLateStudents = []; currentAbsentStudents = [];
                const dailyDiv = document.getElementById('daily-list');
                dailyDiv.innerHTML = "";
                
                globalAttendanceSummary = {}; // ሪፍሬሽ ሲሆን ዳታውን መልሶ ለመስራት

                snapshot.forEach(doc => {
                    const data = doc.data();
                    let minutesBadge = "";
                    let studentObj = { name: data.studentName || "ያልታወቀ ተማሪ", detail: "" };
                    
                    // ለሰርች አናሊቲክስ ጥቅል መረጃ መሰብሰብ
                    if(!globalAttendanceSummary[studentObj.name]) {
                        globalAttendanceSummary[studentObj.name] = { onTime: 0, lates: 0, absents: 0 };
                    }

                    if (data.status === "Present" || data.status === "On Time" || data.status === "በሰዓቱ") {
                        studentObj.detail = "በሰዓቱ ገብቷል"; currentOnTimeStudents.push(studentObj);
                        globalAttendanceSummary[studentObj.name].onTime++;
                        minutesBadge = `<span class="bg-emerald-100 text-emerald-800 text-[10px] px-2 py-0.5 rounded-full font-bold">በሰዓቱ</span>`;
                    } else if (data.status === "Absent" || data.status === "ቀሪ") {
                        studentObj.detail = "ዛሬ ቀርቷል"; currentAbsentStudents.push(studentObj);
                        globalAttendanceSummary[studentObj.name].absents++;
                        minutesBadge = `<span class="bg-rose-100 text-rose-800 text-[10px] px-2 py-0.5 rounded-full font-bold">ቀርቷል</span>`;
                    } else {
                        let mins = data.minutes || "---";
                        studentObj.detail = `አርፍዷል (${mins} ደቂቃ)`; currentLateStudents.push(studentObj);
                        globalAttendanceSummary[studentObj.name].lates++;
                        minutesBadge = `<span class="bg-amber-100 text-amber-800 text-[10px] px-2 py-0.5 rounded-full font-bold">አርፍዷል (${mins}ደ)</span>`;
                    }

                    dailyDiv.innerHTML += `
                        <div class="p-2.5 border-b flex justify-between items-center bg-gray-50 rounded-xl mb-1 daily-item-row" data-name="${studentObj.name.toLowerCase()}">
                            <span class="font-bold text-gray-700">${studentObj.name}</span>
                            ${minutesBadge}
                        </div>`;
                });

                document.getElementById('box-on-time').innerText = currentOnTimeStudents.length;
                document.getElementById('box-late').innerText = currentLateStudents.length;
                document.getElementById('box-absent').innerText = currentAbsentStudents.length;

                if(activeFilterType) renderFilteredList(activeFilterType);
                rebuildMonthlyAndYearlyUI();
            });

            // ለ. ተማሪዎች ዝርዝርና የክፍያ ሁኔታ መጫን
            db.collection("students").onSnapshot(snapshot => {
                const totalTitle = document.getElementById('total-students-title');
                const allListDiv = document.getElementById('all-students-list');
                const paidListDiv = document.getElementById('paid-list');
                const unpaidListDiv = document.getElementById('unpaid-list');

                totalTitle.innerHTML = `<i class="fas fa-users mr-1"></i> 🏢 አጠቃላይ የተማሪዎች ብዛትና ሙሉ ዝርዝር (${snapshot.size})`;
                allListDiv.innerHTML = ""; paidListDiv.innerHTML = ""; unpaidListDiv.innerHTML = "";
                
                snapshot.forEach(doc => {
                    const data = doc.data();
                    const id = doc.id;
                    const name = data.studentName || "ስም የሌለው";
                    const phone = data.parentPhone || "ስልክ የለም";
                    const paidMonths = data.paidMonths || [];

                    allListDiv.innerHTML += `
                        <div class="p-2.5 border-b flex justify-between items-center bg-gray-50 rounded-xl mb-1 student-item-row" data-name="${name.toLowerCase()}">
                            <div>
                                <p class="font-bold text-gray-800">${name}</p>
                                <p class="text-[10px] text-gray-400">ወላጅ፦ ${phone}</p>
                            </div>
                            <button onclick="deleteStudent('${id}', '${name}')" class="text-rose-600 bg-rose-50 hover:bg-rose-100 p-2.5 rounded-xl transition">
                                <i class="fas fa-trash-alt"></i>
                            </button>
                        </div>`;

                    const paymentBox = `
                        <div class="p-2.5 border rounded-xl payment-item-row" data-name="${name.toLowerCase()}">
                            <p class="font-bold text-gray-800">${name}</p>
                            <p class="text-[9px] text-gray-500">${paidMonths.length > 0 ? 'የከፈሉባቸው፦ ' + paidMonths.join(', ') : '❌ ምንም አልተከፈለም'}</p>
                        </div>`;
                    
                    if(paidMonths.length > 0) paidListDiv.innerHTML += paymentBox;
                    else unpaidListDiv.innerHTML += paymentBox;
                });
                rebuildMonthlyAndYearlyUI();
            });
        }

        // ወርሃዊና ዓመታዊ ሪፖርቶችን ከአስተማሪ በተገኘው ዳታ መልሶ መገንቢያ
        function rebuildMonthlyAndYearlyUI() {
            const monthlyDiv = document.getElementById('monthly-list');
            const yearlyDiv = document.getElementById('yearly-list');
            
            if(!monthlyDiv || !yearlyDiv) return;
            
            monthlyDiv.innerHTML = "";
            let totalStudentsCount = Object.keys(globalAttendanceSummary).length;
            let totalPaidCount = 0; // ለዓመታዊ አናሊቲክስ

            if(totalStudentsCount === 0) {
                monthlyDiv.innerHTML = `<p class="text-gray-400 text-center py-2 italic">ምንም የአስተማሪ ሪፖርት አልገባም</p>`;
                yearlyDiv.innerHTML = `<p class="text-gray-400 text-center py-2 italic">ማጠቃለያ ዳታ የለም</p>`;
                return;
            }

            for(let key in globalAttendanceSummary) {
                monthlyDiv.innerHTML += `
                    <div class="p-2.5 border-b bg-indigo-50/40 rounded-xl mb-1 monthly-item-row" data-name="${key.toLowerCase()}">
                        <p class="font-black text-gray-800 text-xs">${key}</p>
                        <p class="text-[10px] text-gray-500 font-bold">በሰዓቱ፦ <span class="text-emerald-600">${globalAttendanceSummary[key].onTime}ቀን</span> | አርፋጅ፦ <span class="text-amber-600">${globalAttendanceSummary[key].lates}ቀን</span> | ቀሪ፦ <span class="text-rose-600">${globalAttendanceSummary[key].absents}ቀን</span></p>
                    </div>`;
            }

            yearlyDiv.innerHTML = `
                <div class="p-4 bg-amber-50/40 rounded-2xl border border-amber-200 text-gray-700 space-y-2 font-bold">
                    <p class="text-xs">🏢 በአስተማሪ ሪፖርት የተመዘገቡ ንቁ ተማሪዎች፦ <span class="text-amber-800 font-black text-sm">${totalStudentsCount}</span></p>
                    <p class="text-[11px] text-gray-500">💡 የተማሪዎችን ዝርዝር ታሪክ (ያረፈዱበትንና የቀሩበትን ጠቅላላ ቀናት) በቁጥር ለማየት ከላይ ባለው ሰርች ባር ላይ ስማቸውን ይጻፉ።</p>
                </div>`;
                
            triggerLiveSearch();
        }

        // 🔍 የተራቀቀ የቀጥታ ፍለጋና ትንተና ፈንክሽን (Advanced Search)
        function triggerLiveSearch() {
            const query = document.getElementById('admin-search-input').value.toLowerCase().trim();
            const analysisBox = document.getElementById('search-analysis-box');

            if(query.length > 1) {
                let exactMatchKey = Object.keys(globalAttendanceSummary).find(k => k.toLowerCase().includes(query));
                
                if(exactMatchKey) {
                    analysisBox.classList.remove('hidden');
                    document.getElementById('searched-student-name').innerText = `👤 ${exactMatchKey}`;
                    
                    let data = globalAttendanceSummary[exactMatchKey];
                    // ወርሃዊ ፍለጋ ውጤት
                    document.getElementById('search-m-on-time').innerText = `${data.onTime} ቀን`;
                    document.getElementById('search-m-late').innerText = `${data.lates} ቀን`;
                    document.getElementById('search-m-absent').innerText = `${data.absents} ቀን`;
                    
                    // ዓመታዊ ፍለጋ ውጤት (ዳታቤዙ እያደገ ሲሄድ እዚህ ላይ ይደመራል)
                    document.getElementById('search-y-on-time').innerText = `${data.onTime} ቀን`;
                    document.getElementById('search-y-late').innerText = `${data.lates} ቀን`;
                    document.getElementById('search-y-absent').innerText = `${data.absents} ቀን`;
                } else {
                    analysisBox.classList.add('hidden');
                }
            } else {
                analysisBox.classList.add('hidden');
            }

            // ተራ ፍለጋዎችን በየቦታው ማጣራት
            document.querySelectorAll('.daily-item-row').forEach(row => { row.style.display = row.getAttribute('data-name').includes(query) ? 'flex' : 'none'; });
            document.querySelectorAll('.monthly-item-row').forEach(row => { row.style.display = row.getAttribute('data-name').includes(query) ? 'block' : 'none'; });
            document.querySelectorAll('.student-item-row').forEach(row => { row.style.display = row.getAttribute('data-name').includes(query) ? 'flex' : 'none'; });
            document.querySelectorAll('.payment-item-row').forEach(row => { row.style.display = row.getAttribute('data-name').includes(query) ? 'block' : 'none'; });
        }

        function deleteStudent(id, name) {
            if(confirm(`⚠️ እርግጠኛ ነዎት? "${name}" የተባለውን ተማሪ ከነጭራሹ ከሲስተሙ መሰረዝ ይፈልጋሉ?`)) {
                db.collection("students").doc(id).delete()
                .then(() => alert("ተማሪው በተሳካ ሁኔታ ተቀንሷል!"))
                .catch(err => alert("ስህተት ተፈጥሯል፦ " + err.message));
            }
        }

        function toggleFilter(type) {
            const section = document.getElementById('filter-display-section');
            if (activeFilterType === type) { clearFilter(); } 
            else {
                section.classList.remove('hidden'); activeFilterType = type; renderFilteredList(type);
                section.scrollIntoView({ behavior: 'smooth' });
            }
        }

        function renderFilteredList(type) {
            const title = document.getElementById('filter-title');
            const listDiv = document.getElementById('filtered-students-list');
            listDiv.innerHTML = "";
            let selectedList = [], colorClass = "";
            if (type === 'On Time') { selectedList = currentOnTimeStudents; title.innerHTML = `💚 በሰዓቱ የመጡ (${selectedList.length})`; colorClass = "bg-emerald-50 text-emerald-800 border-emerald-200"; } 
            else if (type === 'Late') { selectedList = currentLateStudents; title.innerHTML = `💛 ያረፈዱ (${selectedList.length})`; colorClass = "bg-amber-50 text-amber-800 border-amber-200"; } 
            else if (type === 'Absent') { selectedList = currentAbsentStudents; title.innerHTML = `❤️ የዛሬ የቀሩ (${selectedList.length})`; colorClass = "bg-rose-50 text-rose-800 border-rose-200"; }

            if(selectedList.length === 0) { listDiv.innerHTML = `<p class="text-gray-400 text-xs italic py-2">ምንም የለም።</p>`; return; }
            selectedList.forEach(stud => {
                listDiv.innerHTML += `
                    <div class="p-3 border rounded-2xl text-xs font-bold flex justify-between items-center ${colorClass}">
                        <span><i class="fas fa-user mr-1"></i> ${stud.name}</span>
                        <span class="text-[10px] opacity-80 bg-white/60 px-2 py-0.5 rounded-full">${stud.detail}</span>
                    </div>`;
            });
        }

        function clearFilter() { document.getElementById('filter-display-section').classList.add('hidden'); activeFilterType = null; }

        function addStudent() {
            const name = document.getElementById('stud-name').value.trim();
            const phone = document.getElementById('stud-phone').value.trim();
            if(!name || !phone) return alert("እባክዎ የተማሪውን ስም እና ስልክ ያሟሉ");

            db.collection("students").add({
                studentName: name, parentPhone: phone, lastAttendance: "---", attendanceDate: todayStr, attendanceHistory: [], paidMonths: [], examScore: "---"
            }).then(() => {
                alert("ተማሪው በተሳካ ሁኔታ ተመዝግቧል!");
                document.getElementById('stud-name').value = ""; document.getElementById('stud-phone').value = "";
                document.getElementById('register-section').classList.add('hidden');
            }).catch(err => alert("ምዝገባው አልተሳካም፦ " + err.message));
        }
    </script>
</body>
</html>
