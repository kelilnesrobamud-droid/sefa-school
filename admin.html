<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safe School - Admin Control Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-slate-100 min-h-screen font-sans text-gray-800 pb-12">

    <header class="bg-indigo-950 text-white p-6 rounded-b-[40px] shadow-xl text-center">
        <h1 class="text-xl font-black italic text-amber-400">🛡️ የ Safe School ዋና ማስተዳደሪያ (Admin)</h1>
        <p class="text-xs text-indigo-200 mt-1">የተማሪዎች ሙሉ የክትትልና የቅራአት መጋዘን መቆጣጠሪያ</p>
    </header>

    <div class="max-w-7xl mx-auto p-4 mt-6 space-y-6">

        <div class="bg-white p-6 rounded-[30px] shadow border space-y-4">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 border-b pb-3">
                <h3 class="font-black text-xs text-indigo-950 italic">🗄️ የሁሉም ተማሪዎች የሪፖርት መዛግብት ማውጫ</h3>
                <div class="flex gap-1 bg-gray-100 p-1 rounded-xl w-full sm:w-auto">
                    <button id="admin-btn-daily" onclick="switchAdminWarehouse('daily')" class="bg-indigo-950 text-white px-4 py-2 rounded-lg text-xs font-black shadow-sm transition-all">📅 ዕለታዊ ሪፖርት</button>
                    <button id="admin-btn-monthly" onclick="switchAdminWarehouse('monthly')" class="text-gray-600 px-4 py-2 rounded-lg text-xs font-black transition-all">📆 ወርሃዊ ታሪክ</button>
                    <button id="admin-btn-yearly" onclick="switchAdminWarehouse('yearly')" class="text-gray-600 px-4 py-2 rounded-lg text-xs font-black transition-all">🗓️ ዓመታዊ ታሪክ</button>
                </div>
            </div>

            <div class="overflow-x-auto rounded-2xl border">
                <table class="w-full text-[11px] text-center border-collapse">
                    <thead class="bg-slate-50 font-bold text-slate-700 border-b">
                        <tr>
                            <th class="p-3">ቀን</th>
                            <th class="p-3 text-left">የተማሪ ስም</th>
                            <th class="p-3">ክፍል</th>
                            <th class="p-3">ሁኔታ</th>
                            <th class="p-3 bg-emerald-50 text-emerald-900">📖 ምዕራፍ</th>
                            <th class="p-3 bg-emerald-50 text-emerald-900">🔢 ከ - እስከ</th>
                            <th class="p-3 text-rose-600">🛑 ስህተት</th>
                            <th class="p-3">🗣️ መንተባተብ</th>
                            <th class="p-3">✨ ተጅዊድ</th>
                            <th class="p-3 text-indigo-900">💬 መምህር አስተያየት</th>
                            <th class="p-3">✍️ መምህር ፊርማ</th>
                            <th class="p-3 bg-amber-50 text-amber-900">💬 የወላጅ አስተያየት</th>
                            <th class="p-3 bg-amber-50 text-amber-900">✍️ የወላጅ ፊርማ</th>
                        </tr>
                    </thead>
                    <tbody id="admin-warehouse-table-body"></tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyBKw3ektgxdfvqcO-JHzJwjvfSkc-K_41A", authDomain: "safe-school-b3f87.firebaseapp.com", projectId: "safe-school-b3f87", storageBucket: "safe-school-b3f87.firebasestorage.app", messagingSenderId: "43051328645", appId: "1:43051328645:web:2664448d0b43a293daf5ec" };
        firebase.initializeApp(firebaseConfig); const db = firebase.firestore();

        let allStudents = []; let currentAdminTab = "daily";

        // ሁሉንም ተማሪዎች በቀጥታ ከሪልታይም ዳታቤዝ ማውረድ
        db.collection("students").onSnapshot((snap) => {
            allStudents = [];
            snap.forEach(doc => { allStudents.push({ id: doc.id, ...doc.data() }); });
            renderAdminWarehouseTable();
        });

        function switchAdminWarehouse(tab) {
            currentAdminTab = tab;
            ['daily', 'monthly', 'yearly'].forEach(t => {
                const btn = document.getElementById(`admin-btn-${t}`);
                if(t === tab) { btn.className = "bg-indigo-950 text-white px-4 py-2 rounded-lg text-xs font-black shadow-sm transition-all"; }
                else { btn.className = "text-gray-600 px-4 py-2 rounded-lg text-xs font-black transition-all"; }
            });
            renderAdminWarehouseTable();
        }

        function renderAdminWarehouseTable() {
            const tbody = document.getElementById('admin-warehouse-table-body'); if(!tbody) return;
            tbody.innerHTML = ""; let hasData = false;

            allStudents.forEach(s => {
                let targetRecords = [];
                if(currentAdminTab === 'daily' && s.dailyReport) { targetRecords = [s.dailyReport]; }
                else if(currentAdminTab === 'monthly' && s.monthlyHistory) { targetRecords = s.monthlyHistory; }
                else if(currentAdminTab === 'yearly' && s.yearlyHistory) { targetRecords = s.yearlyHistory; }

                // አዲስ የተላከው ሪፖርት መጀመሪያ ላይ እንዲሆን ተገልብጦ ይነበባል
                targetRecords.slice().reverse().forEach(h => {
                    hasData = true;
                    tbody.innerHTML += `
                        <tr class="border-b hover:bg-slate-50 font-bold text-gray-700">
                            <td class="p-3 bg-gray-50/50">${h.date}</td>
                            <td class="p-3 text-left text-indigo-950">${s.studentName}</td>
                            <td class="p-3 text-xs text-gray-500">${s.section || '---'}</td>
                            <td class="p-3">${h.status}</td>
                            <td class="p-3 bg-emerald-50/30 text-emerald-950">${h.chapter || '---'}</td>
                            <td class="p-3 bg-emerald-50/30 font-mono">${h.fromVerse} - ${h.toVerse}</td>
                            <td class="p-3 text-rose-600 font-mono">${h.mistakes}</td>
                            <td class="p-3 text-xs">${h.stutter}</td>
                            <td class="p-3 text-xs">${h.tajweed}</td>
                            <td class="p-3 italic">"${h.teacherComment}"</td>
                            <td class="p-3"><img src="${h.teacherSignature}" class="h-8 mx-auto object-contain bg-white rounded border"></td>
                            <td class="p-3 bg-amber-50/30 italic">${h.parentComment || '---'}</td>
                            <td class="p-3 bg-amber-50/30">${h.parentSignature ? `<img src="${h.parentSignature}" class="h-8 mx-auto object-contain bg-white rounded border">` : '🔄 አልተፈረመም'}</td>
                        </tr>`;
                });
            });

            if(!hasData) tbody.innerHTML = `<tr><td colspan="13" class="p-4 text-gray-400 italic">በዚህ ክፍል ምንም የተመዘገበ ፋይል የለም።</td></tr>`;
        }
    </script>
</body>
</html>
