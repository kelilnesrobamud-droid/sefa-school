
<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safe School - Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-slate-100 min-h-screen font-sans pb-20 text-gray-800">

    <header class="bg-[#0d7a70] text-white p-6 rounded-b-[40px] shadow-2xl text-center">
        <div class="flex justify-between items-center max-w-7xl mx-auto">
            <a href="index.html" class="bg-black/20 px-4 py-2 rounded-xl text-xs font-bold hover:bg-black/40"><i class="fas fa-home"></i> ዋና ገጽ</a>
            <h1 class="text-xl font-black italic text-yellow-300">የአድሚን ማስተዳደሪያ ማዕከል</h1>
            <div class="w-10"></div>
        </div>
    </header>

    <div class="max-w-7xl mx-auto p-4 grid grid-cols-1 sm:grid-cols-3 gap-4 mt-6">
        <button onclick="switchAdminSection('register')" class="bg-emerald-600 text-white p-4 rounded-2xl font-black text-xs shadow-md hover:bg-emerald-700 transition"><i class="fas fa-user-plus mr-2"></i> ➕ አዲስ ተማሪ/መምህር መመዝገቢያ</button>
        <button onclick="switchAdminSection('teachers')" class="bg-indigo-900 text-white p-4 rounded-2xl font-black text-xs shadow-md hover:bg-indigo-900/90 transition"><i class="fas fa-chalkboard-teacher mr-2"></i> 👨‍🏫 የአስተማሪዎች ዝርዝር ማሳያ</button>
        <button onclick="switchAdminSection('students')" class="bg-slate-800 text-white p-4 rounded-2xl font-black text-xs shadow-md hover:bg-slate-900 transition"><i class="fas fa-users mr-2"></i> 📋 የተማሪዎች አጠቃላይ ሰንጠረዥ</button>
    </div>

    <main class="max-w-7xl mx-auto p-4 mt-2">
        
        <div id="sec-register" class="hidden bg-white p-6 rounded-[30px] shadow-lg border max-w-md mx-auto space-y-4">
            <h3 class="font-black text-gray-800 text-xs italic border-b pb-2 text-[#0d7a70]">✍️ አዲስ ተማሪ እና መምህር መመዝገቢያ ሳጥን</h3>
            <div class="space-y-3 text-xs">
                <div><label class="block text-[10px] text-gray-400 font-bold mb-1">የተማሪ ሙሉ ስም</label><input type="text" id="sName" placeholder="የተማሪ ስም..." class="w-full p-2.5 border rounded-xl font-bold bg-gray-50 outline-none"></div>
                <div><label class="block text-[10px] text-gray-400 font-bold mb-1">የወላጅ ስልክ ቁጥር</label><input type="tel" id="pPhone" placeholder="09..." class="w-full p-2.5 border rounded-xl font-bold bg-gray-50 outline-none"></div>
                <div class="border-t pt-2 my-2"></div>
                <div><label class="block text-[10px] text-gray-400 font-bold mb-1">የክፍል መምህር ስም</label><input type="text" id="tName" placeholder="የመምህር ስም..." class="w-full p-2.5 border rounded-xl font-bold bg-gray-50 outline-none"></div>
                <div><label class="block text-[10px] text-gray-400 font-bold mb-1">የመምህር ስልክ ቁጥር</label><input type="tel" id="tPhone" placeholder="09..." class="w-full p-2.5 border rounded-xl font-bold bg-gray-50 outline-none"></div>
                <div><label class="block text-[10px] text-indigo-900 font-black mb-1">📂 የክፍል ምድብ (Section)</label><input type="text" id="tSection" placeholder="e.g. 5A" class="w-full p-2.5 border border-indigo-200 rounded-xl font-black bg-indigo-50/30 text-indigo-900 outline-none"></div>
            </div>
            <button onclick="registerStudent()" class="w-full bg-[#0d7a70] text-white py-3 rounded-xl font-black text-xs shadow">መዝግብና መድብ</button>
        </div>

        <div id="sec-teachers" class="hidden bg-white p-6 rounded-[30px] shadow-lg border space-y-4">
            <h3 class="font-black text-xs text-indigo-900 italic border-b pb-2">👨‍🏫 የተመዘገቡ መምህራን ዝርዝር (የመምህር ስም ሲነካ ተማሪዎቹ ይመጣሉ)</h3>
            <div id="teachers-list-container" class="grid grid-cols-1 sm:grid-cols-3 gap-3"></div>
        </div>

        <div id="sec-students" class="hidden bg-white p-6 rounded-[30px] shadow-lg border space-y-4">
            <h3 class="font-black text-gray-800 text-xs italic border-b pb-2 flex justify-between items-center">
                <span id="table-title">የተማሪዎች አጠቃላይ መቆጣጠሪያ ሰንጠረዥ</span>
                <span id="total-badge" class="bg-indigo-100 text-indigo-800 text-[10px] px-2.5 py-0.5 rounded-full font-bold">0 ተማሪዎች</span>
            </h3>
            <div class="overflow-x-auto rounded-2xl border border-gray-200 shadow-sm">
                <table class="w-full text-[11px] text-center border-collapse">
                    <thead>
                        <tr class="bg-slate-100 text-slate-700 font-black border-b">
                            <th class="p-3 text-left">የተማሪ ስም / የወላጅ ስልክ</th>
                            <th class="p-3">ክፍል</th>
                            <th class="p-3">መምህር</th>
                            <th class="p-3">የክፍያ ሁኔታ</th>
                            <th class="p-3">እርምጃ</th>
                        </tr>
                    </thead>
                    <tbody id="admin-table-body"></tbody>
                </table>
            </div>
        </div>

        <div id="sec-history" class="hidden bg-white p-6 rounded-[30px] shadow-lg border space-y-3 mt-6">
            <div class="flex justify-between items-center border-b pb-2">
                <h3 class="font-black text-xs text-[#0d7a70] italic" id="history-title">የተማሪ ዕለታዊ ዝርዝር መዝገብ</h3>
                <button onclick="document.getElementById('sec-history').classList.add('hidden')" class="text-rose-600 font-bold text-xs"><i class="fas fa-times"></i> ዝጋ</button>
            </div>
            <div class="overflow-x-auto rounded-2xl border border-gray-300 shadow">
                <table class="w-full text-[11px] text-center border-collapse">
                    <thead>
                        <tr class="bg-indigo-900 text-white font-bold border-b border-gray-300">
                            <th class="p-2 border-r border-gray-300">📅 ቀን</th>
                            <th class="p-2 border-r border-gray-300">⏱️ ክትትል</th>
                            <th class="p-2 border-r border-gray-300">💯 ውጤት</th>
                            <th class="p-2 border-r border-gray-300">🌟 ፀባይ</th>
                            <th class="p-2 border-r border-gray-300">📈 ትምህርት</th>
                            <th class="p-2 border-r border-gray-300">💬 መምህር አስተያየት</th>
                            <th class="p-2 border-r border-gray-300">✍️ መምህር ፊርማ</th>
                            <th class="p-2 border-r border-gray-300 bg-emerald-950 text-emerald-300">👪 ወላጅ አስተያየት</th>
                            <th class="p-2 bg-emerald-900 text-emerald-200">✍️ ወላጅ ፊርማ</th>
                        </tr>
                    </thead>
                    <tbody id="history-table-body"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyBKw3ektgxdfvqcO-JHzJwjvfSkc-K_41A", authDomain: "safe-school-b3f87.firebaseapp.com", projectId: "safe-school-b3f87", storageBucket: "safe-school-b3f87.firebasestorage.app", messagingSenderId: "43051328645", appId: "1:43051328645:web:2664448d0b43a293daf5ec" };
        firebase.initializeApp(firebaseConfig); const db = firebase.firestore();
        let allStudents = [];

        function switchAdminSection(sectionId) {
            document.getElementById('sec-register').classList.add('hidden');
            document.getElementById('sec-teachers').classList.add('hidden');
            document.getElementById('sec-students').classList.add('hidden');
            document.getElementById(`sec-${sectionId}`).classList.remove('hidden');
        }

        function registerStudent() {
            const studentName = document.getElementById('sName').value.trim(); const parentPhone = document.getElementById('pPhone').value.trim();
            const teacherName = document.getElementById('tName').value.trim(); const teacherPhone = document.getElementById('tPhone').value.trim();
            const section = document.getElementById('tSection').value.trim().toUpperCase();
            if(!studentName || !parentPhone || !teacherName || !teacherPhone || !section) return alert("ሁሉንም ይሙሉ!");

            db.collection("students").add({ studentName, parentPhone, teacherName, teacherPhone, section, paymentStatus: "unpaid", attendanceHistory: [] }).then(() => { alert("ተመዝግቧል!"); });
        }

        db.collection("students").onSnapshot((snap) => {
            allStudents = [];
            snap.forEach(doc => { allStudents.push({ id: doc.id, ...doc.data() }); });
            renderAdminTable(allStudents);
            renderTeachersList();
        });

        function renderAdminTable(studentsList) {
            const tbody = document.getElementById('admin-table-body'); tbody.innerHTML = "";
            document.getElementById('total-badge').innerText = `${studentsList.length} ተማሪዎች`;
            
            studentsList.forEach(data => {
                let paymentHtml = data.paymentStatus === 'paid' ? `<span class="text-emerald-600 font-black">🟢 ከፍሏል</span>` : `<span class="text-rose-600 font-black">❌ አልከፈለም</span>`;
                tbody.innerHTML += `
                    <tr class="border-b border-gray-200 hover:bg-slate-50 font-bold text-gray-700">
                        <td class="p-3 text-left cursor-pointer" onclick="viewStudentHistory('${data.id}')"><span class="text-blue-600 font-black text-xs block hover:underline">👤 ${data.studentName}</span><span class="text-[9px] text-gray-400 font-medium">ወላጅ፦ ${data.parentPhone}</span></td>
                        <td class="p-3 font-black text-indigo-900">${data.section || '5A'}</td>
                        <td class="p-3 text-gray-600">${data.teacherName}</td>
                        <td class="p-3">${paymentHtml}</td>
                        <td class="p-3"><button onclick="updatePayment('${data.id}', '${data.paymentStatus==='paid'?'unpaid':'paid'}')" class="bg-gray-800 text-white px-2 py-1 rounded text-[10px]">ቀይር</button></td>
                    </tr>`;
            });
        }

        function renderTeachersList() {
            const container = document.getElementById('teachers-list-container'); container.innerHTML = "";
            const uniqueTeachers = {};
            allStudents.forEach(s => { if(s.teacherPhone) uniqueTeachers[s.teacherPhone] = { name: s.teacherName, section: s.section }; });

            Object.keys(uniqueTeachers).forEach(phone => {
                const t = uniqueTeachers[phone];
                container.innerHTML += `
                    <button onclick="filterByTeacher('${phone}')" class="p-4 bg-indigo-50 border border-indigo-100 rounded-2xl font-black text-xs text-indigo-900 text-left hover:bg-indigo-100 flex justify-between items-center transition shadow-sm">
                        <span>👨‍🏫 ${t.name} (${t.section})</span>
                        <i class="fas fa-chevron-right text-indigo-400 text-[10px]"></i>
                    </button>`;
            });
        }

        function filterByTeacher(phone) {
            const filtered = allStudents.filter(s => s.teacherPhone === phone);
            document.getElementById('table-title').innerText = `የመምህር (${phone}) ተማሪዎች ዝርዝር`;
            renderAdminTable(filtered);
            switchAdminSection('students'); // ወደ ተማሪዎች ሰንጠረዥ ቀይር
        }

        function updatePayment(id, status) { db.collection("students").doc(id).update({ paymentStatus: status }); }

        function viewStudentHistory(id) {
            const student = allStudents.find(s => s.id === id);
            if(!student) return;
            
            document.getElementById('sec-history').classList.remove('hidden');
            document.getElementById('history-title').innerText = `📊 የ${student.studentName} ዕለታዊ የሪፖርት ታሪክ ሰንጠረዥ`;
            document.getElementById('sec-history').scrollIntoView({ behavior: 'smooth' });
            
            const tbody = document.getElementById('history-table-body'); tbody.innerHTML = "";
            const history = student.attendanceHistory || [];
            
            if(history.length === 0) { tbody.innerHTML = `<tr><td colspan="9" class="p-3 text-gray-400 italic">ምንም ሪፖርት አልተመዘገበም</td></tr>`; return; }
            
            history.slice().reverse().forEach(h => {
                tbody.innerHTML += `
                    <tr class="border-b border-gray-300 text-gray-700 font-bold text-[10px]">
                        <td class="p-2 border-r border-gray-300 bg-gray-50">${h.date}</td>
                        <td class="p-2 border-r border-gray-300 text-indigo-700">${h.status}</td>
                        <td class="p-2 border-r border-gray-300 text-blue-600 font-black">${h.score || '---'}</td>
                        <td class="p-2 border-r border-gray-300 text-emerald-600">${h.behavior}</td>
                        <td class="p-2 border-r border-gray-300 text-purple-600">${h.academic || '---'}</td>
                        <td class="p-2 border-r border-gray-300 text-left italic">"${h.teacherComment}"</td>
                        <td class="p-2 border-r border-gray-300">${h.teacherSig ? `<img src="${h.teacherSig}" class="h-6 mx-auto object-contain">` : '---'}</td>
                        <td class="p-2 border-r border-gray-300 bg-emerald-50/10 italic">"${h.parentComment || '---'}"</td>
                        <td class="p-2 bg-emerald-50/20">${h.parentSig ? `<img src="${h.parentSig}" class="h-6 mx-auto object-contain">` : '---'}</td>
                    </tr>`;
            });
        }
    </script>
</body>
</html>
