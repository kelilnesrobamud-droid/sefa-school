<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safe School - Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-slate-100 min-h-screen font-sans pb-20 text-gray-800">

    <header class="bg-[#0d7a70] text-white p-6 rounded-b-[40px] shadow-2xl text-center">
        <h1 class="text-xl font-black italic text-yellow-300"><i class="fas fa-user-shield mr-2"></i>የአድሚን ማስተዳደሪያ ማዕከል</h1>
        <p class="text-xs text-teal-100 mt-1">የተማሪዎች፣ የምድብ እና የክፍያ ጠንካራ መቆጣጠሪያ ሰሌዳ</p>
    </header>

    <main class="max-w-6xl mx-auto p-4 grid grid-cols-1 lg:grid-cols-3 gap-6 mt-4">
        
        <div class="bg-white p-5 rounded-[30px] shadow-lg border h-fit space-y-4">
            <h3 class="font-black text-gray-800 text-xs italic border-b pb-2 text-[#0d7a70]"><i class="fas fa-user-plus mr-1"></i> አዲስ ተማሪ እና መምህር መመዝገቢያ</h3>
            
            <div class="space-y-3 text-xs">
                <div>
                    <label class="block text-[10px] text-gray-400 font-bold mb-1">የተማሪ ሙሉ ስም</label>
                    <input type="text" id="sName" placeholder="የተማሪ ስም..." class="w-full p-2.5 border rounded-xl font-bold bg-gray-50 outline-none">
                </div>
                <div>
                    <label class="block text-[10px] text-gray-400 font-bold mb-1">የወላጅ ስልክ ቁጥር</label>
                    <input type="tel" id="pPhone" placeholder="09..." class="w-full p-2.5 border rounded-xl font-bold bg-gray-50 outline-none">
                </div>
                <div class="border-t pt-2 my-2"></div>
                <div>
                    <label class="block text-[10px] text-gray-400 font-bold mb-1">የክፍል መምህር ስም</label>
                    <input type="text" id="tName" placeholder="የመምህር ስም..." class="w-full p-2.5 border rounded-xl font-bold bg-gray-50 outline-none">
                </div>
                <div>
                    <label class="block text-[10px] text-gray-400 font-bold mb-1">የመምህር ስልክ ቁጥር</label>
                    <input type="tel" id="tPhone" placeholder="09..." class="w-full p-2.5 border rounded-xl font-bold bg-gray-50 outline-none">
                </div>
                <div>
                    <label class="block text-[10px] text-indigo-900 font-black mb-1">📂 የክፍል ምድብ (Section)</label>
                    <input type="text" id="tSection" placeholder="e.g. 5A" class="w-full p-2.5 border border-indigo-200 rounded-xl font-black bg-indigo-50/30 text-indigo-900 outline-none">
                </div>
            </div>

            <button onclick="registerStudent()" class="w-full bg-[#0d7a70] text-white py-3 rounded-xl font-black text-xs shadow hover:bg-teal-700">
                <i class="fas fa-save mr-1"></i> ተማሪውን መዝግብና ወደ መምህር ላክ
            </button>
        </div>

        <div class="lg:col-span-2 bg-white p-5 rounded-[30px] shadow-lg border space-y-4">
            <h3 class="font-black text-gray-800 text-xs italic border-b pb-2 flex justify-between items-center">
                <span><i class="fas fa-users mr-1 text-indigo-600"></i> የተማሪዎች አጠቃላይ መቆጣጠሪያ ሰንጠረዥ</span>
                <span id="total-badge" class="bg-indigo-100 text-indigo-800 text-[10px] px-2.5 py-0.5 rounded-full font-bold">0 ተማሪዎች</span>
            </h3>

            <div class="overflow-x-auto rounded-2xl border border-gray-200 shadow-sm">
                <table class="w-full text-[11px] text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-100 text-slate-700 font-black border-b text-center">
                            <th class="p-3 text-left">የተማሪ ስም / ወላጅ</th>
                            <th class="p-3">ክፍል ምድብ</th>
                            <th class="p-3">ክፍል መምህር</th>
                            <th class="p-3">የክፍያ ሁኔታ መስመር</th>
                            <th class="p-3">የክፍያ ማስተካከያ</th>
                        </tr>
                    </thead>
                    <tbody id="admin-table-body" class="text-center">
                        <tr>
                            <td colspan="5" class="p-4 text-gray-400 italic">መረጃ በመጫን ላይ ነው...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyBKw3ektgxdfvqcO-JHzJwjvfSkc-K_41A", 
            authDomain: "safe-school-b3f87.firebaseapp.com", 
            projectId: "safe-school-b3f87", 
            storageBucket: "safe-school-b3f87.firebasestorage.app", 
            messagingSenderId: "43051328645", 
            appId: "1:43051328645:web:2664448d0b43a293daf5ec" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 📝 አዲስ ተማሪ የመመዝገብ ተግባር
        function registerStudent() {
            const studentName = document.getElementById('sName').value.trim();
            const parentPhone = document.getElementById('pPhone').value.trim();
            const teacherName = document.getElementById('tName').value.trim();
            const teacherPhone = document.getElementById('tPhone').value.trim();
            const section = document.getElementById('tSection').value.trim().toUpperCase();

            if(!studentName || !parentPhone || !teacherName || !teacherPhone || !section) {
                return alert("እባክዎ ሁሉንም ሳጥኖች (የክፍል ምድብን ጨምሮ) በትክክል ይሙሉ!");
            }

            db.collection("students").add({
                studentName: studentName,
                parentPhone: parentPhone,
                teacherName: teacherName,
                teacherPhone: teacherPhone,
                section: section, 
                paymentStatus: "unpaid", // አዲስ ተማሪ በነባሪ አልከፈለም ተብሎ ይያዛል
                paidMonths: [],
                attendanceHistory: [],
                lastAttendance: "---",
                attendanceDate: "---",
                examScore: "---",
                behaviorStatus: "---",
                academicStatus: "---"
            }).then(() => {
                alert(`ተማሪው ${studentName} በክፍል ${section} ውስጥ በተሳካ ሁኔታ ተመዝግቧል!`);
                document.getElementById('sName').value = "";
                document.getElementById('pPhone').value = "";
                document.getElementById('tName').value = "";
                document.getElementById('tPhone').value = "";
                document.getElementById('tSection').value = "";
            }).catch(err => alert("ስህተት፦ " + err.message));
        }

        // 🔄 የተማሪዎችን ዝርዝር በቅጽበት ከዳታቤዝ አውርዶ በሰንጠረዥ መደርደር
        db.collection("students").onSnapshot((snap) => {
            const tbody = document.getElementById('admin-table-body');
            const totalBadge = document.getElementById('total-badge');
            tbody.innerHTML = "";
            totalBadge.innerText = `${snap.size} ተማሪዎች`;

            if(snap.empty) {
                tbody.innerHTML = `<tr><td colspan="5" class="p-4 text-gray-400 italic">ምንም የተመዘገበ ተማሪ የለም።</td></tr>`;
                return;
            }

            snap.forEach(doc => {
                const data = doc.data();
                const id = doc.id;

                // 2. የከፈለና ያልከፈለ በደንብ የሚሰመርበት ጠንካራ ሲስተም
                let paymentHtml = "";
                let rowBorderColor = "";
                
                if(data.paymentStatus === 'paid') {
                    paymentHtml = `<span class="px-3 py-1 rounded-full bg-emerald-100 text-emerald-700 border-2 border-emerald-400 font-black text-[10px]">🟢 ከፍሏል</span>`;
                    rowBorderColor = "border-l-4 border-l-emerald-500"; // የከፈለ በአረንጓዴ ይሰመራል
                } else {
                    paymentHtml = `<span class="px-3 py-1 rounded-full bg-rose-100 text-rose-700 border-2 border-rose-400 font-black text-[10px]">❌ አልከፈለም</span>`;
                    rowBorderColor = "border-l-4 border-l-rose-500"; // ያልከፈለ በደማቅ ቀይ ይሰመራል
                }

                // የክፍያ ሁኔታን ወዲያውኑ የሚቀይር ጠንካራ በተን
                const togglePaymentBtn = data.paymentStatus === 'paid' 
                    ? `<button onclick="updatePayment('${id}', 'unpaid')" class="bg-rose-600 text-white px-3 py-1.5 rounded-xl text-[10px] font-black shadow hover:bg-rose-700 w-28">አልከፈለም በል</button>`
                    : `<button onclick="updatePayment('${id}', 'paid')" class="bg-emerald-600 text-white px-3 py-1.5 rounded-xl text-[10px] font-black shadow hover:bg-emerald-700 w-28">🟢 ከፍሏል በል</button>`;

                tbody.innerHTML += `
                    <tr class="border-b hover:bg-slate-50 font-bold text-gray-700 ${rowBorderColor}">
                        <td class="p-3 border-r text-left">
                            <span class="text-gray-900 font-black text-xs block">${data.studentName}</span>
                            <span class="text-[9px] text-gray-400 block font-medium">ወላጅ፦ ${data.parentPhone}</span>
                        </td>
                        <td class="p-3 border-r font-black text-indigo-950 bg-indigo-50/40 text-xs">${data.section || '5A'}</td>
                        <td class="p-3 border-r text-xs text-gray-600">${data.teacherName}<br><span class="text-[9px] text-gray-400 font-medium">(${data.teacherPhone})</span></td>
                        <td class="p-3 border-r">${paymentHtml}</td>
                        <td class="p-3 flex gap-2 justify-center items-center">
                            ${togglePaymentBtn}
                            <button onclick="deleteStudent('${id}', '${data.studentName}')" class="text-gray-300 hover:text-rose-600 p-1" title="ሰርዝ"><i class="fas fa-trash-alt"></i></button>
                        </td>
                    </tr>`;
            });
        });

        // 💳 የክፍያ ሁኔታን ወዲያውኑ በጠንካራ ሁኔታ የመቀየር ሲስተም
        function updatePayment(id, status) {
            db.collection("students").doc(id).update({
                paymentStatus: status
            }).then(() => {
                console.log("የክፍያ ሁኔታ በጠንካራ ሁኔታ ተቀይሯል!");
            }).catch(err => alert("ስህተት፦ " + err.message));
        }

        // 🗑️ ተማሪን የመሰረዝ ተግባር
        function deleteStudent(id, name) {
            if(confirm(`እርግጠኛ ነዎት ተማሪ ${name} ሊሰረዝ ነው?`)) {
                db.collection("students").doc(id).delete();
            }
        }
    </script>
</body>
</html>
