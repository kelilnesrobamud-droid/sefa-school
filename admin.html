
<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>የአስተዳዳሪ (Supervisor) የሪፖርት ማዕከል</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
</head>
<body class="bg-gray-100 min-h-screen font-sans pb-10">

    <header class="bg-[#0d7a70] text-white p-6 rounded-b-[40px] shadow-2xl text-center">
        <div class="flex justify-between items-center max-w-4xl mx-auto">
            <a href="index.html" class="bg-black/20 px-4 py-2 rounded-xl text-xs font-bold hover:bg-black/4"><i class="fas fa-home"></i> ዋና ገጽ</a>
            <h1 class="text-xl font-black italic text-yellow-300">የአስተዳዳሪ (Supervisor) ዳሽቦርድ</h1>
            <div class="w-10"></div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4 space-y-4">
        
        <div id="admin-login" class="bg-white p-6 rounded-[35px] shadow-lg max-w-md mx-auto mt-10 border">
            <h2 class="text-lg font-black mb-4 text-[#0d7a70] text-center italic">የአስተዳዳሪ መግቢያ</h2>
            <input type="email" id="admin-email" placeholder="የአድሚን ኢሜል" class="w-full p-3 border rounded-2xl mb-3 focus:outline-none focus:ring-2 focus:ring-[#0d7a70] font-bold text-center">
            <input type="password" id="admin-password" placeholder="ይለፍ ቃል" class="w-full p-3 border rounded-2xl mb-4 focus:outline-none focus:ring-2 focus:ring-[#0d7a70] font-bold text-center">
            <button onclick="loginAdmin()" class="w-full bg-indigo-600 text-white py-3 rounded-2xl hover:bg-indigo-700 font-black italic shadow-md">ግባ</button>
        </div>

        <div id="admin-dashboard" class="hidden space-y-5">
            
            <div class="flex justify-between items-center border-b pb-2">
                <h2 class="text-base font-black text-gray-800 italic">📊 የዛሬ ዕለታዊ ጥቅል ሪፖርት</h2>
                <span class="text-xs bg-gray-200 px-3 py-1 rounded-full font-bold text-gray-600" id="today-date-display"></span>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                <button onclick="toggleFilter('On Time')" class="bg-emerald-500 text-white p-5 rounded-[25px] shadow-md flex justify-between items-center text-left transition transform active:scale-95 focus:outline-none">
                    <div>
                        <h3 class="text-xs font-bold opacity-90">በሰዓቱ የመጡ</h3>
                        <p class="text-3xl font-black mt-1" id="box-on-time">0</p>
                    </div>
                    <span class="text-2xl"><i class="fas fa-check-circle"></i></span>
                </button>
                <button onclick="toggleFilter('Late')" class="bg-amber-500 text-white p-5 rounded-[25px] shadow-md flex justify-between items-center text-left transition transform active:scale-95 focus:outline-none">
                    <div>
                        <h3 class="text-xs font-bold opacity-90">ያረፈዱ (አርፋጅ)</h3>
                        <p class="text-3xl font-black mt-1" id="box-late">0</p>
                    </div>
                    <span class="text-2xl"><i class="fas fa-clock"></i></span>
                </button>
                <button onclick="toggleFilter('Absent')" class="bg-rose-500 text-white p-5 rounded-[25px] shadow-md flex justify-between items-center text-left transition transform active:scale-95 focus:outline-none">
                    <div>
                        <h3 class="text-xs font-bold opacity-90">የቀሩ (ቀሪ)</h3>
                        <p class="text-3xl font-black mt-1" id="box-absent">0</p>
                    </div>
                    <span class="text-2xl"><i class="fas fa-times-circle"></i></span>
                </button>
            </div>

            <div id="filter-display-section" class="bg-white p-5 rounded-[30px] shadow border-2 border-dashed border-[#0d7a70] hidden">
                <div class="flex justify-between items-center border-b pb-2 mb-3">
                    <h3 class="font-black text-gray-800 italic text-xs" id="filter-title">የተማሪዎች ዝርዝር</h3>
                    <button onclick="clearFilter()" class="text-[10px] bg-gray-200 text-gray-600 font-bold px-2.5 py-1 rounded-full">ዝጋ x</button>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-2" id="filtered-students-list"></div>
            </div>

            <div class="border-b pt-2"></div>

            <div class="space-y-2">
                <button onclick="toggleSection('daily-section')" class="w-full bg-teal-50 border border-teal-200 text-[#0d7a70] p-4 rounded-[25px] font-black text-xs flex justify-between items-center shadow-sm">
                    <span><i class="fas fa-calendar-day mr-1"></i> 📌 የዛሬ ዕለታዊ ጥቅል የክትትል ዝርዝር</span>
                    <i class="fas fa-chevron-down text-gray-400"></i>
                </button>
                <div id="daily-section" class="hidden bg-white p-4 rounded-[25px] shadow border space-y-2 max-h-60 overflow-y-auto text-xs">
                    <div id="daily-list"><p class="text-gray-400 text-center italic">በመጫን ላይ...</p></div>
                </div>
            </div>

            <div class="space-y-2">
                <button onclick="toggleSection('monthly-section')" class="w-full bg-indigo-50 border border-indigo-100 text-indigo-700 p-4 rounded-[25px] font-black text-xs flex justify-between items-center shadow-sm">
                    <span><i class="fas fa-calendar-alt mr-1"></i> 📅 የወርሃዊ ጥቅል ሪፖርት (ታሪክ)</span>
                    <i class="fas fa-chevron-down text-gray-400"></i>
                </button>
                <div id="monthly-section" class="hidden bg-white p-4 rounded-[25px] shadow border space-y-2 max-h-60 overflow-y-auto text-xs">
                    <div id="monthly-list"><p class="text-gray-400 text-center italic">በመጫን ላይ...</p></div>
                </div>
            </div>

            <div class="space-y-2">
                <button onclick="toggleSection('yearly-section')" class="w-full bg-blue-50 border border-blue-100 text-blue-700 p-4 rounded-[25px] font-black text-xs flex justify-between items-center shadow-sm">
                    <span><i class="fas fa-university mr-1"></i> 🏢 የዓመቱ አጠቃላይ ማጠቃለያ (ክፍያ)</span>
                    <i class="fas fa-chevron-down text-gray-400"></i>
                </button>
                <div id="yearly-section" class="hidden bg-white p-4 rounded-[25px] shadow border text-xs">
                    <div id="yearly-list"><p class="text-gray-400 text-center italic">በመጫን ላይ...</p></div>
                </div>
            </div>

            <div class="space-y-2">
                <button onclick="toggleSection('register-section')" class="w-full bg-slate-800 text-yellow-400 p-4 rounded-[25px] font-black text-xs flex justify-between items-center shadow-md italic">
                    <span><i class="fas fa-user-plus mr-1"></i> 🆕 አዲስ ተማሪ በሲስተሙ መዝግብ</span>
                    <i class="fas fa-chevron-down text-gray-400"></i>
                </button>
                <div id="register-section" class="hidden bg-white p-5 rounded-[25px] shadow-lg border space-y-3">
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                        <input type="text" id="stud-name" placeholder="የተማሪ ሙሉ ስም" class="p-3 border rounded-xl text-xs font-bold outline-none focus:border-[#0d7a70]">
                        <input type="tel" id="stud-phone" placeholder="የወላጅ ስልክ ቁጥር" class="p-3 border rounded-xl text-xs font-bold outline-none focus:border-[#0d7a70]">
                    </div>
                    <button onclick="addStudent()" class="w-full bg-[#0d7a70] text-white py-3 rounded-xl text-xs font-black italic shadow hover:bg-teal-700">ተማሪውን አረጋግጥና መዝግብ</button>
                </div>
            </div>

        </div>
    </main>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyBKw3ektgxdfvqcO-JHzJwjvfSkc-K_41A", 
            authDomain: "safe-school-b3f87.firebaseapp.com", 
            projectId: "safe-school-b3f87", 
            storageBucket: "safe-school-b3f87.firebasestorage.app", 
            messagingSenderId: "43051328645", 
            appId: "1:43051328645:web:2664448d0b43a293daf5ec" 
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        const todayStr = new Date().toISOString().split('T')[0];
        document.getElementById('today-date-display').innerText = new Date().toLocaleDateString('am-ET');

        let currentOnTimeStudents = [];
        let currentLateStudents = [];
        let currentAbsentStudents = [];
        let activeFilterType = null;

        function loginAdmin() {
            const email = document.getElementById('admin-email').value.trim();
            const password = document.getElementById('admin-password').value.trim();

            if(!email || !password) return alert("እባክዎ ኢሜል እና ፓስወርድ ያስገቡ");

            auth.signInWithEmailAndPassword(email, password)
            .then(() => {
                document.getElementById('admin-login').classList.add('hidden');
                document.getElementById('admin-dashboard').classList.remove('hidden');
                loadLiveReports();
            })
            .catch(err => {
                alert("የመግቢያ ስህተት፦ " + err.message);
            });
        }

        // ክፍሎችን ለመክፈትና ለመዝጋት የሚያገለግል ፈንክሽን (Accordion)
        function toggleSection(id) {
            const section = document.getElementById(id);
            section.classList.toggle('hidden');
        }

        function loadLiveReports() {
            db.collection("students").onSnapshot(snapshot => {
                currentOnTimeStudents = [];
                currentLateStudents = [];
                currentAbsentStudents = [];
                
                const dailyDiv = document.getElementById('daily-list');
                dailyDiv.innerHTML = "";
                let hasRecords = false;

                snapshot.forEach(doc => {
                    const data = doc.data();
                    
                    if(data.attendanceDate === todayStr || data.lastAttendance) {
                        hasRecords = true;
                        let minutesBadge = "";
                        let studentObj = { name: data.studentName, detail: "" };
                        
                        if (data.lastAttendance === "Present" || data.lastAttendance === "On Time") {
                            studentObj.detail = "በሰዓቱ ገብቷል";
                            currentOnTimeStudents.push(studentObj);
                            minutesBadge = `<span class="bg-emerald-100 text-emerald-800 text-[10px] px-2 py-0.5 rounded-full font-bold">በሰዓቱ</span>`;
                        } else if (data.lastAttendance === "Absent" || data.lastAttendance === "ቀሪ") {
                            studentObj.detail = "ዛሬ ቀርቷል";
                            currentAbsentStudents.push(studentObj);
                            minutesBadge = `<span class="bg-rose-100 text-rose-800 text-[10px] px-2 py-0.5 rounded-full font-bold">ቀርቷል</span>`;
                        } else {
                            const history = data.attendanceHistory || [];
                            const lastRecord = history[history.length - 1] || {};
                            const mins = lastRecord.minutes || "---";
                            
                            studentObj.detail = `አርፍዷል (${mins} ደቂቃ)`;
                            currentLateStudents.push(studentObj);
                            minutesBadge = `<span class="bg-amber-100 text-amber-800 text-[10px] px-2 py-0.5 rounded-full font-bold">አርፍዷል (${mins}ደ)</span>`;
                        }

                        dailyDiv.innerHTML += `
                            <div class="p-2.5 border-b flex justify-between items-center bg-gray-50 rounded-xl mb-1">
                                <span class="font-bold text-gray-700">${data.studentName}</span>
                                ${minutesBadge}
                            </div>
                        `;
                    }
                });

                if(!hasRecords) {
                    dailyDiv.innerHTML = `<p class="text-gray-400 text-center py-4 italic">ለዛሬ እስካሁን ምንም የክትትል መረጃ አልገባም</p>`;
                }

                document.getElementById('box-on-time').innerText = currentOnTimeStudents.length;
                document.getElementById('box-late').innerText = currentLateStudents.length;
                document.getElementById('box-absent').innerText = currentAbsentStudents.length;

                // ከተከፈተ ማጣሪያውን በህይወት ማቆየት
                if(activeFilterType) {
                    renderFilteredList(activeFilterType);
                }
            });

            // 2. ወርሃዊ ጥቅል ሪፖርት ማጠቃለል
            db.collection("students").onSnapshot(snapshot => {
                const monthlyDiv = document.getElementById('monthly-list');
                monthlyDiv.innerHTML = "";

                snapshot.forEach(doc => {
                    const data = doc.data();
                    const history = data.attendanceHistory || [];
                    
                    let onTime = 0, lates = 0, absents = 0;
                    history.forEach(h => {
                        if(h.status === "Present" || h.status === "On Time") onTime++;
                        else if(h.status === "Absent") absents++;
                        else lates++;
                    });

                    monthlyDiv.innerHTML += `
                        <div class="p-2.5 border-b bg-indigo-50/40 rounded-xl space-y-1 mb-1">
                            <p class="font-black text-gray-800 text-xs">${data.studentName}</p>
                            <p class="text-[10px] text-gray-500 font-bold">በሰዓቱ፦ <span class="text-emerald-600">${onTime}ቀን</span> | אርፋጅ፦ <span class="text-amber-600">${lates}ቀን</span> | ቀሪ፦ <span class="text-rose-600">${absents}ቀን</span></p>
                        </div>
                    `;
                });
            });

            // 3. ዓመታዊ ጥቅል ማጠቃለያ
            db.collection("students").onSnapshot(snapshot => {
                const yearlyDiv = document.getElementById('yearly-list');
                yearlyDiv.innerHTML = "";
                let paidCount = 0;
                let totalStudents = snapshot.size;

                snapshot.forEach(doc => {
                    const data = doc.data();
                    if((data.paidMonths || []).length > 0) paidCount++;
                });

                yearlyDiv.innerHTML = `
                    <div class="p-4 bg-blue-50/50 rounded-2xl border text-gray-700 space-y-2">
                        <p class="font-bold text-xs">🏢 ጠቅላላ በሲስተሙ ያሉ ተማሪዎች፦ <span class="font-black text-blue-800 text-sm">${totalStudents}</span></p>
                        <div class="flex space-x-2 text-[10px]">
                            <span class="bg-emerald-100 text-emerald-800 px-2 py-1 rounded-lg font-bold">የከፈሉ፦ ${paidCount}</span>
                            <span class="bg-rose-100 text-rose-800 px-2 py-1 rounded-lg font-bold">ያልከፈሉ፦ ${totalStudents - paidCount}</span>
                        </div>
                    </div>
                `;
            });
        }

        // ዕለታዊ 3 በተኖች ሲነኩ ዝርዝር መክፈቻና መዝጊያ
        function toggleFilter(type) {
            const section = document.getElementById('filter-display-section');
            if (activeFilterType === type) {
                clearFilter();
            } else {
                section.classList.remove('hidden');
                activeFilterType = type;
                renderFilteredList(type);
                section.scrollIntoView({ behavior: 'smooth' });
            }
        }

        function renderFilteredList(type) {
            const title = document.getElementById('filter-title');
            const listDiv = document.getElementById('filtered-students-list');
            listDiv.innerHTML = "";

            let selectedList = [];
            let colorClass = "";

            if (type === 'On Time') {
                selectedList = currentOnTimeStudents;
                title.innerHTML = `💚 በሰዓቱ የመጡ ተማሪዎች ዝርዝር (${selectedList.length})`;
                colorClass = "bg-emerald-50 text-emerald-800 border-emerald-200";
            } else if (type === 'Late') {
                selectedList = currentLateStudents;
                title.innerHTML = `💛 ያረፈዱ (አርፋጅ) ተማሪዎች ዝርዝር (${selectedList.length})`;
                colorClass = "bg-amber-50 text-amber-800 border-amber-200";
            } else if (type === 'Absent') {
                selectedList = currentAbsentStudents;
                title.innerHTML = `❤️ የዛሬ የቀሩ (ቀሪ) ተማሪዎች ዝርዝር (${selectedList.length})`;
                colorClass = "bg-rose-50 text-rose-800 border-rose-200";
            }

            if(selectedList.length === 0) {
                listDiv.innerHTML = `<p class="text-gray-400 text-xs italic py-2">በዚህ ክፍል ስር ምንም ተማሪ የለም።</p>`;
                return;
            }

            selectedList.forEach(stud => {
                listDiv.innerHTML += `
                    <div class="p-3 border rounded-2xl text-xs font-bold flex justify-between items-center ${colorClass}">
                        <span><i class="fas fa-user mr-1"></i> ${stud.name}</span>
                        <span class="text-[10px] opacity-80 bg-white/60 px-2 py-0.5 rounded-full">${stud.detail}</span>
                    </div>
                `;
            });
        }

        function clearFilter() {
            document.getElementById('filter-display-section').classList.add('hidden');
            activeFilterType = null;
        }

        function addStudent() {
            const name = document.getElementById('stud-name').value.trim();
            const phone = document.getElementById('stud-phone').value.trim();

            if(!name || !phone) return alert("እባክዎ የተማሪውን ስም እና ስልክ ያሟሉ");

            db.collection("students").add({
                studentName: name,
                parentPhone: phone,
                lastAttendance: "---",
                attendanceDate: todayStr,
                attendanceHistory: [],
                paidMonths: [],
                examScore: "---"
            }).then(() => {
                alert("ተማሪው በተሳካ ሁኔታ ተመዝግቧል!");
                document.getElementById('stud-name').value = "";
                document.getElementById('stud-phone').value = "";
                document.getElementById('register-section').classList.add('hidden'); // ከተመዘገበ በኋላ በተኑ እንዲዘጋ
            }).catch(err => {
                alert("ምዝገባው አልተሳካም፦ " + err.message);
            });
        }
    </script>
</body>
</html>
