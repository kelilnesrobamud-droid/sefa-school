<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>የአድሚን/ሱፐርቫይዘር ገጽ - Safe School</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
</head>
<body class="bg-gray-50 min-h-screen font-sans">

    <header class="bg-teal-700 text-white p-4 shadow-md flex justify-between items-center">
        <h1 class="text-xl font-bold">የአስተዳዳሪ (Supervisor) ዳሽቦርድ</h1>
        <a href="index.html" class="bg-teal-800 px-4 py-2 rounded text-sm hover:bg-teal-900">ውጣ</a>
    </header>

    <main class="max-w-6xl mx-auto p-4 space-y-6">
        <div id="admin-login" class="bg-white p-6 rounded-lg shadow-md max-w-md mx-auto mt-10">
            <h2 class="text-lg font-bold mb-4 text-gray-700">የአስተዳዳሪ/Supervisor መግቢያ</h2>
            <input type="email" id="admin-email" placeholder="የአድሚን ኢሜል" class="w-full p-2 border rounded mb-3 focus:outline-teal-500">
            <input type="password" id="admin-password" placeholder="ይለፍ ቃል (Password)" class="w-full p-2 border rounded mb-4 focus:outline-teal-500">
            <button onclick="loginAdmin()" class="w-full bg-teal-600 text-white py-2 rounded hover:bg-teal-700 font-bold">ግባ</button>
        </div>

        <div id="admin-dashboard" class="hidden space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="bg-white p-6 rounded-lg shadow border-l-4 border-teal-500">
                    <h3 class="text-sm font-medium text-gray-500 uppercase">ጠቅላላ ተማሪዎች</h3>
                    <p class="text-2xl font-bold text-gray-800" id="stat-students">0</p>
                </div>
                <div class="bg-white p-6 rounded-lg shadow border-l-4 border-green-500">
                    <h3 class="text-sm font-medium text-gray-500 uppercase">ክፍያ የፈጸሙ</h3>
                    <p class="text-2xl font-bold text-green-600" id="stat-paid">0</p>
                </div>
                <div class="bg-white p-6 rounded-lg shadow border-l-4 border-red-500">
                    <h3 class="text-sm font-medium text-gray-500 uppercase">ክፍያ ያልፈጸሙ</h3>
                    <p class="text-2xl font-bold text-red-600" id="stat-unpaid">0</p>
                </div>
            </div>

            <div class="bg-white p-6 rounded-lg shadow-md">
                <h2 class="text-lg font-bold text-gray-800 mb-4">አዲስ ተማሪ እና ወላጅ/መምህር መመዝገቢያ</h2>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-3">
                    <input type="text" id="stud-name" placeholder="የተማሪ ስም" class="p-2 border rounded text-sm">
                    <input type="text" id="stud-teacher" placeholder="የመምህር ስም" class="p-2 border rounded text-sm">
                    <input type="text" id="stud-parent" placeholder="የወላጅ ስም" class="p-2 border rounded text-sm">
                    <select id="stud-payment" class="p-2 border rounded text-sm bg-white">
                        <option value="Unpaid">ክፍያ አልተከፈለም</option>
                        <option value="Paid">ክፍያ ተከፍሏል</option>
                    </select>
                </div>
                <button onclick="addStudent()" class="mt-4 bg-teal-600 text-white px-5 py-2 rounded text-sm font-bold hover:bg-teal-700">ተማሪውን መዝግብ</button>
            </div>

            <div class="bg-white p-6 rounded-lg shadow-md">
                <h2 class="text-lg font-bold text-gray-800 mb-4">የዛሬው የመምህራን ጥቅል የክትትል ሪፖርት (Supervisor View)</h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-100 text-gray-700 text-sm">
                                <th class="p-3 border-b">ቀን</th>
                                <th class="p-3 border-b">የተማሪ ስም</th>
                                <th class="p-3 border-b">የመዘገበው መምህር</th>
                                <th class="p-3 border-b">የመገኘት/የማርፈድ ሁኔታ</th>
                            </tr>
                        </thead>
                        <tbody id="admin-attendance-list">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        // የFirebase ኮንፊገሬሽንህን እዚህ ጋር አስገባ
        const firebaseConfig = {
            apiKey: "AIzaSy...",
            authDomain: "safe-school-...",
            projectId: "safe-school-...",
            storageBucket: "safe-school-...",
            messagingSenderId: "...",
            appId: "..."
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        function loginAdmin() {
            const email = document.getElementById('admin-email').value.trim();
            const password = document.getElementById('admin-password').value.trim();

            auth.signInWithEmailAndPassword(email, password)
            .then(() => {
                document.getElementById('admin-login').classList.add('hidden');
                document.getElementById('admin-dashboard').classList.remove('hidden');
                loadStats();
                loadAllAttendance();
            })
            .catch(err => {
                alert("የመግቢያ ስህተት፦ " + err.message);
            });
        }

        function addStudent() {
            const name = document.getElementById('stud-name').value.trim();
            const teacher = document.getElementById('stud-teacher').value.trim();
            const parent = document.getElementById('stud-parent').value.trim();
            const paymentStatus = document.getElementById('stud-payment').value;

            if(!name || !teacher || !parent) return alert("እባክዎ ሁሉንም ሳጥኖች ያሟሉ");

            db.collection("students").add({
                name: name,
                teacher: teacher,
                parent: parent,
                paymentStatus: paymentStatus
            }).then(() => {
                alert("ተማሪው በተሳካ ሁኔታ ተመዝግቧል!");
                document.getElementById('stud-name').value = "";
            });
        }

        function loadStats() {
            db.collection("students").onSnapshot(snapshot => {
                let total = snapshot.size;
                let paid = 0;
                let unpaid = 0;

                snapshot.forEach(doc => {
                    if(doc.data().paymentStatus === "Paid") paid++;
                    else unpaid++;
                });

                document.getElementById('stat-students').innerText = total;
                document.getElementById('stat-paid').innerText = paid;
                document.getElementById('stat-unpaid').innerText = unpaid;
            });
        }

        function loadAllAttendance() {
            const today = new Date().toISOString().split('T')[0];
            
            // የዛሬውን የሁሉም መምህራን የክትትል ሪፖርት በአንዴ ሰብስቦ ለአድሚኑ ያሳያል
            db.collection("attendance").where("date", "==", today)
            .onSnapshot(snapshot => {
                const tbody = document.getElementById('admin-attendance-list');
                tbody.innerHTML = "";
                
                if(snapshot.empty) {
                    tbody.innerHTML = `<tr><td colspan="4" class="p-3 text-center text-gray-500">ከመምህራን እስካሁን የተላከ የዛሬ ሪፖርት የለም።</td></tr>`;
                    return;
                }

                snapshot.forEach(doc => {
                    const att = doc.data();
                    let badgeColor = "bg-green-100 text-green-800";
                    if(att.status.includes("min")) badgeColor = "bg-amber-100 text-amber-800";
                    if(att.status === "Absent") badgeColor = "bg-red-100 text-red-800";

                    tbody.innerHTML += `
                        <tr class="border-b text-sm">
                            <td class="p-3 text-gray-600">${att.date}</td>
                            <td class="p-3 text-gray-800 font-medium">${att.studentName}</td>
                            <td class="p-3 text-gray-700">${att.teacher}</td>
                            <td class="p-3"><span class="px-2 py-1 rounded text-xs font-bold ${badgeColor}">${att.status}</span></td>
                        </tr>
                    `;
                });
            });
        }
    </script>
</body>
</html>
