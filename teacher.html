<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>የመምህራን ገጽ - Safe School</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-gray-50 min-h-screen font-sans">

    <header class="bg-blue-600 text-white p-4 shadow-md flex justify-between items-center">
        <h1 class="text-xl font-bold">የመምህራን መቆጣጠሪያ ገጽ</h1>
        <a href="index.html" class="bg-blue-700 px-4 py-2 rounded text-sm hover:bg-blue-800">ውጣ</a>
    </header>

    <main class="max-w-4xl mx-auto p-4 space-y-6">
        <div id="login-section" class="bg-white p-6 rounded-lg shadow-md max-w-md mx-auto mt-10">
            <h2 class="text-lg font-bold mb-4 text-gray-700">በመምህር ስምዎ ይግቡ</h2>
            <input type="text" id="teacher-name" placeholder="ሙሉ ስምዎን ያስገቡ" class="w-full p-2 border rounded mb-4 focus:outline-blue-500">
            <button onclick="loadTeacherDashboard()" class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700 font-bold">ግባ</button>
        </div>

        <div id="dashboard-section" class="hidden space-y-6">
            <div class="bg-blue-50 p-4 rounded-lg border border-blue-200">
                <p class="text-blue-800 font-medium">እንኳን ደህና መጡ መምህር <span id="display-name" class="font-bold"></span>!</p>
            </div>

            <div class="bg-white p-6 rounded-lg shadow-md">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-bold text-gray-800">የዛሬ ተማሪዎች ክትትል (የሁነታ ምዝገባ)</h2>
                    <span class="text-sm text-gray-500 bg-gray-100 px-3 py-1 rounded" id="current-date"></span>
                </div>
                <p class="text-xs text-amber-600 mb-4">💡 ማሳሰቢያ፦ ሁሉም ተማሪዎች በነባሪ "በሰዓቱ" ተብለዋል። የረፈደ ወይም የቀረውን ብቻ ቀይረው ያስቀምጡ።</p>
                
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-100 text-gray-700 text-sm">
                                <th class="p-3 border-b">የተማሪ ስም</th>
                                <th class="p-3 border-b">የመጻሕፍት/የመገኘት ሁነታ</th>
                            </tr>
                        </thead>
                        <tbody id="students-list">
                            </tbody>
                    </table>
                </div>
                <button onclick="submitAttendance()" class="mt-4 bg-green-600 text-white px-6 py-2 rounded font-bold hover:bg-green-700">የዛሬውን ጥቅል መረጃ መዝግብ</button>
            </div>

            <div class="bg-white p-6 rounded-lg shadow-md">
                <h2 class="text-lg font-bold text-gray-800 mb-4">ያለፉት ቀናት ጥቅል የክትትል ታሪክ (History)</h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-100 text-gray-700 text-sm">
                                <th class="p-3 border-b">ቀን</th>
                                <th class="p-3 border-b">የተማሪ ስም</th>
                                <th class="p-3 border-b">ሁኔታ</th>
                            </tr>
                        </thead>
                        <tbody id="history-list">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        // የFirebase ኮንፊገሬሽንህን እዚህ ጋር አስገባ
        const firebaseConfig = {
            apiKey: "AIzaSy...",
            authDomain: "safe-school-...",
            projectId: "safe-school-...",
            storageBucket: "safe-school-...",
            messagingSenderId: "...",
            appId: "..."
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let currentTeacher = "";
        document.getElementById('current-date').innerText = new Date().toLocaleDateString('en-US');

        function loadTeacherDashboard() {
            const nameInput = document.getElementById('teacher-name').value.trim();
            if(!nameInput) return alert("እባክዎ ስምዎን ያስገቡ");
            
            currentTeacher = nameInput;
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('dashboard-section').classList.remove('hidden');
            document.getElementById('display-name').innerText = currentTeacher;

            loadStudents();
            loadAttendanceHistory();
        }

        function loadStudents() {
            db.collection("students").where("teacher", "==", currentTeacher)
            .onSnapshot(snapshot => {
                const tbody = document.getElementById('students-list');
                tbody.innerHTML = "";
                if(snapshot.empty) {
                    tbody.innerHTML = `<tr><td colspan="2" class="p-3 text-center text-gray-500">የተመደበልዎት ተማሪ አልተገኘም</td></tr>`;
                    return;
                }
                snapshot.forEach(doc => {
                    const student = doc.data();
                    tbody.innerHTML += `
                        <tr class="border-b hover:bg-gray-50" data-id="${doc.id}" data-name="${student.name}">
                            <td class="p-3 text-gray-800 font-medium">${student.name}</td>
                            <td class="p-3">
                                <select class="status-select p-1 border rounded bg-white text-sm focus:ring-1 focus:ring-blue-500">
                                    <option value="On Time" selected>በሰዓቱ (On Time)</option>
                                    <option value="1-3 min">ከ1-3 ደቂቃ አርፍዷል</option>
                                    <option value="4-6 min">ከ4-6 ደቂቃ አርፍዷል</option>
                                    <option value="7-10 min">ከ7-10 ደቂቃ አርፍዷል</option>
                                    <option value="10+ min">ከ10 ደቂቃ በላይ አርፍዷል</option>
                                    <option value="Absent">ቀርቷል (Absent)</option>
                                </select>
                            </td>
                        </tr>
                    `;
                });
            });
        }

        function submitAttendance() {
            const rows = document.querySelectorAll('#students-list tr');
            const today = new Date().toISOString().split('T')[0];
            let count = 0;

            rows.forEach(row => {
                const studentId = row.getAttribute('data-id');
                const studentName = row.getAttribute('data-name');
                const status = row.querySelector('.status-select').value;

                if(studentId) {
                    db.collection("attendance").doc(`${studentId}_${today}`).set({
                        studentId: studentId,
                        studentName: studentName,
                        teacher: currentTeacher,
                        date: today,
                        status: status,
                        timestamp: firebase.firestore.FieldValue.serverTimestamp()
                    }).then(() => {
                        count++;
                    });
                }
            });
            alert("የዛሬው የክትትል መረጃ በጥቅሉ በተሳካ ሁኔታ ተቀምጧል!");
        }

        function loadAttendanceHistory() {
            db.collection("attendance").where("teacher", "==", currentTeacher)
            .orderBy("date", "desc")
            .limit(100)
            .onSnapshot(snapshot => {
                const tbody = document.getElementById('history-list');
                tbody.innerHTML = "";
                snapshot.forEach(doc => {
                    const att = doc.data();
                    let badgeColor = "bg-green-100 text-green-800";
                    if(att.status.includes("min")) badgeColor = "bg-amber-100 text-amber-800";
                    if(att.status === "Absent") badgeColor = "bg-red-100 text-red-800";

                    tbody.innerHTML += `
                        <tr class="border-b text-sm">
                            <td class="p-3 text-gray-600">${att.date}</td>
                            <td class="p-3 text-gray-800 font-medium">${att.studentName}</td>
                            <td class="p-3"><span class="px-2 py-1 rounded text-xs font-bold ${badgeColor}">${att.status}</span></td>
                        </tr>
                    `;
                });
            });
        }
    </script>
</body>
</html>
