
<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>የመምህራን መቆጣጠሪያ ማዕከል</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-gray-100 min-h-screen font-sans pb-10">

    <!-- Header -->
    <header class="bg-indigo-900 text-white p-6 rounded-b-[40px] shadow-2xl text-center">
        <div class="flex justify-between items-center max-w-4xl mx-auto">
            <a href="index.html" class="bg-black/20 px-4 py-2 rounded-xl text-xs font-bold hover:bg-black/4"><i class="fas fa-home"></i> ዋና ገጽ</a>
            <h1 class="text-xl font-black italic text-yellow-300">የመምህራን ፖርታል</h1>
            <div class="w-10"></div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4 space-y-4">
        
        <!-- የመምህር መግቢያ -->
        <div id="teacher-login" class="bg-white p-6 rounded-[35px] shadow-lg max-w-md mx-auto mt-10 border text-center">
            <h2 class="text-base font-black mb-3 text-indigo-900 italic">በአስተማሪ ስልክ ቁጥር ይግቡ</h2>
            <input type="tel" id="teacher-phone-input" placeholder="የአስተማሪ ስልክ ቁጥር (e.g. 09...)" class="w-full p-3 border rounded-2xl mb-4 focus:outline-none focus:ring-2 focus:ring-indigo-900 font-bold text-center text-sm">
            <button onclick="loginTeacher()" class="w-full bg-indigo-600 text-white py-3 rounded-2xl hover:bg-indigo-700 font-black italic shadow-md text-xs">የእኔን ተማሪዎች አውርድ</button>
        </div>

        <!-- የመምህሩ ዋና ማዕከል -->
        <div id="teacher-dashboard" class="hidden space-y-4">
            
            <!-- የመምህር መረጃ ሰሌዳ -->
            <div class="bg-gradient-to-r from-indigo-800 to-slate-800 text-white p-4 rounded-[25px] shadow-md flex justify-between items-center">
                <div>
                    <h2 class="text-sm font-black italic" id="display-teacher-name">መምህር፦ ---</h2>
                    <p class="text-[10px] text-indigo-200 font-medium mt-0.5" id="display-teacher-phone">ስልክ፦ ---</p>
                </div>
                <span class="text-xs font-bold bg-white/20 px-3 py-1 rounded-full" id="students-count-badge">0 ተማሪዎች</span>
            </div>

            <!-- 📊 አዲስ የሪፖርት ማጠቃለያ ሰሌዳ (ዕለታዊ፣ ወርሃዊ፣ ዓመታዊ) -->
            <div class="bg-white p-4 rounded-[25px] shadow border space-y-3">
                <div class="flex justify-between items-center border-b pb-2">
                    <h3 class="font-black text-gray-800 text-xs italic"><i class="fas fa-chart-pie mr-1 text-indigo-600"></i> የመምህሩ የሪፖርት ማጠቃለያ ሰሌዳ</h3>
                    <select id="report-filter" onchange="calculateTeacherReports()" class="p-1.5 border rounded-xl text-[10px] font-bold outline-none bg-gray-50">
                        <option value="today">📅 የዛሬ ዕለታዊ ሪፖርት</option>
                        <option value="month">🗓️ የዚህ ወር ወርሃዊ ሪፖርት</option>
                        <option value="year">⏳ የዚህ ዓመት ዓመታዊ ሪፖርት</option>
                    </select>
                </div>
                <div class="grid grid-cols-3 gap-2 text-center">
                    <div class="bg-emerald-50 p-3 rounded-2xl border border-emerald-100">
                        <p class="text-[9px] text-emerald-700 font-bold">በሰዓቱ የገቡ</p>
                        <span id="rep-present" class="text-base font-black text-emerald-600 block">0</span>
                    </div>
                    <div class="bg-amber-50 p-3 rounded-2xl border border-amber-100">
                        <p class="text-[9px] text-amber-700 font-bold">ያረፈዱ</p>
                        <span id="rep-late" class="text-base font-black text-amber-600 block">0</span>
                    </div>
                    <div class="bg-rose-50 p-3 rounded-2xl border border-rose-100">
                        <p class="text-[9px] text-rose-700 font-bold">የቀሩ</p>
                        <span id="rep-absent" class="text-base font-black text-rose-600 block">0</span>
                    </div>
                </div>
            </div>

            <!-- የተማሪዎች ዝርዝር እና መረጃ መሙያ ፎርም -->
            <div class="bg-white p-4 rounded-[25px] shadow border space-y-3">
                <h3 class="font-black text-gray-800 text-xs italic border-b pb-2">📋 የእለታዊ የተማሪዎች መረጃ መሙያ ፎርም</h3>
                <div id="my-students-list" class="space-y-4 max-h-[500px] overflow-y-auto"></div>
            </div>
        </div>
    </main>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyBKw3ektgxdfvqcO-JHzJwjvfSkc-K_41A", authDomain: "safe-school-b3f87.firebaseapp.com", projectId: "safe-school-b3f87", storageBucket: "safe-school-b3f87.firebasestorage.app", messagingSenderId: "43051328645", appId: "1:43051328645:web:2664448d0b43a293daf5ec" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let globalTeacherPhone = "";
        let allStudentsData = [];
        const todayDefault = new Date().toLocaleDateString('en-CA');

        function loginTeacher() {
            const phone = document.getElementById('teacher-phone-input').value.trim();
            if(!phone) return alert("እባክዎ ስልክ ቁጥር ያስገቡ");
            globalTeacherPhone = phone;

            db.collection("students").where("teacherPhone", "==", phone).onSnapshot(snapshot => {
                if(snapshot.empty) return alert("በዚህ ስልክ የተመዘገበ መምህር አልተገኘም!");

                document.getElementById('teacher-login').classList.add('hidden');
                document.getElementById('teacher-dashboard').classList.remove('hidden');

                let tName = "";
                allStudentsData = [];
                const listDiv = document.getElementById('my-students-list');
                listDiv.innerHTML = "";
                document.getElementById('students-count-badge').innerText = `${snapshot.size} ተማሪዎች`;

                snapshot.forEach(doc => {
                    const data = doc.data();
                    allStudentsData.push({ id: doc.id, ...data });
                    tName = data.teacherName || "መምህር";

                    listDiv.innerHTML += `
                        <div class="p-4 border rounded-3xl bg-gray-50 space-y-3 shadow-sm">
                            <div class="flex justify-between items-center border-b pb-1">
                                <span class="font-black text-indigo-900 text-sm"><i class="fas fa-user-graduate mr-1"></i> ${data.studentName}</span>
                                <span class="text-[10px] text-gray-400 font-bold">የወላጅ ስልክ፦ ${data.parentPhone}</span>
                            </div>
                            <div class="grid grid-cols-1 md:grid-cols-5 gap-2 items-center">
                                <div>
                                    <label class="block text-[9px] text-gray-400 font-bold mb-0.5">ቀን</label>
                                    <input type="date" id="date_${doc.id}" value="${todayDefault}" class="w-full p-2 border rounded-xl text-[11px] font-bold outline-none bg-white">
                                </div>
                                <div>
                                    <label class="block text-[9px] text-gray-400 font-bold mb-0.5">የክትትል ሁኔታ</label>
                                    <select id="status_${doc.id}" onchange="toggleMins('${doc.id}')" class="w-full p-2 border rounded-xl text-[11px] font-bold outline-none bg-white">
                                        <option value="Present">🟢 በሰዓቱ ገብቷል</option>
                                        <option value="Late">🟡 አርፍዷል</option>
                                        <option value="Absent">🔴 ቀርቷል</option>
                                    </select>
                                    <input type="number" id="mins_${doc.id}" placeholder="ደቂቃ" class="hidden w-full mt-1 p-1.5 border rounded-xl text-[11px] font-bold text-center outline-none">
                                </div>
                                <div>
                                    <label class="block text-[9px] text-gray-400 font-bold mb-0.5">የባህሪ/ፀባይ ሁኔታ</label>
                                    <select id="behavior_${doc.id}" class="w-full p-2 border rounded-xl text-[11px] font-bold outline-none bg-white">
                                        <option value="ጥሩ">🌟 ጥሩ</option>
                                        <option value="መካከለኛ">👍 መካከለኛ</option>
                                        <option value="ዝቅተኛ">⚠️ ዝቅተኛ</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-[9px] text-gray-400 font-bold mb-0.5">የትምህርት ክትትል</label>
                                    <select id="academic_${doc.id}" class="w-full p-2 border rounded-xl text-[11px] font-bold outline-none bg-white">
                                        <option value="ጥሩ">⭐ ጥሩ</option>
                                        <option value="መካከለኛ">📉 መካከለኛ</option>
                                        <option value="ዝቅተኛ">❌ ዝቅተኛ</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-[9px] text-gray-400 font-bold mb-0.5">የፈተና ውጤት (%)</label>
                                    <input type="text" id="score_${doc.id}" placeholder="e.g. 85%" class="w-full p-2 border rounded-xl text-[11px] font-bold outline-none text-center bg-white" value="${data.examScore || ''}">
                                </div>
                            </div>
                            <button onclick="saveStudentData('${doc.id}', '${data.studentName}')" class="w-full bg-[#0d7a70] text-white py-2 rounded-xl text-[11px] font-black italic shadow hover:bg-teal-700 flex items-center justify-center gap-1">
                                <i class="fas fa-save"></i> መረጃውን አስቀምጥና አዘምን
                            </button>
                        </div>`;
                });

                document.getElementById('display-teacher-name').innerText = `መምህር፦ ${tName}`;
                document.getElementById('display-teacher-phone').innerText = `ስልክ፦ ${phone}`;
                calculateTeacherReports();
            });
        }

        function toggleMins(id) {
            const status = document.getElementById(`status_${id}`).value;
            const minsInput = document.getElementById(`mins_${id}`);
            if(status === 'Late') minsInput.classList.remove('hidden');
            else minsInput.classList.add('hidden');
        }

        // 📊 ዕለታዊ፣ ወርሃዊ፣ ዓመታዊ ሪፖርት ማስያ ስሌት
        function calculateTeacherReports() {
            const filter = document.getElementById('report-filter').value;
            let presentCount = 0, lateCount = 0, absentCount = 0;
            
            const now = new Date();
            const currentYear = now.getFullYear();
            const currentMonth = now.getMonth(); // 0-11

            allStudentsData.forEach(student => {
                const history = student.attendanceHistory || [];
                history.forEach(record => {
                    const recDate = new Date(record.date);
                    if (isNaN(recDate.getTime())) return;

                    let match = false;
                    if (filter === 'today' && record.date === todayDefault) {
                        match = true;
                    } else if (filter === 'month' && recDate.getFullYear() === currentYear && recDate.getMonth() === currentMonth) {
                        match = true;
                    } else if (filter === 'year' && recDate.getFullYear() === currentYear) {
                        match = true;
                    }

                    if (match) {
                        if (record.status.includes("በሰዓቱ")) presentCount++;
                        else if (record.status.includes("አርፍዷል")) lateCount++;
                        else if (record.status.includes("ቀርቷል")) absentCount++;
                    }
                });
            });

            document.getElementById('rep-present').innerText = presentCount;
            document.getElementById('rep-late').innerText = lateCount;
            document.getElementById('rep-absent').innerText = absentCount;
        }

        function saveStudentData(id, studentName) {
            const selectedDate = document.getElementById(`date_${id}`).value;
            const status = document.getElementById(`status_${id}`).value;
            const mins = document.getElementById(`mins_${id}`).value;
            const behavior = document.getElementById(`behavior_${id}`).value;
            const academic = document.getElementById(`academic_${id}`).value;
            let score = document.getElementById(`score_${id}`).value.trim();

            if(score && !score.includes('%')) score += '%';

            let statusText = "በሰዓቱ ገብቷል";
            if(status === 'Absent') statusText = "ቀርቷል";
            if(status === 'Late') statusText = `አርፍዷል (${mins || 0} ደቂቃ)`;

            db.collection("students").doc(id).get().then(doc => {
                let history = doc.data().attendanceHistory || [];
                
                history.push({
                    date: selectedDate,
                    status: statusText,
                    behavior: behavior,
                    academic: academic,
                    score: score || "---"
                });

                return db.collection("students").doc(id).update({
                    lastAttendance: statusText,
                    attendanceDate: selectedDate,
                    examScore: score || "---",
                    behaviorStatus: behavior,
                    academicStatus: academic,
                    attendanceHistory: history
                });
            }).then(() => {
                return db.collection("attendance").add({
                    studentName: studentName,
                    status: status,
                    minutes: mins || "",
                    date: selectedDate,
                    behavior: behavior,
                    academic: academic,
                    teacherPhone: globalTeacherPhone,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
            }).then(() => {
                alert(`የ ${studentName} መረጃ በተሳካ ሁኔታ ተቀምጧል!`);
                calculateTeacherReports();
            }).catch(err => alert("ስህተት፦ " + err.message));
        }
    </script>
</body>
</html>
