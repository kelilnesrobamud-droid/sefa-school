<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>የመምህራን መቆጣጠሪያ ማዕከል</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        .signature-canvas { border: 2px dashed #cbd5e1; background: #ffffff; cursor: crosshair; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans pb-20">

    <header class="bg-indigo-900 text-white p-6 rounded-b-[40px] shadow-2xl text-center">
        <div class="flex justify-between items-center max-w-4xl mx-auto">
            <a href="index.html" class="bg-black/20 px-4 py-2 rounded-xl text-xs font-bold hover:bg-black/40"><i class="fas fa-home"></i> ዋና ገጽ</a>
            <h1 class="text-xl font-black italic text-yellow-300">የመምህራን ፖርታል</h1>
            <div class="w-10"></div>
        </div>
    </header>

    
    <main class="max-w-4xl mx-auto p-4 space-y-4">
        
        <div id="teacher-login" class="bg-white p-6 rounded-[35px] shadow-lg max-w-md mx-auto mt-10 border text-center">
            <h2 class="text-base font-black mb-3 text-indigo-900 italic">በአስተማሪ ስልክ ቁጥር ይግቡ</h2>
            <input type="tel" id="teacher-phone-input" placeholder="የአስተማሪ ስልክ ቁጥር..." class="w-full p-3 border rounded-2xl mb-4 text-center font-bold">
            <button onclick="loginTeacher()" class="w-full bg-indigo-600 text-white py-3 rounded-2xl font-black italic text-xs">የእኔን ተማሪዎች አውርድ</button>
        </div>

        <div id="teacher-dashboard" class="hidden space-y-4">
            <div class="bg-gradient-to-r from-indigo-800 to-slate-800 text-white p-5 rounded-[25px] shadow flex justify-between items-center">
                <div>
                    <h2 class="text-base font-black italic" id="display-teacher-name">መምህር፦ ---</h2>
                    <div id="display-teacher-section" class="inline-block bg-yellow-400 text-slate-950 px-3 py-1 rounded-xl text-xs font-black mt-2">ክፍል፦ ---</div>
                </div>
                <span class="text-xs font-bold bg-white/20 px-3 py-1 rounded-full" id="students-count-badge">0 ተማሪዎች</span>
            </div>

            <div class="bg-white p-4 rounded-[25px] shadow border space-y-3">
                <h3 class="font-black text-gray-800 text-xs italic border-b pb-2">📋 የተማሪዎች ስም ዝርዝር (ለመክፈት ስሙን ይጫኑ)</h3>
                <div id="my-students-list" class="space-y-3"></div>
            </div>
        </div>
    </main>

    <div id="signature-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-[30px] p-6 w-full max-w-md text-center space-y-4">
            <h3 class="font-black text-indigo-900 text-sm italic">✍️ እባክዎ በነጩ ሰሌዳ ላይ ይፍረሙ</h3>
            <canvas id="sig-canvas" width="350" height="200" class="signature-canvas w-full rounded-2xl shadow-inner"></canvas>
            <div class="flex gap-2">
                <button onclick="clearSignature()" class="w-1/2 bg-gray-200 text-gray-700 py-2.5 rounded-xl font-bold text-xs">አጥፋ</button>
                <button onclick="saveSignature()" class="w-1/2 bg-emerald-600 text-white py-2.5 rounded-xl font-black text-xs">ፊርማ አጽдቅ</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyBKw3ektgxdfvqcO-JHzJwjvfSkc-K_41A", authDomain: "safe-school-b3f87.firebaseapp.com", projectId: "safe-school-b3f87", storageBucket: "safe-school-b3f87.firebasestorage.app", messagingSenderId: "43051328645", appId: "1:43051328645:web:2664448d0b43a293daf5ec" };
        firebase.initializeApp(firebaseConfig); const db = firebase.firestore();
        const todayDefault = new Date().toLocaleDateString('en-CA');
        let activeStudentId = null; let canvas, ctx, drawing = false; let savedTeacherSignatureData = "";

        function loginTeacher() {
            const phone = document.getElementById('teacher-phone-input').value.trim();
            if(!phone) return alert("ስልክ ያስገቡ");

            db.collection("students").where("teacherPhone", "==", phone).onSnapshot(snapshot => {
                if(snapshot.empty) return alert("መምህሩ አልተገኘም!");
                document.getElementById('teacher-login').classList.add('hidden');
                document.getElementById('teacher-dashboard').classList.remove('hidden');
                
                let tName = "", tSection = "5A";
                const listDiv = document.getElementById('my-students-list'); listDiv.innerHTML = "";
                document.getElementById('students-count-badge').innerText = `${snapshot.size} ተማሪዎች`;

                snapshot.forEach(doc => {
                    const data = doc.data();
                    tName = data.teacherName || "መምህር";
                    tSection = data.section || "5A";

                    listDiv.innerHTML += `
                        <div class="border border-gray-200 rounded-2xl bg-gray-50 overflow-hidden shadow-sm">
                            <button onclick="toggleAccordion('${doc.id}')" class="w-full p-4 text-left font-black text-gray-700 text-sm flex justify-between items-center bg-white hover:bg-gray-50">
                                <span><i class="fas fa-user-graduate text-indigo-600 mr-2"></i> ${data.studentName}</span>
                                <i class="fas fa-chevron-down text-gray-400 text-xs transition-transform" id="icon_${doc.id}"></i>
                            </button>
                            
                            <div id="form_${doc.id}" class="hidden p-4 border-t border-gray-100 bg-slate-50 space-y-4">
                                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 text-xs">
                                    <div><label class="block text-[10px] text-gray-400 font-bold mb-1">ቀን</label><input type="date" id="date_${doc.id}" value="${todayDefault}" class="w-full p-2.5 border rounded-xl font-bold bg-white"></div>
                                    <div><label class="block text-[10px] text-gray-400 font-bold mb-1"> can/ክትትል</label><select id="status_${doc.id}" onchange="toggleMins('${doc.id}')" class="w-full p-2.5 border rounded-xl font-bold bg-white"><option value="Present">🟢 በሰዓቱ</option><option value="Late">🟡 አርፍዷል</option><option value="Absent">🔴 ቀሪ</option></select><input type="number" id="mins_${doc.id}" placeholder="ደቂቃ" class="hidden w-full mt-2 p-2 border rounded-xl text-center"></div>
                                    <div><label class="block text-[10px] text-gray-400 font-bold mb-1">ባህሪ/ፀባይ</label><select id="behavior_${doc.id}" class="w-full p-2.5 border rounded-xl font-bold bg-white"><option value="ጥሩ">🌟 ጥሩ</option><option value="መካከለኛ">👍 መካከለኛ</option><option value="ዝቅተኛ">⚠️ ዝቅተኛ</option></select></div>
                                    <div><label class="block text-[10px] text-gray-400 font-bold mb-1">ትምህርት ክትትል</label><select id="academic_${doc.id}" class="w-full p-2.5 border rounded-xl font-bold bg-white"><option value="ጥሩ">⭐ ጥሩ</option><option value="መካከለኛ">📉 መካከለኛ</option><option value="ዝቅተኛ">❌ ዝቅተኛ</option></select></div>
                                </div>
                                <div><label class="block text-[10px] text-gray-400 font-bold mb-1">የፈተና ውጤት (%)</label><input type="text" id="score_${doc.id}" placeholder="e.g. 95%" class="w-full p-2.5 border rounded-xl font-bold bg-white" value="${data.examScore || ''}"></div>
                                <div><label class="block text-[10px] text-gray-400 font-bold mb-1">የአስተማሪ አስተያየት</label><textarea id="comment_${doc.id}" rows="2" placeholder="አስተያየት እዚህ ይጻፉ..." class="w-full p-3 border rounded-xl text-xs font-medium bg-white"></textarea></div>
                                
                                <div class="flex items-center gap-3 bg-white p-3 rounded-xl border">
                                    <button type="button" onclick="openSignatureModal('${doc.id}')" class="bg-indigo-600 text-white px-4 py-2 rounded-xl font-bold text-xs shadow-sm"><i class="fas fa-pen-nib mr-1"></i> ለመፈረም ይጫኑ</button>
                                    <div id="sig-preview-container_${doc.id}" class="hidden border p-1 rounded bg-gray-50"><img id="sig-img_${doc.id}" src="" class="h-10 object-contain"></div>
                                </div>

                                <button onclick="saveStudentData('${doc.id}', '${data.studentName}')" class="w-full bg-[#0d7a70] text-white py-3 rounded-xl text-xs font-black shadow"><i class="fas fa-paper-plane mr-1"></i> መረጃውን አስቀምጥ</button>
                            </div>
                        </div>`;
                });
                document.getElementById('display-teacher-name').innerText = `መምህር፦ ${tName}`;
                document.getElementById('display-teacher-section').innerText = `ክፍል፦ ${tSection}`;
            });
        }

        function toggleAccordion(id) {
            const form = document.getElementById(`form_${id}`);
            const icon = document.getElementById(`icon_${id}`);
            form.classList.toggle('hidden');
            icon.classList.toggle('rotate-180');
        }

        function toggleMins(id) {
            const status = document.getElementById(`status_${id}`).value;
            document.getElementById(`mins_${id}`).classList.toggle('hidden', status !== 'Late');
        }

        window.addEventListener("DOMContentLoaded", () => {
            canvas = document.getElementById('sig-canvas'); ctx = canvas.getContext('2d');
            ctx.strokeStyle = "#1e3a8a"; ctx.lineWidth = 3;
            canvas.addEventListener("mousedown", startDrawing); canvas.addEventListener("mousemove", draw); canvas.addEventListener("mouseup", stopDrawing);
            canvas.addEventListener("touchstart", (e) => { startDrawing(e.touches[0]); e.preventDefault(); });
            canvas.addEventListener("touchmove", (e) => { draw(e.touches[0]); e.preventDefault(); });
            canvas.addEventListener("touchend", stopDrawing);
        });
        function openSignatureModal(id) { activeStudentId = id; clearSignature(); document.getElementById('signature-modal').classList.remove('hidden'); }
        function startDrawing(e) { drawing = true; ctx.beginPath(); const rect = canvas.getBoundingClientRect(); ctx.moveTo(e.clientX - rect.left, e.clientY - rect.top); }
        function draw(e) { if(!drawing) return; const rect = canvas.getBoundingClientRect(); ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top); ctx.stroke(); }
        function stopDrawing() { drawing = false; }
        function clearSignature() { ctx.clearRect(0, 0, canvas.width, canvas.height); }
        function saveSignature() {
            savedTeacherSignatureData = canvas.toDataURL();
            document.getElementById(`sig-img_${activeStudentId}`).src = savedTeacherSignatureData;
            document.getElementById(`sig-preview-container_${activeStudentId}`).classList.remove('hidden');
            document.getElementById('signature-modal').classList.add('hidden');
        }

        function saveStudentData(id, studentName) {
            const date = document.getElementById(`date_${id}`).value; const status = document.getElementById(`status_${id}`).value;
            const mins = document.getElementById(`mins_${id}`).value; const behavior = document.getElementById(`behavior_${id}`).value;
            const academic = document.getElementById(`academic_${id}`).value; let score = document.getElementById(`score_${id}`).value.trim();
            const comment = document.getElementById(`comment_${id}`).value.trim();
            
            if(!savedTeacherSignatureData) return alert("እባክዎ መጀመሪያ ይፈርሙ!");
            if(score && !score.includes('%')) score += '%';
            let statusText = status==='Absent' ? 'ቀርቷል' : (status==='Late' ? `አርፍዷል (${mins || 0}ደ)` : 'በሰዓቱ ገብቷል');

            db.collection("students").doc(id).get().then(doc => {
                // ⚠️ የድሮ ሂስትሪን ጠብቆ አዲሱን ብቻ ይጨምራል
                let history = doc.data().attendanceHistory || [];
                history.push({ date, status: statusText, behavior, academic, score: score || "---", teacherComment: comment || "አስተያየት የለም", teacherSig: savedTeacherSignatureData, parentComment: "", parentSig: "" });
                return db.collection("students").doc(id).update({ lastAttendance: statusText, attendanceDate: date, examScore: score || "---", behaviorStatus: behavior, academicStatus: academic, attendanceHistory: history });
            }).then(() => { alert("መረጃው ተቀምጧል!"); savedTeacherSignatureData=""; });
        }
    </script>
</body>
</html>
