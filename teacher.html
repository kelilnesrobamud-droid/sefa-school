<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safe School - Teacher Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-slate-100 min-h-screen font-sans pb-20 text-gray-800">

    <header class="bg-indigo-900 text-white p-6 rounded-b-[40px] shadow-2xl text-center">
        <div class="flex justify-between items-center max-w-7xl mx-auto">
            <a href="index.html" class="bg-black/20 px-4 py-2 rounded-xl text-xs font-bold hover:bg-black/40"><i class="fas fa-home"></i> ዋና ገጽ</a>
            <h1 class="text-xl font-black italic text-yellow-300">የመምህራን ማዕከል</h1>
            <div class="w-10"></div>
        </div>
    </header>

    <div id="teacher-login-box" class="max-w-md mx-auto m-6 bg-white p-6 rounded-[30px] shadow-lg border space-y-4">
        <h3 class="font-black text-xs text-indigo-900 italic border-b pb-2">🔐 መጀመሪያ በመምህር ስልክዎ ይግቡ</h3>
        <div class="space-y-2">
            <input type="tel" id="teacherPhoneInput" placeholder="የተመዘገበበት የመምህር ስልክ ቁጥር" class="w-full p-3 border rounded-xl font-bold bg-gray-50 outline-none text-xs">
        </div>
        <button onclick="loginTeacher()" class="w-full bg-indigo-900 text-white py-3 rounded-xl font-black text-xs shadow hover:bg-indigo-950">ግባ</button>
    </div>

    <main id="teacher-main-section" class="hidden max-w-2xl mx-auto p-4 space-y-4">
        <div class="bg-white p-4 rounded-2xl shadow border flex justify-between items-center">
            <div>
                <h2 id="display-teacher-name" class="font-black text-sm text-gray-800">---</h2>
                <p id="display-teacher-section" class="text-[11px] text-indigo-600 font-bold mt-0.5">---</p>
            </div>
            <button onclick="location.reload()" class="text-xs bg-rose-50 text-rose-600 px-3 py-1.5 rounded-xl font-bold border border-rose-200">ውጣ</button>
        </div>

        <div class="bg-white p-6 rounded-[30px] shadow-lg border space-y-3">
            <h3 class="font-black text-xs text-gray-700 italic border-b pb-2">📋 የእርስዎ ተማሪዎች ዝርዝር (አንዱን ይምረጡ)</h3>
            <div id="teacher-students-list" class="grid grid-cols-1 gap-2"></div>
        </div>

        <div id="report-form-section" class="hidden bg-white p-6 rounded-[30px] shadow-lg border space-y-4">
            <h3 id="selected-student-title" class="font-black text-xs text-emerald-700 italic border-b pb-2">✍️ ለተማሪ ሪፖርት መሙያ</h3>
            
            <button onclick="toggleAllFormInputs()" id="btn-toggle-inputs" class="w-full bg-slate-800 text-white py-2.5 rounded-xl text-xs font-black shadow-sm flex justify-center items-center gap-2 transition-all">
                <span>✍️ የዕለት መረጃ መመዝገቢያ ፎርም ክፈት</span> <i id="toggle-icon" class="fas fa-chevron-down"></i>
            </button>

            <div id="all-form-inputs-container" class="hidden space-y-4 border-t pt-3">
                <div>
                    <label class="block text-gray-500 mb-1 text-[11px] font-bold">📋 የተማሪ ክትትል ሁኔታ</label>
                    <select id="attendanceStatus" class="w-full p-3 border rounded-xl bg-gray-50 font-bold text-xs outline-none">
                        <option value="ገብቷል">🟢 ገብቷል (Present)</option>
                        <option value="አርፍዷል">🟡 አርፍዷል (Late)</option>
                        <option value="ቀርቷል">🔴 ቀርቷል (Absent)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-gray-500 mb-1 text-[11px] font-bold">🧠 የተማሪ ፀባይ / ስነ-ምግባር</label>
                    <input type="text" id="studentBehavior" placeholder="ምሳሌ፦ ጥሩ፣ መካከለኛ፣ በጣም ጎበዝ..." class="w-full p-3 border rounded-xl bg-gray-50 font-bold text-xs outline-none text-gray-800">
                </div>
                <div>
                    <label class="block text-gray-500 mb-1 text-[11px] font-bold">💯 የተማሪ ውጤት / ማርክ (ካለ)</label>
                    <input type="text" id="studentScore" placeholder="ምሳሌ፦ 95/100" class="w-full p-3 border rounded-xl bg-gray-50 font-bold text-xs outline-none">
                </div>
                <div>
                    <label class="block text-gray-500 mb-1 text-[11px] font-bold">💬 የመምህሩ ተጨማሪ አስተያየት</label>
                    <textarea id="teacherComment" rows="2" placeholder="ስለ ተማሪው ውሎ ማስታወሻ እዚህ ይጻፉ..." class="w-full p-2.5 border rounded-xl bg-gray-50 font-bold text-xs outline-none resize-none"></textarea>
                </div>
                <div class="bg-slate-50 p-3 rounded-2xl border space-y-1">
                    <span class="text-[11px] text-gray-500 font-bold block">✍️ የመምህር ዲጂታል ፊርማ (እዚህ ላይ ይፈርሙ)</span>
                    <canvas id="teacherCanvas" class="w-full h-20 bg-white border border-gray-300 rounded-xl touch-none"></canvas>
                    <button type="button" onclick="clearTeacherCanvas()" class="text-[10px] text-rose-500 font-bold hover:underline block pt-1"><i class="fas fa-eraser"></i> ፊርማውን አጥፋ</button>
                </div>
                <button onclick="submitTeacherReport()" class="w-full bg-emerald-600 text-white py-3 rounded-xl font-black text-xs shadow hover:bg-emerald-700 mt-2">ሪፖርቱን በይፋ ላክ</button>
            </div>
            
            <div id="sec-teacher-history" class="pt-4 border-t space-y-3">
                <h4 class="font-black text-xs text-indigo-900 italic">📊 የዚህ ተማሪ የሪፖርት መዝገብ ታሪክ</h4>
                <div class="flex gap-2 border-b pb-1 text-xs font-black">
                    <button onclick="switchTeacherTab('daily')" id="tab-daily" class="px-3 py-1.5 bg-indigo-900 text-white rounded-t-xl">📅 ዕለታዊ</button>
                    <button onclick="switchTeacherTab('monthly')" id="tab-monthly" class="px-3 py-1.5 bg-gray-200 text-gray-600 rounded-t-xl">📆 ወርሃዊ</button>
                    <button onclick="switchTeacherTab('yearly')" id="tab-yearly" class="px-3 py-1.5 bg-gray-200 text-gray-600 rounded-t-xl">🏛️ ዓመታዊ</button>
                </div>
                <div class="overflow-x-auto rounded-xl border">
                    <table class="w-full text-[11px] text-center">
                        <thead class="bg-indigo-900 text-white font-bold">
                            <tr><th class="p-2">ቀን</th><th class="p-2">ክትትል</th><th class="p-2">ውጤት</th><th class="p-2">ፀባይ</th><th class="p-2">የወላጅ አስተያየት</th></tr>
                        </thead>
                        <tbody id="teacher-history-table-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyBKw3ektgxdfvqcO-JHzJwjvfSkc-K_41A", authDomain: "safe-school-b3f87.firebaseapp.com", projectId: "safe-school-b3f87", storageBucket: "safe-school-b3f87.firebasestorage.app", messagingSenderId: "43051328645", appId: "1:43051328645:web:2664448d0b43a293daf5ec" };
        firebase.initializeApp(firebaseConfig); const db = firebase.firestore();

        let currentTeacherPhone = ""; let currentTeacherName = ""; let myStudents = []; let selectedStudentId = ""; let activeStudentHistory = [];

        function loginTeacher() {
            const phone = document.getElementById('teacherPhoneInput').value.trim();
            if(!phone) return alert("እባክዎ ስልክ ቁጥርዎን ያስገቡ!");
            db.collection("students").where("teacherPhone", "==", phone).get().then((snap) => {
                if(snap.empty) { return alert("በዚህ ስልክ ቁጥር የተመዘገበ መምህር አልተገኘም!"); }
                myStudents = []; snap.forEach(doc => myStudents.push({ id: doc.id, ...doc.data() }));
                currentTeacherPhone = phone; currentTeacherName = myStudents[0].teacherName;
                document.getElementById('display-teacher-name').innerText = `👨‍🏫 መምህር፦ ${currentTeacherName}`;
                document.getElementById('display-teacher-section').innerText = `🏫 ክፍል፦ ${myStudents[0].section || '5A'}`;
                document.getElementById('teacher-login-box').classList.add('hidden');
                document.getElementById('teacher-main-section').classList.remove('hidden');
                renderTeacherStudents();
            });
        }

        function renderTeacherStudents() {
            const container = document.getElementById('teacher-students-list'); container.innerHTML = "";
            myStudents.forEach(s => {
                container.innerHTML += `
                    <button onclick="selectStudentForReport('${s.id}')" class="w-full text-left p-3.5 bg-slate-50 border rounded-xl font-bold text-xs flex justify-between items-center hover:bg-indigo-50 transition-all">
                        <span>👤 ${s.studentName}</span><i class="fas fa-chevron-right text-gray-400"></i>
                    </button>`;
            });
        }

        function selectStudentForReport(studentId) {
            selectedStudentId = studentId; const student = myStudents.find(s => s.id === studentId); if(!student) return;
            document.getElementById('selected-student-title').innerText = `✍️ ለ${student.studentName} የዕለት ሪፖርት መሙያ`;
            document.getElementById('report-form-section').classList.remove('hidden');
            document.getElementById('all-form-inputs-container').classList.add('hidden');
            document.getElementById('toggle-icon').className = "fas fa-chevron-down";
            document.getElementById('studentScore').value = ""; document.getElementById('studentBehavior').value = ""; document.getElementById('teacherComment').value = "";
            activeStudentHistory = student.attendanceHistory || []; switchTeacherTab('daily');
        }

        function toggleAllFormInputs() {
            const container = document.getElementById('all-form-inputs-container'); const icon = document.getElementById('toggle-icon');
            if(container.classList.contains('hidden')) {
                container.classList.remove('hidden'); icon.className = "fas fa-chevron-up";
                setTimeout(() => { setupTeacherCanvas(); }, 100);
            } else { container.classList.add('hidden'); icon.className = "fas fa-chevron-down"; }
        }

        function processAutoArchive(historyArray) {
            const todayStr = new Date().toLocaleDateString('am-ET');
            const daily = []; const monthly = []; const yearly = [];
            if (!historyArray || historyArray.length === 0) return { daily, monthly, yearly };
            historyArray.forEach(record => {
                if (record.date === todayStr) daily.push(record);
                monthly.push(record); yearly.push(record);
            });
            return { daily, monthly, yearly };
        }

        function switchTeacherTab(type) {
            const btnDaily = document.getElementById('tab-daily'); const btnMonthly = document.getElementById('tab-monthly'); const btnYearly = document.getElementById('tab-yearly'); const tbody = document.getElementById('teacher-history-table-body');
            [btnDaily, btnMonthly, btnYearly].forEach(b => b.className = "px-3 py-1.5 bg-gray-200 text-gray-600 rounded-t-xl font-black text-xs");
            document.getElementById(`tab-${type}`).className = "px-3 py-1.5 bg-indigo-900 text-white rounded-t-xl font-black text-xs";
            const archived = processAutoArchive(activeStudentHistory);
            let targetList = type === 'daily' ? archived.daily : (type === 'monthly' ? archived.monthly : archived.yearly);
            tbody.innerHTML = "";
            if(targetList.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="p-4 text-gray-400 italic">በዚህ ክፍል ምንም መረጃ የለም።</td></tr>`; return;
            }
            targetList.slice().reverse().forEach(h => {
                tbody.innerHTML += `
                    <tr class="border-b text-gray-700 font-bold text-[10px]">
                        <td class="p-2 bg-gray-50">${h.date}</td><td class="p-2 text-indigo-700">${h.status}</td>
                        <td class="p-2 text-blue-600 font-black">${h.score || '---'}</td><td class="p-2 text-emerald-600">${h.behavior || '---'}</td>
                        <td class="p-2 text-left text-amber-700 italic">"${h.parentComment || 'አስተያየት የለም'}"</td>
                    </tr>`;
            });
        }

        function setupTeacherCanvas() {
            const canvas = document.getElementById('teacherCanvas'); if(!canvas) return; const ctx = canvas.getContext('2d');
            canvas.width = canvas.parentElement.clientWidth; canvas.height = 80;
            ctx.strokeStyle = "#1e3a8a"; ctx.lineWidth = 3; ctx.lineCap = "round"; ctx.lineJoin = "round";
            let drawing = false;
            function getPos(e) { const rect = canvas.getBoundingClientRect(); if (e.touches && e.touches.length > 0) { return { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top }; } return { x: e.offsetX, y: e.offsetY }; }
            canvas.onmousedown = (e) => { e.preventDefault(); drawing = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); };
            canvas.onmousemove = (e) => { if(!drawing) return; e.preventDefault(); const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); };
            canvas.onmouseup = () => drawing = false;
            canvas.addEventListener('touchstart', (e) => { e.preventDefault(); drawing = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); }, { passive: false });
            canvas.addEventListener('touchmove', (e) => { if(!drawing) return; e.preventDefault(); const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); }, { passive: false });
            canvas.addEventListener('touchend', () => drawing = false);
        }

        function clearTeacherCanvas() { const canvas = document.getElementById('teacherCanvas'); if(canvas) canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height); }
        function isCanvasBlank() { const c = document.getElementById('teacherCanvas'); return c.getContext('2d').getImageData(0,0,c.width,c.height).data.every(p => p === 0); }

        function submitTeacherReport() {
            if(!selectedStudentId) return alert("እባክዎ መጀመሪያ ተማሪ ይምረጡ!");
            if(isCanvasBlank()) return alert("እባክዎ በመጀመሪያ ፊርማዎን ያኑሩ!");
            const status = document.getElementById('attendanceStatus').value; const score = document.getElementById('studentScore').value.trim(); const behavior = document.getElementById('studentBehavior').value.trim(); const comment = document.getElementById('teacherComment').value.trim(); const signatureData = document.getElementById('teacherCanvas').toDataURL();
            const todayStr = new Date().toLocaleDateString('am-ET');
            const newReport = { date: todayStr, status: status, score: score || "አልተሰጠም", behavior: behavior || "አልተጻፈም", teacherComment: comment, teacherSignature: signatureData, parentComment: "" };

            db.collection("students").doc(selectedStudentId).get().then((doc) => {
                let currentHistory = doc.data().attendanceHistory || []; currentHistory.push(newReport);
                return db.collection("students").doc(selectedStudentId).update({ attendanceHistory: currentHistory });
            }).then(() => { alert("የዕለት ሪፖርቱ በተሳካ ሁኔታ ተልኳል!"); clearTeacherCanvas(); loginTeacher(); });
        }
    </script>
</body>
</html>
