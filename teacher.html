<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>የመምህራን መቆጣጠሪያ ማዕከል</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-gray-100 min-h-screen font-sans pb-10">

    <header class="bg-indigo-900 text-white p-6 rounded-b-[40px] shadow-2xl text-center">
        <div class="flex justify-between items-center max-w-4xl mx-auto">
            <a href="index.html" class="bg-black/20 px-4 py-2 rounded-xl text-xs font-bold hover:bg-black/4"><i class="fas fa-home"></i> ዋና ገጽ</a>
            <h1 class="text-xl font-black italic text-yellow-300">የመምህራን ፖርታል</h1>
            <div class="w-10"></div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4 space-y-4">
        
        <div id="teacher-login" class="bg-white p-6 rounded-[35px] shadow-lg max-w-md mx-auto mt-10 border text-center">
            <h2 class="text-base font-black mb-3 text-indigo-900 italic">በአስተማሪ ስልክ ቁጥር ይግቡ</h2>
            <p class="text-[11px] text-gray-400 mb-4 font-bold">አድሚኑ የመዘገበልዎትን ስልክ ቁጥር ያስገቡ</p>
            <input type="tel" id="teacher-phone-input" placeholder="የአስተማሪ ስልክ ቁጥር (e.g. 09...)" class="w-full p-3 border rounded-2xl mb-4 focus:outline-none focus:ring-2 focus:ring-indigo-900 font-bold text-center text-sm">
            <button onclick="loginTeacher()" class="w-full bg-indigo-600 text-white py-3 rounded-2xl hover:bg-indigo-700 font-black italic shadow-md text-xs">የእኔን ተማሪዎች አውርድ</button>
        </div>

        <div id="teacher-dashboard" class="hidden space-y-4">
            
            <div class="bg-gradient-to-r from-indigo-800 to-slate-800 text-white p-4 rounded-[25px] shadow-md flex justify-between items-center">
                <div>
                    <h2 class="text-sm font-black italic" id="display-teacher-name">መምህር፦ ---</h2>
                    <p class="text-[10px] text-indigo-200 font-medium mt-0.5" id="display-teacher-phone">ስልክ፦ ---</p>
                </div>
                <span class="text-xs font-bold bg-white/20 px-3 py-1 rounded-full" id="students-count-badge">0 ተማሪዎች</span>
            </div>

            <div class="bg-white p-4 rounded-[25px] shadow border space-y-3">
                <div class="flex justify-between items-center border-b pb-2">
                    <h3 class="font-black text-gray-800 text-xs italic">📋 የዛሬ የክትትል ማረጋገጫ</h3>
                    <span class="text-[10px] bg-gray-100 text-gray-600 px-2.5 py-1 rounded-full font-bold" id="attendance-date"></span>
                </div>
                
                <div id="my-students-list" class="space-y-2 max-h-[450px] overflow-y-auto"></div>
            </div>
        </div>
    </main>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyBKw3ektgxdfvqcO-JHzJwjvfSkc-K_41A", authDomain: "safe-school-b3f87.firebaseapp.com", projectId: "safe-school-b3f87", storageBucket: "safe-school-b3f87.firebasestorage.app", messagingSenderId: "43051328645", appId: "1:43051328645:web:2664448d0b43a293daf5ec" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const todayStr = new Date().toLocaleDateString('en-CA');
        document.getElementById('attendance-date').innerText = new Date().toLocaleDateString('am-ET');

        function loginTeacher() {
            const phone = document.getElementById('teacher-phone-input').value.trim();
            if(!phone) return alert("እባክዎ ስልክ ቁጥር ያስገቡ");

            // አድሚኑ የመዘገበውን የአስተማሪ ስልክ ቁጥር በመፈለግ ከተማሪዎቹ ጋር ያገናኘዋል
            db.collection("students").where("teacherPhone", "==", phone).onSnapshot(snapshot => {
                if(snapshot.empty) {
                    alert("በዚህ ስልክ ቁጥር የተመዘገበ መምህር ወይም ተማሪ አልተገኘም!");
                    return;
                }

                document.getElementById('teacher-login').classList.add('hidden');
                document.getElementById('teacher-dashboard').classList.remove('hidden');

                let tName = "";
                const listDiv = document.getElementById('my-students-list');
                listDiv.innerHTML = "";

                document.getElementById('students-count-badge').innerText = `${snapshot.size} ተማሪዎች`;

                snapshot.forEach(doc => {
                    const data = doc.data();
                    const id = doc.id;
                    tName = data.teacherName || "መምህር";

                    // የዛሬ የክፍያ ምልክት (የከፈለ/ያልከፈለ) መምህሩም ማየት እንዲችል
                    const payBadge = data.paymentStatus === 'paid' ? '<span class="text-[9px] text-emerald-600 font-bold bg-emerald-50 px-1.5 py-0.5 rounded">🟢 የከፈለ</span>' : '<span class="text-[9px] text-rose-500 font-bold bg-rose-50 px-1.5 py-0.5 rounded">🔴 ያልከፈለ</span>';

                    listDiv.innerHTML += `
                        <div class="p-3 border rounded-2xl bg-gray-50 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-2">
                            <div>
                                <span class="font-bold text-gray-800 text-xs">${data.studentName}</span>
                                <div class="flex items-center gap-1.5 mt-0.5">${payBadge}</div>
                            </div>
                            <div class="flex gap-1 w-full sm:w-auto">
                                <button onclick="markAttendance('${id}', '${data.studentName}', 'On Time')" class="flex-1 bg-emerald-500 text-white text-[10px] font-bold px-2 py-1.5 rounded-xl hover:bg-emerald-600">በሰዓቱ</button>
                                <button onclick="markLate('${id}', '${data.studentName}')" class="flex-1 bg-amber-500 text-white text-[10px] font-bold px-2 py-1.5 rounded-xl hover:bg-amber-600">አርፍዷል</button>
                                <button onclick="markAttendance('${id}', '${data.studentName}', 'Absent')" class="flex-1 bg-rose-500 text-white text-[10px] font-bold px-2 py-1.5 rounded-xl hover:bg-rose-600">ቀሪ</button>
                            </div>
                        </div>`;
                });

                document.getElementById('display-teacher-name').innerText = `መምህር፦ ${tName}`;
                document.getElementById('display-teacher-phone').innerText = `ስልክ፦ ${phone}`;
            });
        }

        function markAttendance(id, name, status) {
            db.collection("students").doc(id).update({
                lastAttendance: status === 'On Time' ? 'በሰዓቱ ገብቷል' : 'ቀርቷል',
                attendanceDate: todayStr
            });

            db.collection("attendance").add({
                studentName: name,
                status: status,
                date: todayStr,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => alert(`${name} 👉 ${status === 'On Time' ? 'በሰዓቱ' : 'ቀሪ'} ተሞልቷል`));
        }

        function markLate(id, name) {
            const mins = prompt("ስንት ደቂቃ አረፈደ? (ቁጥር ብቻ ያስገቡ)፦", "15");
            if(!mins) return;

            db.collection("students").doc(id).update({
                lastAttendance: `አርፍዷል (${mins} ደቂቃ)`,
                attendanceDate: todayStr
            });

            db.collection("attendance").add({
                studentName: name,
                status: 'Late',
                minutes: mins,
                date: todayStr,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => alert(`${name} 👉 አርፍዷል ተብሎ ተሞልቷል`));
        }
    </script>
</body>
</html>
