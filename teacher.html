<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safe School - Teacher Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-slate-50 min-h-screen font-sans pb-20 text-gray-800">

    <header class="bg-[#0d7a70] text-white p-6 rounded-b-[40px] shadow-2xl text-center">
        <div class="flex justify-between items-center max-w-7xl mx-auto">
            <a href="index.html" class="bg-black/20 px-4 py-2 rounded-xl text-xs font-bold hover:bg-black/40"><i class="fas fa-home"></i> ዋና ገጽ</a>
            <h1 class="text-xl font-black italic text-yellow-300">የመምህራን ማስተዳደሪያ ገጽ</h1>
            <div class="w-10"></div>
        </div>
    </header>

    <div id="teacher-auth-box" class="max-w-md mx-auto m-6 bg-white p-6 rounded-[30px] shadow-lg border space-y-4">
        <h3 class="font-black text-xs text-center text-gray-700 italic border-b pb-2">🔐 በመምህር ስልክ ቁጥርዎ ይግቡ</h3>
        <div class="space-y-2">
            <input type="tel" id="teacherLoginPhone" placeholder="የመመዝገቢያ ስልክ ቁጥርዎን ያስገቡ..." class="w-full p-3 border rounded-xl font-bold bg-gray-50 outline-none text-center text-sm">
            <button onclick="loginTeacher()" class="w-full bg-[#0d7a70] text-white py-3 rounded-xl font-black text-xs shadow hover:bg-[#0a6159]">ግባ</button>
        </div>
    </div>

    <div id="teacher-dashboard-main" class="hidden max-w-7xl mx-auto p-4 space-y-6">
        
        <div class="bg-indigo-950 text-white p-5 rounded-2xl shadow flex justify-between items-center">
            <div>
                <h2 id="display-teacher-name" class="font-black text-sm">መምህር: ---</h2>
                <p id="display-teacher-section" class="text-[10px] text-indigo-200 mt-1">ክፍል: ---</p>
            </div>
            <button onclick="logoutTeacher()" class="bg-rose-600/30 text-rose-300 px-3 py-1.5 rounded-xl text-xs font-bold hover:bg-rose-600">ውጣ</button>
        </div>

        <div class="bg-white p-5 rounded-[30px] shadow border space-y-3">
            <h3 class="font-black text-xs text-gray-800 italic border-b pb-2">📋 የእርስዎ ተማሪዎች ዝርዝር</h3>
            <div id="teacher-students-grid" class="grid grid-cols-1 sm:grid-cols-3 gap-2"></div>
        </div>

        <div id="report-form-box" class="hidden bg-white p-6 rounded-[30px] shadow-lg border max-w-lg mx-auto space-y-4 transition-all">
            <h3 id="report-target-student-name" class="font-black text-xs text-[#0d7a70] italic border-b pb-2">📝 ለ--- የዛሬ ሪፖርት መሙያ</h3>
            
            <div class="space-y-4 text-xs font-bold">
                <div class="space-y-1">
                    <label class="block text-gray-500">የዛሬ ክትትል ሁኔታ፦</label>
                    <select id="rStatus" onchange="handleStatusChange()" class="w-full p-2.5 border rounded-xl bg-gray-50 outline-none">
                        <option value="መጥቷል">✅ መጥቷል</option>
                        <option value="አርፍዷል">⏰ አርፍዷል</option>
                        <option value="ቀርቷል">❌ ቀርቷል</option>
                        <option value="ፈቃድ">ℹ️ በፈቃድ ቀርቷል</option>
                    </select>
                </div>

                <div id="late-minutes-wrapper" class="hidden space-y-1 bg-amber-50 p-3 rounded-xl border border-amber-200">
                    <label class="block text-amber-900">⏰ ስንት ደቂቃ አረፈደ? (በደቂቃ) <span class="text-rose-500">*</span></label>
                    <input type="number" id="rLateMinutes" placeholder="ምሳሌ፦ 15" class="w-full p-2 border rounded-lg bg-white outline-none">
                </div>

                <div class="p-4 bg-indigo-50/50 rounded-2xl border border-indigo-100 space-y-3">
                    <h4 class="text-indigo-950 font-black border-b pb-1 text-[11px]"><i class="fas fa-book-open mr-1"></i> የቁርዓን ቅራአት መከታተያ ሳጥን</h4>
                    
                    <div>
                        <label class="block text-gray-600 mb-1">1. የስህተት ብዛት (ቁጥር)፦</label>
                        <input type="number" id="rMistakes" value="0" min="0" class="w-full p-2.5 border rounded-xl bg-white outline-none text-center font-black">
                    </div>

                    <div>
                        <label class="block text-gray-600 mb-1">2. መንተባተብ (ዱዱዱ...)፦</label>
                        <select id="rStutter" class="w-full p-2.5 border rounded-xl bg-white outline-none">
                            <option value="የለበትም">🟢 የለበትም (የለማድ)</option>
                            <option value="ትንሽ አለበት">🟡 ትንሽ አለበት</option>
                            <option value="በጣም ይንተባተባል">🔴 በጣም ይንተባተባል</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-gray-600 mb-1">3. የተጅዊድ ህግ አጠቃቀም፦</label>
                        <select id="rTajweed" class="w-full p-2.5 border rounded-xl bg-white outline-none">
                            <option value="በጣም ጥሩ">🌟 በጣም ጥሩ</option>
                            <option value="መካከለኛ">👍 መካከለኛ (ማሻሻል አለበት)</option>
                            <option value="ህግ አያወጣም">⚠️ ህግ አያወጣም / ማስተካከል የሚሻው</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-gray-500 mb-1">የዕለቱ ውጤት (Score)፦</label>
                        <input type="text" id="rScore" placeholder="ምሳሌ: 90/100" class="w-full p-2.5 border rounded-xl bg-gray-50 outline-none">
                    </div>
                    <div>
                        <label class="block text-gray-500 mb-1">የተማሪው ፀባይ፦</label>
                        <select id="rBehavior" class="w-full p-2.5 border rounded-xl bg-gray-50 outline-none">
                            <option value="በጣም ጥሩ">🟢 በጣም ጥሩ</option>
                            <option value="ጥሩ">🟡 ጥሩ</option>
                            <option value="ማስተካከል ያለበት">🔴 ማስተካከል ያለበት</option>
                        </select>
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="block text-gray-500">የመምህር ተጨማሪ አስተያየት፦</label>
                    <textarea id="rTeacherComment" rows="2" placeholder="ለወላጅ የሚላክ መልእክት እዚህ ይጻፉ..." class="w-full p-2.5 border rounded-xl bg-gray-50 outline-none resize-none"></textarea>
                </div>

                <div class="space-y-1 bg-slate-100 p-3 rounded-xl border">
                    <label class="block text-gray-700 font-black mb-1">✍️ የመምህር ፊርማ (እዚህ ይፈርሙ) <span class="text-rose-500">*</span></label>
                    <canvas id="teacherSignatureCanvas" class="w-full h-20 bg-white border rounded-lg touch-none"></canvas>
                    <button type="button" onclick="clearTeacherCanvas()" class="text-[10px] text-rose-600 underline font-bold pt-1 block">ፊርማ አጽዳ</button>
                </div>
            </div>

            <button onclick="submitDailyReport()" class="w-full bg-[#0d7a70] text-white py-3 rounded-xl font-black text-xs shadow hover:bg-[#0a6159]"><i class="fas fa-paper-plane mr-2"></i> ሪፖርቱን ወደ ወላጅ ላክ</button>
        </div>

        <div class="bg-white p-5 rounded-[30px] shadow border space-y-3">
            <h3 class="font-black text-xs text-indigo-950 italic border-b pb-2">📋 የተላኩ የሪፖርት መዝገቦች እና የወላጅ ማረጋገጫ</h3>
            <div class="overflow-x-auto rounded-2xl border">
                <table class="w-full text-[11px] text-center border-collapse">
                    <thead class="bg-slate-100 font-bold text-slate-700 border-b">
                        <tr>
                            <th class="p-3 text-left">የተማሪ ስም</th>
                            <th class="p-3">ቀን</th>
                            <th class="p-3">ክትትል</th>
                            <th class="p-3">🛑 ስህተት</th>
                            <th class="p-3">🗣️ መንተባተብ</th>
                            <th class="p-3">✨ ተጅዊድ</th>
                            <th class="p-3">ውጤት / ፀባይ</th>
                            <th class="p-3 text-indigo-900">💬 የመምህር አስተያየት</th>
                            <th class="p-3">✍️ የመምህር ፊርማ</th>
                            <th class="p-3 bg-amber-50 text-amber-900">💬 የወላጅ አስተያየት</th>
                            <th class="p-3 bg-amber-50 text-amber-900">✍️ የወላጅ ፊርማ</th>
                        </tr>
                    </thead>
                    <tbody id="teacher-reports-table-body"></tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyBKw3ektgxdfvqcO-JHzJwjvfSkc-K_41A", authDomain: "safe-school-b3f87.firebaseapp.com", projectId: "safe-school-b3f87", storageBucket: "safe-school-b3f87.firebasestorage.app", messagingSenderId: "43051328645", appId: "1:43051328645:web:2664448d0b43a293daf5ec" };
        firebase.initializeApp(firebaseConfig); const db = firebase.firestore();

        let currentTeacherPhone = ""; let currentTeacherName = ""; let currentTeacherSection = "";
        let myStudents = []; let selectedStudentIdForReport = "";

        function loginTeacher() {
            const phone = document.getElementById('teacherLoginPhone').value.trim();
            if(!phone) return alert("እባክዎ ስልክ ቁጥር ያስገቡ!");

            db.collection("students").where("teacherPhone", "==", phone).get().then((snap) => {
                if(snap.empty) { return alert("በዚህ ስልክ ቁጥር የተመዘገበ መምህር አልተገኘም!"); }
                
                currentTeacherPhone = phone;
                const firstDoc = snap.docs[0].data();
                currentTeacherName = firstDoc.teacherName;
                currentTeacherSection = firstDoc.section;

                document.getElementById('display-teacher-name').innerText = `መምህር: ${currentTeacherName}`;
                document.getElementById('display-teacher-section').innerText = `ክፍል: ${currentTeacherSection}`;
                
                document.getElementById('teacher-auth-box').classList.add('hidden');
                document.getElementById('teacher-dashboard-main').classList.remove('hidden');

                startRealTimeStudentsListener();
            });
        }

        function startRealTimeStudentsListener() {
            db.collection("students").where("teacherPhone", "==", currentTeacherPhone)
            .onSnapshot((snap) => {
                myStudents = [];
                const grid = document.getElementById('teacher-students-grid');
                grid.innerHTML = "";
                
                snap.forEach(doc => {
                    const data = { id: doc.id, ...doc.data() };
                    myStudents.push(data);
                    
                    grid.innerHTML += `
                        <button onclick="openReportForm('${data.id}')" class="p-4 bg-indigo-50 border border-indigo-100 rounded-2xl font-black text-xs text-indigo-900 text-center shadow-sm hover:bg-indigo-100 transition-all">
                            👤 ${data.studentName}
                        </button>`;
                });
                renderReportsTable();
            });
        }

        function openReportForm(studentId) {
            selectedStudentIdForReport = studentId;
            const student = myStudents.find(s => s.id === studentId);
            if(!student) return;

            document.getElementById('report-target-student-name').innerText = `📝 ለ${student.studentName} የዛሬ ሪፖርት መሙያ`;
            document.getElementById('report-form-box').classList.remove('hidden');
            
            document.getElementById('rStatus').value = "መጥቷል";
            document.getElementById('rLateMinutes').value = "";
            document.getElementById('rMistakes').value = "0";
            document.getElementById('rStutter').value = "የለበትም";
            document.getElementById('rTajweed').value = "በጣም ጥሩ";
            document.getElementById('rScore').value = "";
            document.getElementById('rBehavior').value = "በጣም ጥሩ";
            document.getElementById('rTeacherComment').value = "";
            
            handleStatusChange();
            setTimeout(() => { setupSignatureCanvas(); }, 150);
        }

        function handleStatusChange() {
            const status = document.getElementById('rStatus').value;
            const lateWrapper = document.getElementById('late-minutes-wrapper');
            if(status === 'አርፍዷል') { lateWrapper.classList.remove('hidden'); } else { lateWrapper.classList.add('hidden'); }
        }

        let sigCanvas, sigCtx, isDrawing = false;
        function setupSignatureCanvas() {
            sigCanvas = document.getElementById('teacherSignatureCanvas'); if(!sigCanvas) return;
            sigCtx = sigCanvas.getContext('2d');
            sigCanvas.width = sigCanvas.parentElement.clientWidth; sigCanvas.height = 80;
            sigCtx.strokeStyle = "#0f172a"; sigCtx.lineWidth = 3; sigCtx.lineCap = "round";
            
            function getPos(e) { const r = sigCanvas.getBoundingClientRect(); if(e.touches && e.touches.length>0){return {x:e.touches[0].clientX-r.left, y:e.touches[0].clientY-r.top};} return {x:e.offsetX, y:e.offsetY}; }
            function start(e) { e.preventDefault(); isDrawing=true; const p=getPos(e); sigCtx.beginPath(); sigCtx.moveTo(p.x, p.y); }
            function move(e) { if(!isDrawing) return; e.preventDefault(); const p=getPos(e); sigCtx.lineTo(p.x, p.y); sigCtx.stroke(); }
            sigCanvas.onmousedown = start; sigCanvas.onmousemove = move; sigCanvas.onmouseup = () => isDrawing=false;
            sigCanvas.addEventListener('touchstart', start, {passive:false}); sigCanvas.addEventListener('touchmove', move, {passive:false}); sigCanvas.addEventListener('touchend', () => isDrawing=false);
        }
        function clearTeacherCanvas() { if(sigCtx) sigCtx.clearRect(0,0,sigCanvas.width,sigCanvas.height); }
        function isCanvasBlank() { if(!sigCanvas) return true; return sigCanvas.getContext('2d').getImageData(0,0,sigCanvas.width,sigCanvas.height).data.every(p => p === 0); }

        function submitDailyReport() {
            const status = document.getElementById('rStatus').value;
            const lateMinutes = document.getElementById('rLateMinutes').value.trim();
            const mistakes = document.getElementById('rMistakes').value.trim();
            const stutter = document.getElementById('rStutter').value;
            const tajweed = document.getElementById('rTajweed').value;
            const score = document.getElementById('rScore').value.trim();
            const behavior = document.getElementById('rBehavior').value;
            const teacherComment = document.getElementById('rTeacherComment').value.trim();

            if(status === 'አርፍዷል' && !lateMinutes) return alert("እባክዎ የማርፈጃ ደቂቃ ይሙሉ!");
            if(isCanvasBlank()) return alert("እባክዎ እንደ መምህር እዚህ ሳጥን ላይ ይፍረሙ!");

            const finalStatus = status === 'አርፍዷል' ? `⏰ አርፍዷል (${lateMinutes} ደቂቃ)` : status;
            const teacherSigData = sigCanvas.toDataURL();
            const todayStr = new Date().toLocaleDateString('am-ET');

            const student = myStudents.find(s => s.id === selectedStudentIdForReport);
            let currentHistory = student.attendanceHistory || [];

            const newRecord = {
                recordId: "REC-" + Math.floor(100000 + Math.random() * 900000),
                date: todayStr,
                status: finalStatus,
                mistakes: mistakes,
                stutter: stutter,
                tajweed: tajweed,
                score: score || "---",
                behavior: behavior,
                teacherComment: teacherComment || "አስተያየት የለም",
                teacherSignature: teacherSigData,
                parentComment: "",       
                parentSignature: "",     
                parentApproved: false    
            };

            currentHistory.push(newRecord);

            db.collection("students").doc(selectedStudentIdForReport).update({
                attendanceHistory: currentHistory
            }).then(() => {
                alert("ዕለታዊ ሪፖርቱ በተሳካ ሁኔታ ተልኳል!");
                document.getElementById('report-form-box').classList.add('hidden');
                clearTeacherCanvas();
            });
        }

        function renderReportsTable() {
            const tbody = document.getElementById('teacher-reports-table-body'); if(!tbody) return;
            tbody.innerHTML = "";
            let hasRecords = false;

            myStudents.forEach(s => {
                if(s.attendanceHistory && s.attendanceHistory.length > 0) {
                    s.attendanceHistory.slice().reverse().forEach(h => {
                        hasRecords = true;
                        tbody.innerHTML += `
                            <tr class="border-b hover:bg-slate-50 font-bold text-gray-700 text-center">
                                <td class="p-3 text-left text-[#0d7a70]">${s.studentName}</td>
                                <td class="p-3 bg-gray-50/50">${h.date}</td>
                                <td class="p-3 text-indigo-900">${h.status}</td>
                                <td class="p-3 text-rose-600 font-mono text-xs">${h.mistakes || 0}</td>
                                <td class="p-3 text-amber-700 text-[10px]">${h.stutter || '---'}</td>
                                <td class="p-3 text-emerald-700 text-[10px]">${h.tajweed || '---'}</td>
                                <td class="p-3">
                                    <div class="text-blue-600">${h.score}</div>
                                    <div class="text-[10px] text-gray-400">${h.behavior}</div>
                                </td>
                                <td class="p-3 text-left italic text-gray-600 max-w-[150px] truncate" title="${h.teacherComment}">"${h.teacherComment || ''}"</td>
                                <td class="p-3"><img src="${h.teacherSignature}" class="h-8 mx-auto object-contain bg-white rounded p-0.5 border"></td>
                                <td class="p-3 bg-amber-50/30 italic text-amber-950">${h.parentComment || '<span class="text-gray-400 font-normal">ገና አልተመለከተውም</span>'}</td>
                                <td class="p-3 bg-amber-50/30">
                                    ${h.parentSignature ? `<img src="${h.parentSignature}" class="h-8 mx-auto object-contain bg-white rounded p-0.5 border">` : '<span class="text-rose-400 text-[10px]">🔄 ማረጋገጫ ይጠብቃል</span>'}
                                </td>
                            </tr>`;
                    });
                }
            });

            if(!hasRecords) {
                tbody.innerHTML = `<tr><td colspan="11" class="p-4 text-gray-400 italic">እስካሁን ምንም የተላከ የዕለት ሪፖርት የለም።</td></tr>`;
            }
        }

        function logoutTeacher() {
            currentTeacherPhone = ""; currentTeacherName = ""; currentTeacherSection = "";
            document.getElementById('teacher-dashboard-main').classList.add('hidden');
            document.getElementById('teacher-auth-box').classList.remove('hidden');
            document.getElementById('teacherLoginPhone').value = "";
        }
    </script>
</body>
</html>
