<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safe School - Teacher Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-100 font-sans pb-10">

    <div class="bg-indigo-800 p-8 rounded-b-[40px] text-white shadow-lg text-center">
        <div class="flex justify-between items-center max-w-sm mx-auto mb-2">
            <a href="index.html" class="text-xs bg-indigo-950/40 px-3 py-2 rounded-xl font-bold text-white shadow-sm">
                <i class="fas fa-home"></i> ወደ ዋናው
            </a>
            <h2 class="text-xl font-black italic text-yellow-400">አስተማሪ ገጽ</h2>
            <div class="w-10"></div> </div>
        <div class="mt-4 max-w-sm mx-auto flex gap-2">
            <input type="text" id="tLogin" placeholder="ስምዎን እዚህ ይጻፉ..." class="w-full p-3 rounded-xl bg-indigo-900 border-none text-white outline-none font-bold shadow-inner">
            <button id="loginBtn" class="bg-indigo-500 px-6 rounded-xl font-black shadow-md hover:bg-indigo-400 transition">ግባ</button>
        </div>
    </div>

    <div id="main" class="px-5 mt-6 hidden space-y-4">
        <p class="text-[10px] font-black text-gray-400 uppercase text-center italic tracking-wider">ተማሪ ለመመዝገብ ስሙን ይንኩ</p>
        <div id="list" class="space-y-3"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, where, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBKw3ektgxdfvqcO-JHzJwjvfSkc-K_41A", 
            authDomain: "safe-school-b3f87.firebaseapp.com", 
            projectId: "safe-school-b3f87", 
            storageBucket: "safe-school-b3f87.firebasestorage.app", 
            messagingSenderId: "43051328645", 
            appId: "1:43051328645:web:2664448d0b43a293daf5ec" 
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        document.getElementById('loginBtn').onclick = () => {
            const tName = document.getElementById('tLogin').value.trim();
            if(!tName) return alert("እባክዎ ስምዎን ያስገቡ");
            
            document.getElementById('main').classList.remove('hidden');
            const q = query(collection(db, "students"), where("assignedTeacher", "==", tName));
            
            onSnapshot(q, (snap) => {
                const l = document.getElementById('list'); 
                l.innerHTML = "";
                
                snap.forEach(d => {
                    const data = d.data(); 
                    const id = d.id;
                    
                    l.innerHTML += `
                        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden mb-3">
                            <button onclick="document.getElementById('f_${id}').classList.toggle('hidden')" class="w-full p-4 text-left font-black text-gray-700 flex justify-between items-center bg-white border-none outline-none">
                                <span><i class="fas fa-user-circle mr-2 text-indigo-500"></i>${data.studentName}</span>
                                <i class="fas fa-chevron-down text-xs text-gray-300"></i>
                            </button>
                            
                            <div id="f_${id}" class="hidden p-5 bg-gray-50 border-t space-y-4">
                                <div class="flex bg-white p-1 rounded-xl border">
                                    <label class="flex-1">
                                        <input type="radio" name="a_${id}" value="መጥቷል" class="hidden peer" checked>
                                        <div class="text-center py-2 rounded-lg text-[10px] font-black cursor-pointer peer-checked:bg-emerald-500 peer-checked:text-white text-gray-400">መጥቷል</div>
                                    </label>
                                    <label class="flex-1">
                                        <input type="radio" name="a_${id}" value="አልመጣም" class="hidden peer">
                                        <div class="text-center py-2 rounded-lg text-[10px] font-black cursor-pointer peer-checked:bg-rose-500 peer-checked:text-white text-gray-400">አልመጣም</div>
                                    </label>
                                    <label class="flex-1">
                                        <input type="radio" name="a_${id}" value="አርፍዷል" class="hidden peer">
                                        <div class="text-center py-2 rounded-lg text-[10px] font-black cursor-pointer peer-checked:bg-amber-500 peer-checked:text-white text-gray-400">አርፍዷል</div>
                                    </label>
                                </div>

                                <div class="grid grid-cols-2 gap-2">
                                    <div class="space-y-1">
                                        <p class="text-[8px] font-bold text-gray-400 ml-1">ደቂቃ (ካረፈደ)</p>
                                        <input type="number" id="m_${id}" placeholder="0" class="w-full p-3 bg-white rounded-xl border text-xs font-bold outline-none">
                                    </div>
                                    <div class="space-y-1">
                                        <p class="text-[8px] font-bold text-gray-400 ml-1">ውጤት</p>
                                        <input type="number" id="s_${id}" placeholder="---" class="w-full p-3 bg-white rounded-xl border text-xs font-bold outline-none">
                                    </div>
                                </div>

                                <div class="space-y-1">
                                    <p class="text-[8px] font-bold text-gray-400 ml-1">የፈተና ቀን</p>
                                    <input type="text" id="ed_${id}" placeholder="ለምሳሌ፦ ግንቦት 15" class="w-full p-3 bg-white rounded-xl border text-xs font-bold outline-none">
                                </div>

                                <button onclick="saveAll('${id}')" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-black text-xs shadow-md italic">
                                    <i class="fas fa-save mr-2"></i> መረጃውን መዝግብ
                                </button>
                            </div>
                        </div>`;
                });
            });
        };

        window.saveAll = async (id) => {
            const status = document.querySelector(`input[name="a_${id}"]:checked`).value;
            const min = document.getElementById(`m_${id}`).value || "0";
            const score = document.getElementById(`s_${id}`).value || "---";
            const exDate = document.getElementById(`ed_${id}`).value || "---";
            const today = new Date().toLocaleDateString('en-GB');

            try {
                await updateDoc(doc(db, "students", id), { 
                    lastAttendance: status,
                    attendanceDate: today, 
                    lateMinutes: min, 
                    examScore: score, 
                    examDate: exDate 
                });
                alert("የተማሪው መረጃ በትክክል ተመዝግቧል!");
                document.getElementById(`f_${id}`).classList.add('hidden');
            } catch (error) {
                alert("ስህተት አጋጥሟል፦ " + error.message);
            }
        };
    </script>
</body>
</html>
